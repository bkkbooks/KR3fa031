body:
  text: 注云中西皆以角初為首宿即因開首日昏時角當天中故也今依恆星本行逆推設角退九十六度計年則七千矣與聖經紀年正合據此說在開時春分角為昏星至堯時而星為昏星已差有四十五六度是相距已三千餘年矣華湘曰堯之冬至日初昏昂中今之冬至初昏室中計今去堯未四千年而差五十度矣按至元十八年冬至在箕十度至康熙辛未歷四百一十年而冬至在箕三度半授時法每年差約七十年差一度本朝定一年差五十一秒康熙甲子年七政時憲列宿距度分依黃道每年每位加五十一秒恆星大小分為六等與四十八象會通云諭各星大小一等十五星二等四十五星三等二百八十星四等四百七十四星五等二百一十六星六等五十星共一千二十九星天星共四十八象十二象在黃道十五象在黃道以南二十一象在黃道以北在西者十有二象中國不見但星性情天文實用云中歷分垣分宿計二百八十座見界諸星盡矣西國於此見界諸星約以四十八像與會通合別加近南諸星都為六十像驗時依像推校各異古歷家詳察星之形星之性與某物合因此某物像之是像具有所以然矣安得其無效乎其校最著者如參井心尾等宿因內有五車大星柱星故主風參觜大
