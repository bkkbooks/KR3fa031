body:
  text: 千零七十八年加洪水前二百七十六年共四十三百五十四年較上文所云世運初起時至此年談四十六百二十三年之語不合今實年推以四千三百五十四年除去十二運四千三百二十年餘三十四年準逐運交一星法亦係水星主運準小限法行到金牛準小限逐年交一星法為金星準一運分四季是火星在四千六百二十三年之說與實年不相符而實年于交運之時土木二星又不必定會姑存其說以待考訂若欲推測竟太運竟查土木相會之真時劍安命推之為捷且理足世運斷决之理世運及季運主星強弱分吉凶凡交世運或季運必有更改之事若世運并季運主星皆強旺又有吉星相取主出世之人興旺福隆大吉若世運主星已是強旺為吉又有吉星相從季運內雖有凶星相遇終不能作凶依舊興旺若一季過後又交一季季運主星又旺吉并有吉星相助主國家福隆疆宇開廣四海來朝設又交一季季運之主星凶弱則國家不寧有外人相侵緣世運主星吉旺終不為凶若世運主星凶弱又有凶星相照則主國家力小事外人相侵擾攘不寧若遇交季運主星又凶弱并有凶星相照則必有草命之事
