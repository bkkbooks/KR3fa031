body:
  text: 切創生之事第二宫係人生財帛衣祿生理相濟助并未來之事第三宫係親近相助之人及兄弟姊妹親戚近出搬移之事第四宫主父并田宅一切結末之事人之根抵亦在此第五宫主男女喜欒使客信息祝賀并狀成五果木之事第六宫主疾病奴僕并小畜孽生第七宫主祖并妻妾婚姻夥伴及仇隙第八宫係死亡凶險并妻財第九宫係遷移遠方更改諸事并才學識見夢寐之事第十宫主官祿高貴并母第十一宫主福祿并想望及朋友之事第十二宫係仇人爭競并牢獄及六畜頭匹等事若一星在命宫前雛安命度數五度以下屬命宫五度以上不屬命宫屬十二宫其餘宫分例此此取用之法前賢都曾體驗如此真源云第一宫稱命宫閣人命吉凶二宫財帛三宫兄弟姊妹戚及近路四宫父祖及家事五宫男女六宫疾病家人七宫妻妾仇人命則為馳不即為仇八宫死亡九宫移徙道路十宫功名十一宫福祿朋友十二宫禍門監獄考定真時安命法
