body:
  text: 日食關係君王月食關係後妃并臣宰若太陽虧食主星在西入時太陰虧食主星在東出時已上所陳災禍輕減反此則災禍增重應何等災禍看虧食主星是何星依其星之性斷之若有二星三星者值二星或三星會時將各星之性相合斷之若虧食主星是土星主極寒傷百物論人事則人多患冷症纏綿日父并愁悶恐懼論六畜則有災禍損傷論天色則極寒結凍天昏雲暗天氣不正人多災亡地下主傷人之物如龍蟲之類論水類則主江河湖泊泛漲傷物海中惡風損船若虧時主星是木星萬物滋長人事高貴安寧諸物僨賤食用豐足六畜蕃息天氣和平江河不溢若虧食主星是火星則燥熱傷物人事中有爭闖爭戰人患卒疤慕死瘟疫熱病吐血強竊賤人生發天氣極熱起熱風雨少井泉水缺乾旱有大災天色紅流星多海中有狂風傷船五毅栗木之類亦有損傷若虧食主星是金星其應如木星之應又人事中得隂人人之所好亦多偏于隂人多成婚姻之事增子嗣天色清朗明潤江河水增若虧食主星是水星看與何一星相照隨所照之星論性情若
