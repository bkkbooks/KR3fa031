body:
  text: 橡用表所求黃道變為赤道係求日躔而非十宫然上文不云加六十度乎加六十度共一百一十一度五十分算為十宫赤道度應先求日躔赤在天頂變赤不在天頂用表算查宫緯度表即黃赤距緯以黃道金牛二十四度一十三分對查得距赤道十八度五十分表二十四已對一十八度四十九分二十四度一十分已對一十八五十三分此開必有小誤又查北極出地表即斜球升度表見新西法直行即黃赤距緯度三十二度下保舊定江寧出地度距度十八度橫行對十一度四十三分距度十九橫行對十二度二十六分其較為四十三分六十分之全得四十三分今五十分指距緯比例為三十五分用三率比例算以加于十一度四十三分為十二度一十九分即赤道道不在天頂差度白羊後宜減以減赤道五十一度五十分得三十九度三十一分入金牛九度三十一分為斜球升度橡用表所求赤道在天頂變為赤道不在天頂度亦係求日躔而非求十宫求十宫見後後立法仍用赤道求又如此一條係太陽在黃道獅子二十度北極出地三十七度之求法與本法無干又如太陽在黃道獅子二十三度查黃赤正球升度表獅子二十三度對一百四十五度二十一分從白羊算起無緯在查宫緯度表得距赤道一十三度五十四分表上開五十三分零又查北極出地表即斜球升度表北極出地三十七度下距度一
