body:
  text: 而見而遲而留則在日之前留而退而疾復興日合伏于下仍復退而遲而留則在提之後留而疾又復興日合于上水行伏見一歲三周餘木天行一周伏見輪之上則又六伏六見六留六遲三疾并三退惟其伏時多所以不恆見當見不得見又因緯度之不達金緯遠十一度又奇水緯達十六度南北全緯查水無此遠會通云五星之星有遠有遲者熱冷乾濕俱重速則輕減五星又不動時有退時退而狌返旋繞其里加重不動時亦重各星行有遲疾其實行大于平行者為疾平行大于實行者為遲平行與實行同者不遲不疾星疾行力大五星兩留限宣城李光地本要云前留土近合後百一十四度木百二十六度火百六十三度金百六十七度水百四十四度後留土二百四十六度木二百三十四度火百九十七度金百九十三度水二百一十六度兩留之間則俱退行又前留距合在本田最高則少最卑則多後留在本天最高則多最卑則少與前論留限澗狹異原同歸乾坤正切中亦有園日月五星正會沖三合六合兩弦照分吉凶象宗云凡七曜相照在經度上有八等一相會一相沖二弦離九十度二六合離六十度二三合離一百二十度共八等
