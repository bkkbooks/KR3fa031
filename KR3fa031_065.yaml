body:
  text: 命宮占物之術如命格後月食占言此城時或日或月在亥宮是分明其城始基之時亦可安一命宮以占此城之主咎也至於占事而即于事之謀使時安一命宮用占凶吉其理相同而西占中不詳載恐在所密然固可以類推也其在選擇必由逐日逐時為安一命宮而也其吉者用之西占己詳言可不必贅論也論東地平安命及十宮七宮十四宮宜審之理十宮占以太陽躔度加時而以地平邜宮之所值為安命益邜為物始生之方故立為命宫猶易所言帝出乎震也在中法不知此理或以午時生人而竟置太陽于地平下之孑宫其與天象大相逢背則何以為窺天之本要知古人決不知是十宫為本地方之天頂且為最高之處故不可不審而西地平為成物之方四宮為物之根抵俱不可不察是皆有至理存馬論地平宮與赤道宮不同之所以然地平宫濶秧與赤道宮不同而各宮各耀之照亦然故人之生也同一時刻而因各所居處不同命遂不同猶之歷法各地方之北極度日出入刻分與各節氣之刻各不相同斯為西占之祕法而實與歷法相符者也其詳見宣城梅攴鼎直十二宮衡十二宮斜十二宮百遊十二宮論
