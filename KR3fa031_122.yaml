body:
  text: 天文實用云渾儀說分黃道為十二宮因太陰會日十有二次諸所以然合以形物生存之故計得十二數因以分界黃道也蓋物之質為火為氣為水為土而物必現有其生次有其存後有其三界三四相乘其數十二各行各依物界得三宮大得降婁鶉火析木性熱而乾戌午寅氣得實沈壽星元枵性而中表于水得鶉首大火娵訾性濕而冷未卯亥土得大鶉尾星紀性冷而乾酉巳丑以四元情冷熱乾濕歸四元行各于其類無相離揉準古宗動列宿各天宮度過合今則元行之配宮次稍有移矣而指稃猶同于古也歲差之故以上係論三角下方論十二宮名之德十二宮名西团像以人物從其德也太陽躔一宮戌宮起大頭熱效名白羊羊性熱也躔二宮照物益增光力名金牛牛之大力勝于羊矣抑表時宜耕牛耕後也躔三宮會春夏之除春近陰夏近陽名陰陽宮又名雙兄日力勝于往時為強而其長物之熱循然順之一強一順陰陽之義也蓋雙得之躔四宮名巨蟹日至此并諸遊星悉退行而南有類蟹行躔五宮名獅子獅子百獸王力強而性猛太陽至此乾熱極矣性相似故名躔六宮名室女日之于物業至此但令成熟不復生辭勞而向逸如未字之女然躔七宮去赤道之中而南則象名天稱間無所事獨分書皮令平耳次名天蝎蝎小蟲能暗中人不及防也纏八宮其熱斂宜冷氣徐侵人孰覺之又次名人馬是時風狂雨驟有躍馬發
