body:
  text: 光滿同木照普天下有名已同水在正角皆主有學問日在十一宮有福尊貴父母俱貴有木吉照更吉或金星合日在日東福自朋友來在十一宮與凶星會或惡照惟傷子女別無不吉日在十二宮為賤役父早亡家事多失有病且有獄災縱會吉星終不成吉不吉星在內病且心狠水星會合星在合宮吉凶水同各星合不甚吉獨同土吉為二星同一三角如在陰陽天稱寶中子辰人有主意水同土在一宮日生管間事夜生役于人若宮分屬陰不生子女如內監在二宮為醫有名發財但無福又主管墓事四宮明深微之理但有獄厄危五官常在外管錢糧六宮十二宮夜生心惡貧苦有火凶照死于法七宮淂別人家財夜生窮苦心惡死于獄八宮日生有病亦有福夜生貧苦月加光時逐土或火而水在九宮興土合主教化事水同土在十宮得他人大財以計取十一宮同五宮十二宮同六宮水與木在一宮日在有大權夜生次之在二宮得他人財夜生無主意三宮管教化事四宮好貢土中財物五宮同四宮六宮有才能有福七宮大福自婦人末大權次之九宮同三宮十宮大權大福十一宮同五宮十二宮若水在東日東作書辦有權老年壞事在西不善終
