body:
  text: 土星太陽會冲方為大門開大雨雪雹春分冷雨夏至雹雷减熱秋分冷雨冬至水雪雲土月土星太陰會冲方濕宮冷雲小雨月與土同性冷故雨小月滿天蝎人馬加冷應加而月空乾黑雲小雨乾則雨不能大春分天氣變夏至濕減熱秋分雲冬至雪冷土木土星木星相會及冲方各减冷木可减土之冷濕宮加水春分在濕宮冷熱多變夏至雷有雹雷者木之升雹者土之結皆乘熱而成者秋分大風大水風日木水日土全看上下如土星在上天氣風雨大雷飢疫土權大之故木星在上相反土火土星火星相會及冲方前後數日大雨雹大雨火之力雹則土之凝天氣壞壞則昏暗不分上下春分大雨雹夏至大雨雹秋分大水冬至减冷火减土之冷乾隆二年十一月二十四日火土正冲火在寅土在申逆行冲前後頻雪冷本日之夜大雷雨土金土星金星會冲方濕宮雨水春秋分冷雨夏至倏忽雨夏至土金力減故止倏忽雨冬至雪冷土水火土星水星火星會冲方乾宮旱在乾宮則火不能融土之冷溫宮大水在濕宮則
