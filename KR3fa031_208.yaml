body:
  text: 占變大會交食掃流象緯考載一瑞星一日景星二日周伯三日含譽四日格澤一流星一妖星一日彗星二日孛星三日天棓四日天搶五日天雲六日蚩尤旅七日天衡八日國皇九日昭明十日司危十一日天彗十二日五殘十三日六賊十四日曰獄漢十五日旬始十六日天鋒十七日燭星十八日蓬星十九日長庚二十日四鎮二十一日地維藏光一客星一日老子二日國星三日溫星老子一星休咎半之國星溫星皆為休徵至宋天文志而其名更增其占更詳然所謂詳者不遇詳其形狀而已西北測之詳孰有詳于薛氏之所定者一七政之會也而有大小會之不同且有年月日之可考會于某宫之有權無權一交食也而有命宫主星及交食宫主星之分且食時有經星之占又有五星相合經星輿五星相合之戰又有在各人命宫四柱內等占一掃孛也亦作十二宫占其占之詳且密更有百倍于古者故曰古竦令密不特推步為然觀象亦何獨不然輯占變總論會通雲天下之變有關一國者有關一城者變有大小之分其
