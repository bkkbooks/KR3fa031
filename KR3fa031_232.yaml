body:
  text: 掃星會通云掃星有水星火星之性火言其烈水言其速一四方有芒一芒指下如鬚一芒傍出如蝟多自天河邊出掃星之出天下定有事或亂或飢或乾或水要知其所主之事與其來之時一看其所出黃道之方向何方行如出自白羊漸與獅子近是往東行必主東方有變論掃出宫分出白羊東方有亂金牛北方西方有亂隂陽人多好色好殺好豈以隂與陽為不同性故巨蟹大瘟普天下東西南北朝代當換獅子壞草木五穀大飢雙女大臣亡讀書者殃天稱盜多天蝎諜反者泉人多懷私相殺人馬學術壞如焚書等事磨羯南方生惡人多淫者寶瓶多亂天下瘟人暴死雙魚天下兄弟朋友爭禍起家庭象宗云凡彗星有四等第一等尾向上指二等尾向下垂三等其象似竿四等其象似咸篥身細頭大其星之性與水火二星同若此等彗星見時世上所應之事有刀兵征戰火災地震等事然其事亦有輕重按宫分論所應方位在寅午戍宫分上應在東北方已甬丑宫分上應在東南方申子哀宫分上應在西南方交卯未宫分上應在西北方若此星東出地平環上徾升高所應之事止在東方災禍徵輕驗在近勢疾若西方見者
