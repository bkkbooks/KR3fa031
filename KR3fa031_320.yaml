body:
  text: 九不取日月取五星要五星比日月在强宫有權或在日月相會宮相望宮人命宮福宮九星在降宮即全無力不能作照星取日月五星在雨宮相連者亦可取如九宮十宮書生人日在九宮月在十宮自當取月若月在十宮日在十一宮二宮相似則論日月强弱夜生人月在九宮或七宮日在命宮自當取日若有離凖即看日月所在宮之主星與日月吉照者取之為照星取各照星法真星云科目升還功名官祿日作照星人性善惡知愚及月作照星身體强弱及性情及父母及遠行近出一宮係照星分者爲勝財帛福祿福係照星男女兄弟朋友仇十宮作照星分看者為勝取許星法真源云几定許星其照星所在有五星合也或五星照即是許星看其是何照星管即何照星之許星如福離土一百八十度福為照星土為許星至其年月日福到土當失財帛照星到許星為正設無照星與照之取相近者如一宮在金牛七度照星與許星俱不在內惟木在金牛四度以其相近即取為許星取為一宮之許星
