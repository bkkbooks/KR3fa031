body:
  text: 考一宫到十宫七宫到四宫為陽餘六宫為隂子到午上行午到子下行十二門到十門為東門即宫九門到七門為南六門到四門為西三門到一門為北十二舍性情又名十二門即地平宫天文實用云先據子午圈東西平分各半天一升一降次據地平直角以交前園後平分各半天一上一下是四象限也舆四時四方四痰四年應此亦约舆黄道同見前乃每象限分有三舍起東地平右行一周而復一舍二舍等係右行一限在上居天之东内為十十一十二三宫属陽主紅痰其性乾緑東風之嘘拂及太陽之初照皆能散去夜濕故二限亦在上而居西内為七八九三舍属隂主黄痰其性乾熱緑太陽固風赠力故三限下地平亦居西均為四五六三舍属陽主黑痰其性濕緑太陽方退引发發同性之風并濕氣故四限自下天正中至東地平為界内為一二三三舍属隂主白痰其性濕冷其風北緑距太陽逺甚故象限之一舆三謂之至至天中也二舆四謂之離離天中也又各象限内凢起自地平及子午圈者為樞舍又為角舍着效大于他舍次得中效者為随舍又次得微效者為倒疑是侧字舍而每舍初度又名為頂一云中力强七政自十二舍行至第十舍頂天中之頂力盛而效速至第一舍頂次之至第七舍頂又次之而行至
