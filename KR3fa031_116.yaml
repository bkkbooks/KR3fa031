body:
  text: 象度度者天之度數有黃有赤割為十二宮截為三百六十度定為舍升廟旺分界位等其在天澤有二十四節氣之分其在人則又命財等十二宮之別其界限之所在有如刑名家之法律不容遊移遷徙最為謹且嚴者然星有星之性情此固因陰陽分為五行之所致矣而度何為亦有度之性情不觀之人乎人有人之性情而五臟六腑亦各有其性莊子所謂肝膽楚越是也不寧惟是頭目手足皮膚毛髮寸寸性各不同此醫家所以治法亦各不同在物依然同一物也而皮一其性殼一其性實一其性首一其性身一其性尾一其性或熟食而性與生食不同或醎製而性與蜜製各與此七曜所以歪其度而性變宮度所以有其星而性亦異也惟其異故有宜于此者有宜于後者有應求之此者有應求之後者如沾晴雨則當論五星亦當論日月占功名則當論星之舍又當論星之升種種妙理各有其故惟在乎權度之精切衡量之不也輯象度十二宮名子丑寅卯辰巳午未申酉戌亥
  hash: sha256:803dab08e42003112e3f47c8f5139438fbcb96aeb94eef3c272b7903237c8038
