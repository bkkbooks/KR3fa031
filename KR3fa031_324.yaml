body:
  text: 定照許星行度定照星許星行度一年一度太陽年三百六十五日五小時四十九分一月行五分一分行六日詳後取煞星法論理處見命理真源云正煞星六一土星本體一土星對沖一火星本體一火星對沖一土星九十度一火星九十度次煞星九一命照星順行九十度一惡星同命照星九十度又相離一百二十度如日為照星火離日九十度其離日一百二十度更狠一星同命照星一百八十度又相離一百二十度亦為煞星一星離命照星九十度又相離六十度亦為煞星一赤道九十度及一百八十度與黃道平一土星一百二十度火星一百二十度一土星六十度火星六十度一月為星星在日光內與月惡聰無吉星吉照此時日亦作煞星亦有論日光內星之性如同一月為照星有星在月光內典日惡照無吉星吉照月亦作煞星九煞星二要看其前後一百八十度比星體更甚星體比九十度更甚逆行比順行更甚留在四角內比下去宮更甚行遠比行近更甚上升比下降更甚以最高言近黃道比遠更甚緯北比緯南更甚在東比在西更甚論地平宮地平上比地平下更甚屬書者忌書屬夜者忌夜黃道陽宮比陰宮更甚
