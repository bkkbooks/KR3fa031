body:
  text: 數不言數而專言理者聖人也理數兼言者君子也不言理而專言數者細人也觀此二說則命之理微于是可見而由知命為君子以希聖人是所兼望于天下後世者也輯命理人命看七件各曜所主真源云一定各曜所主如妻妾視月財帛視福聰明視水月之類各曜能力大小一定各曜能力大小第一日能力大二月三木四土五火六金七水七曜性及一宫十宫性一七曜之性及一宫十宫之性稱為生人之星各曜何星能力大一各曜何星能力在一宫十宫或在一宫十宫相近之二宫九宫五星在日月東西及在本宫與外與冲并本髙卑一五星能力大者在日東在日西在月東在月西或在其宫或在其冲或在外或在本髙卑七曜吉照惡照
