body:
  text: 二星中間有一星力强此二星指太陰與朔望命主星在四宮七宮或四宮七宮中間有强則物價不增物盛之故而人員者却多無力則物價增物之員者少一星在四宮一星在七宮中間一星各吉照或二星宮俱在七宮而一星在雨星之中間二星中有力之星在下去宮若有力之星太陰朔望命主星中一星在三宮或九宮下去宮則物價疾物盛之故若其星無力則物價增物衰之故且貴遲四柱上主星有力上升又在界占安年命宮四柱上并四季命宮四柱上看是何星所管其星有力又在夲輪上升又在分定度界則其星所之物盛行疾易貴行遲物少
