body:
  text: 為十宫於二項宫中取宫主星有榷者為主星交食分重輕凡日月交食其應不同太陽所應之事重太陰所應之事稍輕何星主虧食五星中是何星主虧食之災虧食在何宫分看此宫主星又看虧食安命宫并宫主星二星何星力強若二星力同以虧食宫主星為主安命宫主星為肋若安命宫主星力大即以安命宫主星為主彼為肋又雜星內有一星在虧食宫分度數上或在安命宫分度數上或在安命星盤第十宫并五星中有一星先太陽出地平環徾高或土木火三星在順行時將已上有力之星或一星或二星或取雜星內一星亦可作虧食主星熙星所在會通云若日月食照星在東地平至午時當壞有氣之物如少年人草木花之類在午時圖壞壯盛穩当之物如君王第一穩當者之憂在午時至西地平壞氣衰之物如老年人草木實之類主星會通云日食宫主星或送日食角內主星其性善又是夲地方星其他惡星無大權能壞日食主善星即日食不為夲地方之
