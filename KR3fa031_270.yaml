body:
  text: 命主星又俱要看太陰若二命宮并命主星二命主并太陰二太陰六件皆居吉位又無凶星相照主其年人民安樂無病若此六件為吉多凶少亦主安樂若此六件不得地又有惡星相照其年必有天災又多疾病每季亦依此創命主與六宮主會照并太陰不得地若年命主星與第六宮主星相遇相照太陰又不得地其年必若天災人禍朔望及四季安命宮亦同此創命主與八宮主會照并太陰不得地若年命主星與第八宮主星相遇相照太陰又不得第其年人多死亡各星與太陰惡照九人何因冬星與太陰惡照而然土星與太陰惡照則有久病淹連歲目肌內贏瘦痞及婦人小腹氣蟲疾症一切冷溫症候木星與太陰惡照有肺病喉疾中風昏暈頭疼心痛一切風症火星與太陰惡照則發熱并脾胃症候及吐血及婦人墮胎一切熱症金星與太陰惡照則心氣痛腎經病虛腫浮遊不定又痔瘡及一切溫症服樂難效之病水星與太陰惡照則有心失智恍惚恐從高墜下暗風喉
