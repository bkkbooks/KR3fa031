body:
  text: 象理論天地人物古今第一理論觀象非徒診耀靈異論天象本於自然非造作私意所能窺見論觀象之學失傳薛氏梅氏兩家繼起恭訂其書學復大頭論西人之學原本之春秋左傳再論西人之學與中法相同論天象磨羯宮之名宋時已見不定為西人所獨稱論七耀有如此之參伍錯綜論占天占人占事占物及選擇吉日立象安命之同論東地平安命及十宮七宮宣審之理論地平宮與索道言不同之所以然論占四海占天下占一方之不同論事之發與發之地論恆星左行七矅右行之理論各圈不同心及各緯偏倚之理論觀天者不可以不觀地與雲所并不可以不知音律與分野論觀象亦古誎今密
  hash: sha256:ed0b8f773ca709bb9af827f4cd0c60137aa7a5e1a50ad91633de0f0826b821c7
