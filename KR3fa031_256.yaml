body:
  text: 會通云占年如不作大算但用日進天蝎二十度作十二宮同上推亦可知一年春分前朔望作十二宮會通云占年又賓春分前或朔或望作十二宮同上對看何星有大權者為星善者更善惡者更惡春分前朔望月離日同五星會通云太陰主百姓者春分前或朔或望月初離日若同火或合或沖或方見上等照年中百姓多災五榖不登諸事不吉土同火性若罔金木則百姓安諸事興火土反沖合亦有羙惡之分下同日月食掃孛亦作十二宮占會通云年中有日食月食亦依十二宮以五星有大榷者為主星見寒六有掃星亦作十二宮此上占更兇惡占掃星諭初起之時以上占年第一是掃星次交食又次春分前朔望可參用之占朔望會通云以合朔時作十二宮一占地平上主星命宮主星是也一占日月同度時所在宮主星以五星有榷者為主志凶隨各星之性第一主星之性有命主星有命宮主星
