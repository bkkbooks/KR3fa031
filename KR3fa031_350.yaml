body:
  text: 十三度五十四分距度十三度對十度零一分距度十四度對十度五十分其較四十九分六十分之距得四十九分今五十四分之距用三率比例得四十四分零加上十度零一分為十度四十五分即赤道不在天頂差度白羊後宜減以減赤道一百四十五度二十一分為一百三十四度三十六分入獅子十四度三十六分為斜球升度三率法一率六十分二率其較四十九分三率五十四分二三相乘以一率除之得四率四十四分零緯若有緯則白羊以後北加南減離赤道緯度天稱以後北減南加赤道緯度白羊以後赤南黃北故距黃在北則再加數于黃赤距緯之故距黃在南則惟用減數于黃赤距緯之內向天稱以後黃南赤北故距黃在北則惟用減數于黃赤距緯之內距黃在南則再加數于黃赤距緯之外此非按球不知日無緯月星有緯北極離十二宫表説北極出地度在十宫四宫一宫七宫圈同本豦北極出地故用本豦北極出地其二宫同十二宫三宫同十一宫五宫同九宫六宫同八宫圈同各北極出地具見表表直行係零豦北極出地度橫行系二宫十二宫三宫十一宫五宫九宫六宫八宫應用北極出地度其所以不同用本處北極出地度之故以地平宫將地平北為極作十二宫取角各宫不同恰與各北極出地相合
