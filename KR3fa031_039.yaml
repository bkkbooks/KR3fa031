body:
  text: 匕於下乎此選雷風烈夫子所以必變天戒先生所以克謹百官亦莫不修職也惡得以為一定之象而妄言無涉以致慢天乎斯為君若臣者欲豫僃與修省則有凜匕乎天下之當明也惟是天機之所在與人之万機之所存即所謂宥密之地也宥密不可以不謹而不容人之覷覦天機亦不許人妄窺以為矯誣之本是故天象人所當習而又非泉人之所當習不特非泉人所當習而尤非之忠君愛國之人所其習在天象之不可不觀而天機之不得不密者以此諭天象本於自然非造作私意所能窺見古歷周天三百六十五度四分度之一日法九百四十分月法二十九日日之四百九十九即二萬七千七百五十九分氣盈五私二百三十五分朔虗五日五百九十二分通閏十日八百二十七分即一萬零二百二十七分二歲餘二萬四百五十四分三歲餘三萬六百八十一分除閏一月尚餘二千九百二十二分五歲再閏至十有九歲七閏已無餘分是謂一章至朔同日四章為篰至朔同在甲子日二十篰為紀至朔同在甲子時三紀為元至朔年月日時皆值甲子謂之歷元在古歷法甚簡即章篰紀元之説不可見於經書而歲差之法古未之立益以人壽無過百歲天行數大非小年所能盡也史記載漢改元封七年為太初元年歲名馬逢攝提格月名聚華日得甲子夜半朔冬至朔與冬至聚無餘
