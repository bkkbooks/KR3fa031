body:
  text: 雙女初至七水八至十六金十七至二十一木二十至二十八火二十九至三十土天稱初至六土七至十四水十五至二十一木二十二至二十八金二十九至三十火天蝎初至七火八至十一金十二至十九水二十至二十五木二十六至三十土人馬初至十二木十三至十七金十八至二十二水二十三至二十四土二十五至三十火磨羯初至七水八至十四木十五至二十二金二十三至二十七土二十八至三十火寶瓶初至七水八至十三金十四至二十木二十一至二十五火二十六至三十土雙魚初至十二金十三至十六木十七至十九水二十至二十八火二十九至三十土若本星行至所屬度上則又力不言太陽太陰者木星行到所屬度上則又太陽之力金星行到所屬度上則又太陰之力每宮度數分屬五星有六家特選此一家會通云各星在界內吉星過又吉星起為大福過著已過起者將來無吉星過又無言吉星起為禍又云界主禍福之來時大福
