body:
  text: 亦以歷數為憑則競之言數要非惝恍與據之説也而吾夫子亦以北辰居所比為政以德至如孟子尚能坐致千歲之日至周家卜世三十卜年八百漢代之興五星聚於東井宋太祖之立日光摩蕩近世周類於陳又諒之僭稱亦有上面魚他的之言劉基於鄱陽之役且獻更舟之策若是乎犖匕之可指也奈之何戴天而不知天之高履地而不知地之厚尚得為明理行義之儒者乎然則有志于忠君愛國者既明人道之後天象又斷不可把講也古聖王仰觀天象非徒取先知診耀靈異蓋寶欲有佝且盡修省之職也有僃維何如占嵗而知歲之中有旱潦之事則或豫疏以通流先提防以蓄水乃至樍穀平糶竭租帳濟種匕早為籌晝民雖遇兩腸之不若而無飢色占歲而之歲之中有不虞之事則或豫防微以杜漸先居安而思危乃至整部伍嚴保甲慎開津謹邊塞宵小無由竊發謂非豫倘之小補乎若夫修省之道天示祥瑞而為君臣者固不可以不修省譬如父母愈歡悅而于道當愈加敬慎矧父母之不悅而天象之我警乎或者曰日月之交食五星之凌犯古人但能識其行度與時日而不能豫推其故今既能推其故而其為交食為凌犯也自有一定之數則於人何涉又何所用其修省不知父母有一定之喜怒人子亦有一定之敬慎天象有一定之凌犯人君亦有一定之修省惡有父母怒於上而為人子者可以泄
