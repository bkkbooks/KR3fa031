body:
  text: 初度起第二次又是火局在人馬宫第二度二十五分第三次又是火局在獅子宫第四度五十一分第四次又在白羊宮第五次又在人馬宫第六次又在獅子宫似此相會十二次或十三次在雙女宫似此相會十二次或十三次然後交風局風局第一次在陰陽宫第二次在實瓶宫第三次在天枰宫似此相會十二次或十三次然後交水局水局第一次在巨蟹宫第二次在雙魚宫第三次在天蝎宫似此相會十二次或十三次前後共四十九次相會第四十九次是雙魚宫二十八度四十一分相會皆遍然後又從火局起第一次却在人馬宫第一度七分餘依前例推之此是陰陽緊要之理自古以來一切禍福皆從此鑿命宫几斷禍福必取一命宫將土木二星同宫同度特取一命緣二星行遲恐不準之將二星同宫同度之年安年命宫為主小輪正相對照心相對也土星小輪與木星小輪正相對照謂之同度會過云交食論中會亦然前占世二星內何星為主二星內者何星在小輪最高處或近小輪高處論中會亦論視會以其星辰強旺為主在高處為強壯若木星為主天下安寧年歲豐稔有
