body:
  text: 平行一日三十七分水伏見平行一日三度零六分太陰朔望兩弦及五星與太陽會留冲變性象宗云太陰與太陽相會後至上弦性潤上弦至望性熱望至下弦性燥下弦再會性寒土木火三星與太陽相會後至第一位留象性多潤自第一位留至與太陽相冲時性多熱自相沖至第二位留象性多燥自第二位留至與太陽再相會時性多寒金水二星與太陽相會後至第一位留象性多潤自第一位逆行後復與太陽相會時性多熱自相會後至第二位留性多燥自第二位順行後復與太陽相會時性多寒星有性潤性熱性燥性寒各星或三合六合相冲相會政變性情或四正角等相遇并有力無力所以天之氣候有不同也推算者宜細詳之各曜順逆遲疾力分大小考月自行従高左旋為逆行九十度留順行至半周最卑又九十度留復逆行至原界行最高極遲行最卑極疾土木次輸即歪輸凡星興日會在輸最高行順而疾興日冲在輸最卑行逆而遲起于最高右行每崴興日會冲一通而满輸一周火同金水自行輸以日為心環日行伏見輸又環自輸行其星平行亦自最高起右行金星凡歴五百八十三日八十八劍行一周水星凡歴一百一十五日八十五劍行一周水星之輸却在金輸内金行伏見一周在上右行興日香河為合伏而疾
