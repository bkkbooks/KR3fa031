body:
  text: 之正而一星居其左右以當地平一因遊恒皆居十二舍頂或同居或別居凢此皆為增損夲力著效不同之故恒星之權會通云第一星大者權大第二色精光者權大作事物明白不暗昧第三色不甚光明者作事物昏暗不明白光密不散者作事物穩當長久光動搖者如狼星喜作亂做人不平心第四星正在黃道內太陽經過極有大權第五離黃道三度在黃道南其權在南在黃道北其權在北第六離黃道三度至五度太陰火星常到第七黃道七度至八度金星能到其權小恒星之權論十二所在會通云一在黃道二在黃道三度至八度因與五星相會三離黃道在北有能四離赤道在北五在本國頭上與頂近者其力更大六各星之經同五星之經七離冬至夏至同五星一體八出地平或入地平同五星能加五星之力九有五星同各星午時圈其力大十各星自出地平十一自入地平十二五星照其光其力為軟日月且五星吉照恒星何為不同恒星性情歌降妻戌宮
