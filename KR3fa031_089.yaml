body:
  text: 照則吉相冲相會并二弦照則凶會不凶水星遇吉則吉遇凶則凶若水星獨在一宮興各星不遇則取所在宮分并主星為吉凶宮主星也七曜分陰陽泉宗云太陽土星木星火星屬陽土本陰却屬陽補下文言土甚冷卻屬書之理見下文太陰金星屬陰水星遇陽星則為陽遇陰星則為陰又一說水在太陽前出為陽在太陽後入為陰又一說水在人安命宮至十宮為陽對宮至第四宮亦為陽其餘六宮為陰會通云凡星日出時在地平上為陽在地平下為陰天文寶用云七政力大者為陽男力小者為陰女要皆準于四情濕熱乾冷為四情其情有熱其濕者日也居日上者為火為木為土故並屬陽為男類土性冷乃熱微之所致然絶無濕故其熱尚勝濕而屬陽其性有濕勝其熱者居日之下為月與金故並屬陰為女類維水則異是得其本然為女偶所感即又為男七曜分書夜會通云太陽木星土星屬書日光大木星熱故為書土甚冷以日木之熱使不傷物故皆屬之于書太陰金星火星屬夜月金濕大故屬夜大甚熱以劑月金之濕使不傷物故亦為夜火星夜不傷物固有月金之性水星晨見屬書夕見屬夜象宗云水星遇晝星則屬晝遇夜星則屬夜出太陽之先屬書入太
