body:
  text: 太初求授時以九四除假如授時朔實二十九萬五千三百零五分九十三秒求太初應若干以九四乘淂二萬七千七百五十八分七五七四二取小数較太初月法惟分下稍小授時朔虗氣盈通閏以十二月乘朔實得三百五十四日三千六百七十一分一六朔虗五萬六千三百二十八分八十四秒其零数六千三百二十八分八十四秒通太初五百九十二分為多于太初二分九一零九六氣盈在太初零数為二百三十五四分日之一授時零数為二千四百二十五分四分日之一不足在本法為欠七十五分通太初少七分零五通閏十萬八千七百五十三分八十四秒諭觀象之學失傳薛氏梅氏兩家繼起恭訂其書學復大顕洪言星有好風星有好雨日月之行則有冬有夏月之從星則以風雨詩小雅漸匕之石篇云有豕白蹢烝涉汥矣月離之畢俾滂沱矣埤稚云馬喜風豕喜雨夫月之從星即西法所謂月逐星是月之離畢即西法所謂月離星是是象本為中西所同占而其理中土或失其傳夫曰入箕入畢月行一月一周天則一月之中有不東北入箕西南入畢乎如是則月如一月之内至此日将無不風雨者矣恐未必然也在畢雖為好雨箕雖
