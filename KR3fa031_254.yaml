body:
  text: 雷電在地平上水多河溢在地平下水涸河乾其行速為人多急性寇盜與海中不安人多病乾占歲法取命宮主會通云取夲年春分真時刺算十二宮先認東地平初分何星為宮主如白羊在地平即火星之類取日月所在宮主星為一年主星會通云次認春分初分日月諭日月所在宮主星晝取日夜取月日月所在宮主星取第一有權者為一年之主若遇退行遇合伏及在下去宮即不取下去宮三宮六宮九宮十二宮是下去宮三宮六宮九宮十二宮是小注若日月五星中不見一年主星言日月在宮主星不可取即看五星在角宮第一十宮第二七宮四宮內何星有榷便取為一年之主設宮內有二三星但取一有大榷者為主倘四角全無五星便取命宮內有大榷之星為之如戌宮為火星之舍之升即取為主星以日月五星較其為日月命宮宮主者更為重先取日月五星最強而為命宮日月宮主者次取日月五星最強不為命宮日月宮主者其宮分先取在一十七宮次取在十一八九宮地平下不取倘地平上無星不可取只下去宮不取天人同此占時謄中言第一要者命宮次日月宮日進天蝎二十度作十二宮
