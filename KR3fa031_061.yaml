body:
  text: 占亦有土星主老人之說諭天象磨羯宫之名宋時己見不定為西人所獨構星紀係丑宫在中土名為星紀而西人則名曰磨羯然東坡時亦有命在磨羯之語此可見磨羯之稱前固有之要非出於西人明亦及閲中土五星之法而取格亦有日遇白羊之名夫白羊戍宫也在中土則名降婁此白羊之稱何謂乎來哉是又知白羊者不定為西人所獨稱者矣諭七曜有如此之參伍錯綜陰陽之消長世道之降升人物之盛衰紛紜錯雜萬有不齊者此皆造化之故不期然而然者也夫造化故出于無心而運行則存于有象太極一而已分而為陰陽布而為五行陰陽之精聚為日月五行之精懸為五星日月之有盈有縮五星之有遲有疾己自參差不一而况乎十二宫之各異三百六十度之不同其間三合六合兩弦會冲高卑升降遲伏逆或有時而成聨珠或有時而成合璧或有時而一星旋繞一星或有時而數星追遂一月或有時兩星欲合而中一星阻之或有時一星欲行而兩星守之加以天首之高天尾之下緯度之相懸小輪之不一三角相和相僥之分正角二體遞下之別天頂地平之殊東西出入之異夫兩人同行已自不齊况此七政之各一其性并各一其行乎如此而欲于開以來求一刻之同杳不可得
