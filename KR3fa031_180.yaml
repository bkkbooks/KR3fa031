body:
  text: 道度減主星所在赤道度如主星赤道度少加一圈減之餘數十三度一十一分作一日見流日法如餘三十九度即是月之初三日天氣有變以上三法極真即朔命宫也苐四法五星如其最高沖之宫有表亦主天氣有變如土星至白羊之類黃道宫太陽交巨蟹視火星即最高象宗云太陽交巨蟹宫初度夏至此時火星先太陽出主天色極熱太陽交磨羯視金星即最早太陽交磨羯宫初度冬至此時金星先太陽出主天色極寒太陽交巨蟹月與火沖復離火即最高太陽交巨蟹宫初度若太陰與火星相後比沖月往往冷者先逼出陰氣及人也離了火星又在寅午戍宫分內火分主夏季極熱太陽交磨羯月與土合復離土即最早太陽交磨羯宫初度若太陰與土合後復離土星在巳酉丑宫分內土分主冬季天色極寒有雪日在申月在寅觀風小渴後也泉宗云太陽在陰陽宫太陰在人馬宫看此時有和風則一年之風皆善風惡則一年之風皆惡陰陽申宫為風局之首故云然
