body:
  text: 二十一百八十度雨大且久再加水金離木则雨大且久者以潤秉熱之故月舆火冲視日月舆火冲火在天蝎日在寶瓶或雙鱼雨月舆火冲火在水分遲宫而日又在子灾多雨之宫故應雨月舆火會金水冲照火急日土木冲照火月舆火星會繎宫内其時金星水星離火星六十九十一百二十一百八十度大雷電水雹不能有雨若火星離日舆土星木星六十九十一百二十一百八十度既日雨以日土木力大于金水也月舆金水合月舆金水相合有雨二星皆合必雨濕性相合之故水金同月在湿宫二至二分水星金星同月在湿宫大雨月入子灾与水冲照月入寶瓶雙鱼天多變離水六十及九十及一百二十及一百八十度雨月入寶瓶雙鱼而与水三六合弦冲日月金水相會日月金水相合必雨金月冲照及水金冲照冬夏二至金星離月六十九十一百二十八十度金星在湿宫雨甚多
