body:
  text: 二十一百八十度雨大且久再加水金離木則雨大且久者以潤秉熱之故月輿火冲視日月輿火冲火在天蝎日在寶瓶或雙魚雨月輿火冲火在水分遲宫而日又在子灾多雨之宫故應雨月輿火會金水冲照火急日土木冲照火月輿火星會繎宫內其時金星水星離火星六十九十一百二十一百八十度大雷電水雹不能有雨若火星離日輿土星木星六十九十一百二十一百八十度既日雨以日土木力大于金水也月輿金水合月輿金水相合有雨二星皆合必雨濕性相合之故水金同月在濕宫二至二分水星金星同月在濕宫大雨月入子灾與水冲照月入寶瓶雙魚天多變離水六十及九十及一百二十及一百八十度雨月入寶瓶雙魚而與水三六合弦冲日月金水相會日月金水相合必雨金月冲照及水金冲照冬夏二至金星離月六十九十一百二十八十度金星在濕宫雨甚多
