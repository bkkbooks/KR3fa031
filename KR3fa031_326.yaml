body:
  text: 相近兩至比雨分更甚土比火星更甚土是自生病火自外來病若雨星俱為煞星應若後方死取觶星法論理處見命理真源云一吉星在煞星界上一吉星在煞星傍吉星在後煞星在前或煞星在吉星吉照內一煞星與照星緯度不同一北一南差兩三度若煞星已強更有經緯惡星相助不能鮮或煞星在位內在界上在東在陽宮不在日光下不在地平下皆不能人命一生大運象宗云几人命自始生至四嵗太陰主養之為初生下時哪嫩小濕潤自四嵗以後至十四嵗十年水星主養之漸通世事智慧日增知勿學十五嵗至二十二嵗八年金星主養之精氣漸盛陰陽比合能生子二十三火日嵗十九年太陽王養之立志取為初年謂之事皆壽去四十二嵗主五十六嵗十五年火星主養之增人怒氣常想事業經營謀幹不自安寧五十七年歲至六十八嵗十二年木星主養之肯為善事欲名于後不肯輕動六十九嵗至夀終土星主養之身體因俸精神衰減几人命內先看何星強旺行限至其星主養之時則其事亦與旺若星弱則其事亦弱其大略也又人命宮有惡星主少年艱難是命宮主少年七宮有吉星主老年尊榮是七宮主老年
