body:
  text: 東至南屬東地方小西洋佛國為主者土星金星宮分金牛雙女磨蝎無北屬何也日月食在其功害在其國日月食要看所食宮在夲國所分之宮否又看日月食所安命宮在夲國所分之宮否又看日月食在夲地主人之十宮否若無此三者其食與本國無害應日期多少象宗云几日月食看初食時至生光時準時刻多少太陽食每一食準一年其禍應在一年之內太陰食每一時準一月其禍應在一月之內小時會通云日食各凶事嘗在朔月食各凶事嘗在網害起之時會通云害起之時日食從東地平至午其害在第一月至第四月第一月尤甚在午其害在第五月至八月第五月為尤甚從午至西地平其害在九月至十二月第九月為尤甚地平下不占最重處在何時災禍最重處在何時看日月食分數至極處是正食者初食至食盡時特共成幾個時辰至食甚時應幾何時刻最重處照上法推應在其中
