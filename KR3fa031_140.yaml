body:
  text: 會通云黃道宮有人性者陰陽雙女寶瓶人馬前半有禽獸性者金牛獅子天蝎雙魚人馬後半黃道宮分南北高上升下降會通云白羊宮初度至雙女宮末度屬北道高係升上天稱宮初度至雙魚宮末度屬南道早係降下黃道上離二至度數相同象宗云黃道上離冬夏二至度數相同或前或後俱三十度或六十度其力相等黃道分四象限及四時四年四痰四方天文寶用云其一為降婁大梁寶沈其性如春為熱而濕以得和平故類紅痰與童年合紀其方則為東其二為鵪首鶉火鶉尾其性如夏為甚熱而乾故類黃痰其德長生與年富力強合紀其方則南其三為壽星大火折木其性如秋為冷而乾德衰物悴故類黑痰與中年合紀其方則西其曰為星紀元枵娜訾其性如冬為冷而濕故類白痰與興衰老合紀其方則北羅計天文寶用云太陰在正交性同木金在中交性同土火月朓胸
