body:
  text: 占國國家政治人事禍福人君參贊化育人臣樊理陰陽至誠格天人定勝天何休咎之占然觀其微而加以修省亦何莫非王道之要乎況天人一理呼吸相通詩云昊天曰日明及爾出往昊天曰旦及爾遊衍夫大經大緯固在紀網之布而其他化育陰陽之細雖一端之著見一時之感應要皆參贊樊理者之衍兢兢也輯占國立象安命法定流年安命法此流年㒍國之流年象宗云定流年安命之法太陽交白羊宮出秒時此即日躔也以日躔加所用時看東方卯宮地平㻏上得何辰為命宮凡春分到為白羊非寶戌宮恆星有歲差天上之戌宮不能一定無遷蓋天星四十八象星每一象地下必有一物象以應之地下物象應天上星象吉凶響應凡交新年必有安命在定宮一年禍福皆依此宮分斷之在二體宮只斷在上平年候太陽交天枰宮出秒時再看是何宮度出地平環定為命宮斷之若安命在轉宮者捋禍福四季斷之每季洎安命宮總訣凡七曜所見吉凶皆應于人間各星廟旺升降或或在本宮或
