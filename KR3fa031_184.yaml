body:
  text: 地平宫命主星為月金几稱命星誤當年四季朔象宗云命主星時太陰主大雨水多且廣是金星則有風雨陰晴雨水是水星則風雲多雨少若已上星在主星位分不後雨時則陰晴風起微雨命主星月金水在災鄧未子午宫象宗云當年安命主星四季安命主星并朔安命主星是太陰或金星或水星又在災鄧未子午宫分內一宫主雨或三星內一星為命主星二星與相照主依舊多雨此節與前文略同若已上星在主星位分不係雨時則陰晴風起微雨命宫主星或金或水木或月與月金水交相照象宗云命宫主星或金或木或月遇太陰金水在災鄧未宫與金木月交相照月止與金木交相照或在命宫或十宫又是災鄧未宫亦主雨水頻比土稍減不為災命宫主星金遇月水在災鄧未水分與之照而災鄧未又作命宫或十宫有象重重為得不雨木月微此命宫主星土與月金水照又又降下象宗云安年命宮主星是土星遇太陰金水在災鄧未宫與土相照或在命宫或十宫又是災鄧未宫土星又當降下之時亦主大水命宫主星土遇月金水在災未水分與之照而亥未又作命宫或十宫值土又降下以冷潤失得不雨冷陰象雨以熱能致雨當熱時而冷陰勝陽故春夏冷則多雨當冷時而熱陽勝陰故秋冬熱則多雨
