body:
  text: 內有土星則年尊位高者有災若有木星則臣宰有學之人災若有火星則軍官軍人災若有金星則陰人災若有水星則吏人災若有太陰則陰貴人有主有災地理分為七界此原應敘入分野今先載此叄以聽體驗象宗云凡地理分為七界每一界分一主星從南起第一界是土星第二界是太陽第三界是水星第四界是木星第五星是金星第六界是太陰第七界是火星看其年安命宫是何各星中何星有力強旺則其界人諸事吉若其星無力衰敗則其界人諸事不順皆不利也卒文言第一界從南起土星此决定是前人歆杺此訣故齊例閈第一界土星理應從北起觀象緯真機自知
