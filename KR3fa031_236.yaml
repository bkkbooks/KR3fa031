body:
  text: 宮主天上有紅氣如火拼起彗星若十宮是風局主已上所願之事愈重又兼水星與火星相會或相沖則已上所應之事尤重若此時火星與太陰惡照則已上所應之事亦重若火星在小輪上升時則慧必顯大論十宮若土星在安年命宮或四季命宮或朔望命第四宮主天色黑墨暗並地震若第四宮是土局比前事愈重若土星與水星同度或相沖則已上所應之事亦重若太陰與土星惡照則已上所應之事亦甚重若土星在小輪上升時則天暗地震甚重四宮若火星在安年命宮或四季命宮或朔望命宮內第四宮又是土局無吉星與之相照卻有水星相照則土地上有火災並地震地裂發鋮四宮若安年命宮或四季命宮或朔望命宮內第十宮是風局或火土二星在此宮或太陰至此與惡星惡照則天暗地震一宮
