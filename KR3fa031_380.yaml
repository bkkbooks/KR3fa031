body:
  text: 水與火在一宫日生無福為婦人事死于法夜生有大權如有土惡照危險且多被騙詐二宫主外遊或寄養夜生心惡瘋疾三宫知未來事有福四宫懶惰早賤與親人不和好訟夜生管兵馬強死五宫大膽有力有權六宫十二宫同五宫然日生畢竟心惡有獄危死時極苦月加光照更甚夜生欠人債多爭訟被早下人傷七宫日生為妻受大苦心惡不免于死八宫日生失家業有瘋癡疾夜生心惡強死九宫心惡十宫常行水路大抵水同火亦有權不久即壞但當分别在何星宫在水星宫主聰明爽快在火星宫好兵在木星宫為官在土星宫行惡在日月宫做火內生意在十一宫死于戰爭十二宮被官責罰餘見上水與金在一宮日生進君有權夜生聰明諸事易成遲進有大權管朝建事二宮日生管間事爽快在東日東能文尊貴夜生在西日西大福大權三宮管教化事如禮部官四宮有學問在東先賤後貴五官大福遲未來自婦人六宮日生難于娶作生理吉夜生在東日東出外管船水行生意在西日西才能寶石生理七宮病苦難成家夜生有福來遲來日婦人但忌火土凶照八宮在西日生為無用人妻子難得大抵瘋癡夜生得他人財無病死在東作事易成福遲未有才能九宮善天文算數十宮有大名大權好色十一宮管婦女事多苦難十
