body:
  text: 以天一為火二杜故曰水火之杜也水火妃也自火梁四歲二及鶉火四周四十八歲凡五及鶉火而陳卒亡火盛水衰故曰天之道也考此占以歲星為主時陳火歲在星紀丑宫火在鶉火午宫歲至酉宫而陳復興以歲原與酉三合照是歲為第一吉星西人之語不謬也火在鶉火而陳火以火與酉原弦照是火為酉之煞星西人之語亦不謬也至火五及而勢不可挩亦與西人流年之法相類此可見是理非出西人而我中土自失之西人乃偶淂之耳至於歲星所在之國則不可伐此則中西無不知者哀公二十八年歲在星紀而淫于元枵是謂蛇乘龍梓慎以為宋鄭必餓則言其所属裨龜以為周楚所悪則言其所冲其歲星乖次之應昭公三十二年歲在星紀而吳伐越晋史墨曰越得歲而吳伐之必受其凶不及四十年越其有吳乎以歲十二年一周存亡之數不遏三紀非歲星順次之應乎覲此歲在酉在丑不失次均為吉惟同經緯歲即與金合不得謂吉此明太祖征陳友諒劉基所以有期以金木相犯日决勝之言也再諭西人之學與中法相同文獻通考載凡五星盈縮失位元精降於地為人歲星降為貴臣而西占亦有木星主官府之説熒惑降為童兒歌謠嬉戲而西占亦有火星主顛狂善言語之説填星降為老人婦女而西
