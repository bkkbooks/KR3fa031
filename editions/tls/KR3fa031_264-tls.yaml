body:
  text: 或金星来照命宫第四位宫主星又有力無凶照無凶照與之照第二位主星與命宮主又相吉照則主百物豊阜價賤當年當李要看土惡照月及五星在下降而水與土又相惡照再視土在何局若太陰當朔望時與土惡照及五星在小輪下降時原係上升主百物貴若又有水與土照應惡照則百物騰貴再視土在何局土在土局主五毅之類貴土在水局主魚蟹之類貴土在火局主中一切物貴土在風局主奴僕六畜之類貴命主星在四柱行疾若安年命宮主星在四柱內一柱上又行疾比平行大則物盛在命宮更美命主所在宮分四季占春分至夏至若在第十宮物盛原係貴字夏至至秋分若在第七宮物盛原係貴字秋分至冬至若在第四宮物盛原係貴字冬至至春分若在第一宮物盛原係貴字太陰與朔望命主星分有力魚力在何宮及界分廟旺太陰與朔望命主星校有力無力有力之曜在命宮或在十宮或在十一宮或在五宮又在分定度上界或在三面度上行疾又在廟旺宮度與吉星吉照主物盛
