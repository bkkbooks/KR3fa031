body:
  text: 第二主星所在宮之性第三命宮之性第四三角宮五星之性如主星在戍為日木三角第五朔後月初會五星之性或冲或方俱論第六主星同經星相近之性若湿多雨多乾多旱多性各不反覆不定朔望有金星在四角會通云朔望有金星在四角內其日有雨朔望太陰在四正柱亦主水朔望主星到溫宮會通云朔望主星到溫宮之時有雨水星在各宮交日光內幷退行占會通云水星在白羊戍巨蟹未獅子午雙女己加熱有木想合更甚在實在西亦同在巨蟹在北有熱風水在白羊在日光內在東天氣快養人若水在此退行即多病水在金牛在日光內大黑亂風在西養人在東有湿退行天好養人水在陰陽在日光內海中地內皆大風在西大風在東天情着退行人心悶水在雙女在日光內有熱風在西乾在東湿養人退行多妖言
