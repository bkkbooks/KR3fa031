body:
  text: 上諭在璣衡以齊七政視雲物以騐歲功所以審休咎備修省先王深致謹爲今欽天監歷象考成一書於節序時刻固已推算精明分厘不爽而星官之術占驗之方則闕焉未講但天文家言互有疎密非精習不能無差海內有精曉天文明於星象者直省督撫確訪試驗術果精通着咨送來京該部奏聞請㫖
