body:
  text: 矢之象盖日躔九宫矣躔十宫名磨羯仍自南而北其行緩緩山羊之上木近之躔十一宮名寶瓶十二宮名雙魚時多雨澤瓶汲水魚遊水皆濕勝之象也凢此十二宫各像各效皆绿黄道斜倚天體乃致時變不等如此設令黃赤以正相和即七政之距各地平宮之天頂經度恒等又何與效之有黃道十二象主人性天步真源云十二象論人性白羊主人狠戆大膽暗謀害人火之故金牛主人快樂好色奢華金之故陰陽主人聪明水之故有主意應無主意喜天文不淳良二体之故巨蟹作客月之故有家業性浮婦生此宮此宮作命宮善待家皆月之故獅子為善人老成稳當喜天文日之故雙女生人大聪明善讀書在地平東地平生人無不讀書者大义人能明深微之理雙女係水宮水主文章故云天秤主快樂能生利好色不甚朴實金之故天蝎大胆争開不怕死火之故失信火主反覆喜作亂火猛土之故難交土弱無心喜利土主貪寶瓶心野性固執土性不喜同人土冷性不喜笑語主不奏快雙魚為人小心明白性有主意善作客木亦主客多才技黃道十二宮分陰陽畫夜象宗云白羊陰陽獅子天秤人馬寶瓶屬陽屬畫金牛巨蟹雙女天蝎磨羯屬陰屬夜
