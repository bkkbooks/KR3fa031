body:
  text: 象宗云子生下取時用時辰牌畫取太陽高度夜取經星高度依法即知夲時時辰既真然後安命宫度有準若無定時辰牌及飼壺滴漏別有法取用若人口説個時未為準的或前或後不遇差二刻且將此時安一命宫又依此命宫取個四柱將七曜宫分度数排定却看當生人與朔近取朔與望近取望朔取日月相會之宫望取日月相望之宫日在地平上取日月在地平上取月日月在地平上取在東地平者看此宫分度数属何星強旺比四柱内一柱度数相同則安命度数真矣若此強旺星度與四柱度数前後多少不同時却將四柱內一柱度属于強旺星度数最近者取用如強旺星二十度四柱内一度二十五度將五度減去與強旺星度数同就此度数再安一命宫為真時刻真源云假如人生日一宫隂陽二度十宫磨羯二十七度十宫詼是寶瓶宓為磨羯字誤恐時不真生日前離望近日在地平上寶瓶宫二十度土為寶瓶主星寶瓶亦為土三角土在天蝎三度比二度近二十七度遠即將一宫隂陽二度改為隂陽三度所改者午時叁度度其差不過二刻假如一宫有二強星何以取如生日前朔日月會天枰十度生人一宫天秤十四度十宫巨蟹十八度四宫磨羯十八度兹日月會天秤十度是土星升亦是土三角亦是土三合照而土在磨羯十五度金星在天秤十度金星為天秤宫主星又係金界
