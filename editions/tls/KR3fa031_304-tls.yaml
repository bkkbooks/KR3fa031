body:
  text: 星是主星而世運主星亦是土星所以後勝于前也世運及四季主星行小限到火與火冲照火又為年命主若世運主星并四季主星强旺行小限到火星或與火星相冲四正照照又火為當年命主星其年必有反叛刀兵起十年方定國家依舊依舊不改也以世運并四季主星強旺耳世運四季行小限到火與火冲照火又為命主同在風局若二運世運四季小限與火星相冲或四正照火且在風局又為年命主星而世運主星亦在風局主其年天上見妖象有虹氣流星地上亦有大火災世運四季行限到土星土又為命主在水局及土局與風局若二運行限到土星土星又為年命主星在水局主其年大水在土局則其年地震地陷若在風局主天色極寒風雪大世運主星土與火在夲宫小限遇凶星若世運主星是土星或火星其宫分又属夲星宫分如小限遇凶星則四方有横事起年命主星行至弱宫而太隂在命宫又與凶星照又其年命主星此言年命主星定即是世運四季主星小限行至弱宫而太隂在命宫又與凶星照則已上所言災祸愈重且大
