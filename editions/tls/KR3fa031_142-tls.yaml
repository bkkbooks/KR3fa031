body:
  text: 考晦而月見西方曰朓朔而见東方曰肭西自行之故五星晨夕伏考土木舆日合伏後日在前星在後為晨見東合前亦有夕不見西必因星行已入限舆日對冲後為夕見東以日速星遅故日入地平星體却在地平上冲前亦有晨不見西必因星在嵗轮右金水舆日合伏後夕見西则以星超日之前合前亦有晨不見東必因星行已入限逆行舆日冲伏在日下冲伏後晨見東则以星繞日之後冲前亦有夕不見西必因星行已入限土定限距日十一度木十度火十一度三十分金五度水十一度三十分五星先後太陽出入象宗云五星先太陽謂東出後太陽出謂西入各有度数土木火離太陽六十度金四十五度水二十五度逺者不在東出西入之数一云金四十八度水一十四度土木火先太陽東出有力金水後太陽西入有力地平宫分正辅降考一宫十宫七宫四宫為四正角二宫五宫八宫十一宫為四辅宫三宫六宫九宫十二宫為降下角地平宫分隂陽上下升降及東西南北
