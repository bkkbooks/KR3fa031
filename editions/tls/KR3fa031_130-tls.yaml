body:
  text: 水星畫夜相助者木星土星性寒燥木星性熱而潤水星性随土木之性木星性熱潤解土星寒燥以此平和木助土水巨蟹天蝎雙魚宮屬水屬西北方主星畫金星火星夜火星金星畫夜相助者太陰火星性極燥金星性熱而潤潤多於熱在太陰性極潤以解金火之燥熱故平和月助火金既曰助則須有相助之實助有不同此章所言是其一端如以命宮言則星在命宮度最有權者為主次為助凢星在四正角為主二宮五宮八宮十一宮為助其夾拱亦為助界象宗云每宮分度數皆分屬于五星但多寡不同大抵星至此有力則度潤白羊初度至六度屬木星七至十二金十三至十二水二十一至二十五火二十六至三十土金牛初至八金九至十四水十五至二十二木二十三至二十七土二十八至三十火陰陽初至六水七至十二木十三至十七金十八至二十四火二十五至三十土巨蟹初至七火八至十三金十四至十九水二十至二十六木二十七至三十土獅子初至六木七至十一金十二至十八土十九至二十七水二十八至三十火
