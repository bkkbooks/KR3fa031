body:
  text: 七曜廟旺宫即升并諭度其分句背見命法取主星法凶象宗云自古諭七曜廟旺度數並無不同太陽在白羊宫十九度至二十五度太陰在金牛宫三度至二十三度土星在天坪宫二十一度木星在巨蟹宫十五度至二十六度火星在磨羯宫二十八度至三十度金星在雙魚宫二十七度至白羊十二度水星在雙女十五度至二十一度羅睺人馬三度計都陰陽三度巴上各星在廟旺宫分固旺在本度上為旺各星離旺度則無力何謂旺宫旺度言各星到本位上高貴有力與旺宫旺度對照者是各星無力若處曰廟者朝廟之廟也黃道十二宫分度數相照象宗云几宫分相照隔一百八十度為相冲一百二十度為三合九十度為二弦六十度為六合相冲照係相離仇恨宫凶言相冲即同相離仇恨也二弦照比相冲减半凶三合照主和厚親睦吉六合照比三合减半吉若一星在白羊二度與雙魚二十八度同一星在人馬二十八度與磨羯二度同一星在陰陽二十八度與巨蟹二度同一星
