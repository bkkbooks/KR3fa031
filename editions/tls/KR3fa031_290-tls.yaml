body:
  text: 陽到雙女宫十五度四十六分太陽正行在巨蟹宫初秒到此為至增太陽中行在雙女宫十八度將極增数二度十四分於中行数内减去合前数十五度四十六分至此後太陽漸漸下降冬季初起處太陽至人馬宫一十八度太陽正行在天秤初秒至此数亦無增此数合前数一十八度此為太阳最低处自春起度数至夏起度数計八十七度四十五分自自夏起度数至秋起度数亦八十七度四十五分自秋起度数至冬起度数計九十二度一十五分自冬起度数至春起度数亦九十二度十五分搃計三百六十日度此是太陽地心外輪所行度数依上古歷法一年分四季將一運亦分四季凡行一日准運一年考日行黄道與天元黃道不同心故其行必距地球遠近不等新法測显地極遠之點謂為最高極近之點謂為最高冲此二點者乃盈縮二行之界一年行六十一秒乾隆二年丁巳七政經緯宿度定太陽最高過夏至八度二十二分最早過冬至八度二十三分太陽至過冬至八度二十三分為加至過夏至八度二十三分為减有太陽加减表可查准此算則太陽到白羊宫初秒距最早八十一度三十七分查表應加二度二分零太陽到白羊宫八度二十二分為極增之數為二度三分一十秒過此加漸减至最高過夏至八度二十二分為减之始兹云太陽在雙魚宫一十八度將極增数二
