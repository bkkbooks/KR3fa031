body:
  text: 信主細民主人肝宜主人脾主土中鉛不善者第二火星性熱性乾其乾更甚于熱離太陽近故熱其光散如火受地之濕氣皆散故乾稱為小禍主人四十一歲外十五年主人胆大顛狂善言語喜反覆火性忽起思伏爭閥主兵以其猛也主黃疾疾有火在土中主鐵主禽獸草木之有毒者第一善者木星性熱性濕其熱甚于濕在土星火星之中離太陽不遠不近故熱熱比火焉少和光大多収地氣其熱不足以散之故濕梅馬火福主人血中以主衦言則肝繞血而下卻言主氣主人命五十六戰外十二年主人聰俊穩重性寬宏不慳各主官府主師長主客商一云水主經商在水之主經商必為行商木之主必為福貴主人肺宜主肝土中主錫第二善者金星性熱性濕其濕過於熱去太陽近去人近光大故熱光大多权地氣故濕主人命十四歲外稱為小福主好色喜歡樂歌唱不耐勞告土最耐勞苦主人腎宜主肺土中主銅中等第一水星性不熱不濕同太陽火星則極乾同土星則極冷稱為禍星同木星金星為熱為濕稱為福星主人四歲至丅四歲主人不穩重多浮好謀詐水至弱主之主賊亦水星弱之主主肺宜主腎土中主水銀中等第二太陰性冷性濕月無光借日光故冷離人近性理云月與人為近多收地氣其熱不足以散之故濕滿時稱為福星空時稱為禍星主小兒一歲到四歲為人不穩性浮好游為塘楑為水手
