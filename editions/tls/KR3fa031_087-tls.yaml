body:
  text: 而理無不同如八卦坎為水又為盜七政水星亦主賊八卦離馬火為戈兵七政火星亦主兵餘可類推八卦之重亦必更有所主而聖人不盡言俟後学之自會玆七政之性二書之言已不如易之詳其相遇也丽主之不同則散见于各卷中言均未詳祇可意會況七政之遇又復參錯不齊其象見于案中其理最耐玩味至為糌徽至為變化占騐之要正在此處當于各卷中取而合參之天文寶用云木金皆熱而濕性最和其效與惠有不同者木熱主其濕專主也金熱和其濕則木最惠而金次之太陰生明之天初濕勝于熱施惠為少賴其幾聖也熱甚等于濕以補之土火皆惡性及下物土甚冷為最害火甚熱害次之日與水性通中為忠為害未決也俟與池曜會而決之水會日或火所顕愈乾會土即最冷為惡一云水土性合然不能無偏于冷會木或金熱濕維均日光盛甚所會善則曲己性而本效減所會惡則借筱力而惡效增日有害原此也然固有大惠馬凡性曜與之距而遠也獲偕通中之照即于善者加其善而惡者減其惡以較諸曜惠更廣大莫及也七曜分吉凶漿宗云木星金星吉性星溫和故吉土星火星凶土星極寒火星性極熱故凶太陽太陰及太陽興太陰或興五星三合六合
