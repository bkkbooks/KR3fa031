body:
  text: 水日水星太陽會湿宫湿氣有雨以風熱秉湿之故乾宫熱乾有熱風傷人以風熱秉熱之故大抵有風風秉熱所致水月水星太陰會冲方乾温冷熱随十二宫之性水行疾月行亦疾故善于随物之性以爲性雜會冲月在子舆日弦冲會通雲月離日一百八十度或九十度月在寶瓶雨寶瓶多雨之宫以月秉之性相近而且又舆日弦冲當弦望之時爲得不雨日月合時土相冲照二至二分前朔望日月相會冲處土星若在一百八十或九十及一百二十及六十度必有雪雷冬至前土必合冲火方雷電否则日月舆火合而土又冲之始雷若止舆土冲主雪冷月離日或金冲在辰戌卯灾月離日或金星冲是月初離日金冲月并冲日故在白羊天秤天蝎雙鱼内有雷電雨金在白羊天蝎雷電天秤雙鱼雨月舆土冲照水金離水春分前朔望月離土星六十九十一百二十一百八十度土月皆在温宫黑雲常有小雨或水星金星離木星六十九十一百
