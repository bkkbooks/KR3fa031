body:
  text: 分即如北極出地三十二度所推之黃變赤度于表取赤道一百四十一度二十六分得黃道獅子十九度赤道尚餘二十四分其下表下格一百四十二度二十三分得黃道二十度兩赤道度數相較差五十七分為黃十九度二十度比赤之距度以赤道尚餘之二十四分與五十七分比例得二十二分四十八秒以加黃道獅子十九度為獅子十九度二十二分四十八秒即為一百三十九度二以此差数加于黄道一百七十一度零五分得一百七十二度十二分四十八秒此係正秋升度前用黃變赤此用赤变黃故于表俱反用赤道一百四十一度五十分查距度為十四度一十六分即黃赤距緯度北極出地十七度二十一分說見北極離十二宮表十七度對距度十四度查表得四度二十二分北極出地十七度對距度十五度得四度四十二分差其二十分與距度小餘一十六分比例得五分二十秒并之為四度二十七分二十秒北極出地十八度對距度十四度得四度三十九份北極出地十八度對距度十五度得五毒其差二十一分與距度小餘十六分比例得五分三十六秒并之為四度四十四分三十六秒先四度二十七分二十秒較後四度四十四分三十六秒差十七分十六秒與北極小餘二十一分比例得五分五十七秒以并先數得四度三十三分一十七秒為赤黃差度以此差數加于黃道一百三十九度二十二分四十八秒即前正球
