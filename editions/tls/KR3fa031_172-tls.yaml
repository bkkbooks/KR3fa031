body:
  text: 風木主風火星在舎或熱或乾太陽在舎大熱有小雨熱能致雨若不與他星有干則熱極亦能生風金星在舎有小雨天不冷比木星為冷不熱水星在舎天氣善變水性動無三日不變月在舎有雨有雲常變月陰象雲是陰之氣月行疾故善變亥夘未子午宮並月金水所主象宗云凢雙魚巨蟹天蝎三宮係水局獅子實并太陰皆主大雨水金星亦主雨并霧露水星主風雲微雨土亦主雲霧若當年安命主星并四季安命主星并朔望安命主星是太陰或金星又在夘未子午宮分內一宮月金水三星內一星為命主星而二星與之相照主依舊雨多命宮主星或月在夘未子午宮而金水與之相照主雨或金為命宮主星在夘未子午宮而水月與之相照亦然水倣此在水局應不必言在午亦兩者熱能蒸為雨也在于能雨者恒相同也太陰近朔望象宗云太陰近朔望主雨水朔望何以易雨日相合與相衡之故太陰行疾自行輪與倍離象宗云太陰行疾度數漸增主雨水氣盛之時太陰升高象宗云太陰在小輪上自下往上升高時主雨水從上弦至望日是升高之時未可以此為定宜檢自行水星交宮并行遲
