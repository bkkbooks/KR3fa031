body:
  text: 冬夏二至水星在天蝎離金星六十九十一百二十一百八十度大雨天蝎水分月在陰宫舆退行星冲照月在陰宫離退行之星六十九十一百二十一百八十度必雨亦宜論星之性金火冲照金星離火星六十九十一百二十一百八十度在天蝎雨天蝎水分雜照太陰舆五星照象宗云太陰舆金星火星相照主雨舆木星水星相照则風舆土星相照時極寒風雪太陰在水宫舆金照太陰在水星宫分内舆金星相照主雨多陰重太陰在水宫分内水又舆金照太陰在水星宫分内水星又舆金星相照则陰雨多且大太陰離一星又舆一星冲照太陰先舆一星相照及相離後又另舆一星相冲照後相照之星却实太陰所在宫主星主潤澤并風月舆宫主星冲照主風雨然亦宜論星之性附五星在最高冲七政行最高早推步所重而占駐書惟载于此卷目地亦可以類推见
