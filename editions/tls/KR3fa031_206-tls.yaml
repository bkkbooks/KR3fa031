body:
  text: 五星在最高衡天氣必有變金後太陽西入金星後太陽西入在天卯末三宫内一宫主當時有雨灾卯末水分若又有太陰水星相照主有雨尤多但止一件不全则雨稍减附冬至用時日占一年及用秋分占明年法會通雲冬至子時看天氣子至卯主七日半卯至午七日半午至酉七日半酉至子七日半共一月冬至後第一日主十二月二日主正月用十二日知一年大概不貞大抵明年雨多雨少占秋分以秋分本性湿故
