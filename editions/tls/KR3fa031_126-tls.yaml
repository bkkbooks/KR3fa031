body:
  text: 黃道十二宮分動靜會通云白羊天秤磨羯巨蟹蠏主動辰戌丑未金牛獅子天蝎寶瓶主靜子午卯酉黃道十二宮分為轉定而体及春夏秋冬并分南北象宗云白羊與天秤二宮太陽到此畫夜均停自白羊至雙女為北六宮天秤至雙魚為南六宮太陽入白羊轉北入天秤轉南太陽至巨蟹宮初度後漸轉于南至磨羯宮初度後漸轉於北此四宮號為轉宮辰戌丑未金牛獅子天蝎寶瓶此四宮號為定宮子午卯酉陰陽雙女人馬雙魚此四宮號為二體宮寅申巳亥白羊金牛陰陽屬春巨蟹獅子雙女屬夏天秤天蝎人馬屬秋磨羯寶瓶雙魚屬冬供以太陽所到而為春夏秋冬四時正令耳含無權附會通云日舍獅子月舍蠏土舍磨羯寶瓶木舍人馬雙魚火舍白羊天蝎金舍金牛天秤水舍陰陽雙女乃第一有權即本宮日寶瓶月磨羯土巨蟹獅子木陰陽雙女火天秤金牛金天蝎白羊水人馬雙魚為無權相天宮是升降附會通云日升白羊升金牛土升天秤木升巨蟹火升磨羯金升雙魚水升雙女水與廟宮周日降天辰月降天蝎白羊木降磨羯火降巨蟹金降雙女
