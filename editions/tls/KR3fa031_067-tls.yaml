body:
  text: 論占四海占天下占一方之不同占四海看黄道占天下看三角占一方看地平宫一方移步换形故湏看地平宫若論望氣不惟宜看地平宮而并宜看直十二宫则近天顶之雲氣將何以分東西南北三角之力最大故占天下者觀之若夫黃道者四海之所同故占四海者觀之論事之發與發之地象綽其機云各星行至本宮及三合宮所主之事乃發此言發之時也又云所應地方由葳旋分星而定此言發之地也各星行至本宮有不同有以在天之本宮言有以地平宮言有以流年行法言三合之行亦然西占所極重者三合三合即三角其實即中占之三合也中土凢占事之應論三合如課中支神見亥邜必待未日或未月為應之匕時但中土止論月建日辰西人論七政實在宮度耳月建即恒星行與日相合所謂子與丑合寅與亥合者是古時月建取乎斗柄之指佘因崴差在建寅之月斗柄己不指寅故造歴者並不論及所應地方由崴旋分星而定此論分野也分野憑宕而論固無庸辨其崴差以宮度論則宕有崴差而是宕有改其分野矣徐發之論止憑手宕不論宮度與此不同詳見分野見二十卷論恒星左行七政右行之理恒星天左行日月五星右行此是何理葢天一大形也天形圓
