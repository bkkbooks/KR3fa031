body:
  text: 會通云離就是度與沖皆凶而況尤凶離六十度與合皆志而合尤吉會沖等有二其一曰正相遇一秒不異其一不正相遇論本星光之丰數象宗云太陽前後光十五度大陰光十二度土木火三星各九度金水而星光各七度疑如大星追逐土星相離七度則二星沾光號為初會凡星光度數均者初會則各星度數減半同沾光不均者初會時度數多者先沾光少者光未及沾凡二星同度為相會但過一分即為相離雖相離力尚在為二星後光未盡若二星相會後或相離一二分卻又有一星在後追及體雖未到光已相沾即與後星又為初會各星相會並同此側此是論各星經度若各星在緯度相會或黃道南黃道北緯度亦同則下星淹卻上星故相會為尤緊再論二星相遇若二星同出度數對黃道的赤道度數相同如雙魚宮二十五度與白羊宮五度同或二星在兩虞日長短同如一星在陰陽宮二十五度一星在巨蟹宮五度似此之類亦呼為相遇若二星相會後一星前去追及一星即將先會星光移會之星如火在白羊宮木星在雙女宮金星在陰陽宮金星離大追及木星卻將大星之光移向木星似此火星與木星亦為相遇為金星先與火星六合照後與木
