body:
  text: 白羊七度陰陽十五度獅子二十度處女十四度天枰十二度天蝎十五度人馬九度寶瓶二十一度雙魚九度大祸白羊三十六度金牛二十六度陰陽二十五度雙女二十四度雙女三十度人馬二十五度磨羯二十五度雙魚三十度位會通云如日在獅子木星在人馬離日一百二十度今二星相距亦一百二十度為有位水星在陰陽離日三十度今二星相距三十度為有位虽在本宫位史注太陽太陰土離一百八十度木離一百二十度火離九十度金離六十度水三十度日要在前星在後月要在後星在前位主吉星加吉凶星减凶以上五項舍升分界位或遇二或遇三则主大權一不為權大權表太陽大暑立秋獅子太陰夏至小暑巨蟹土星大寒立春寶瓶木星小雪大雪人馬火星霜降立冬天蝎金星穀雨立夏金牛水星處暑白露雙女
