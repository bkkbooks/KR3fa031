body:
  text: 第二者言星主疆宇開拓為福甚大係凶星則主心神不寧又多憂慮諸事不如意也此推法與後文論日推法不同雜星在命前者可照恒星行推若雜星在命後者似竟置勿論矣大聖人大賢人出世凢一大聖人出世或一大賢人出世即將本年年有為主斷其凶吉一歲之事國家若要知國家一歲之事其安年命在晝者看太陽並第十宮生星安年命在夜者看太陰及第十宮主星民間若要知民間一歲之事看安命宮取最旺有力之星並太陰為主臣宰吏人若論臣宰吏人及公使人等看水星賢人君子若論賢人君子之人看木星故家老人農人若論有名望故家及老人農人看土星
  hash: sha256:ed9885dbedcb6877f6494907e3de7cdf1e311114caee029d5ae7095d67306cd6
