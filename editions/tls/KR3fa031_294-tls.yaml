body:
  text: 次火星主運宮雙女次太陽宮天秤次金星宮天蝎次水星宮人馬次太陰宮磨羯依上每運各三百六十年又交土星主運以次挑去扵土木火日金水月輸流推之一運初起時每一運初起時為太陽至雙魚宮二十度十四分為首盖是時土木二星在巨蟹宮同度以宮度分為首見上說此四千六百二十三之世連當依着西域紀年六百一十五年間説從世運初起時至此年談四千六百二十三年除十二運談四千三百二十年餘三百零三年係水星主運不錯初起是時巨蟹初度至六百十五年間即三百零三年也是二十五度一十五分以每年行五分推得之推行限法小限即上文所言行限每年交一宮四千六百二十三年之小限上文言水星主運初起時在巨蟹至六百十五年間即三百零三年小限至天秤三百年仍到巨蟹又三年到天秤小限逐年交一星初起是水星七曜逐一年交一星每年亦輸流交一星初起時是水星以土木會巨蟹也從水起首次太陰次土至六百十五年間即三百零三年是土星每一運分四季
