body:
  text: 恒星天步真源言赤道春分興黃道春分相合三萬六千年一次而天丈實用言就經度而論白羊宮起降娄二十八度止大梁十八度必應歲差之故當時黃道春分起初至後退行當娄二十八度耳其初星娄宿主風雨然古多而今少風雨言綠距赤道北較古為遠遇日加熱能歆風雨故也考新西法選要恒星經緯表娄宿在降娄宮黃經度二十八度四十六分黃緯度八度二十九分赤經度二十三度三十二分赤緯度一十八度四十九分以娄宿在今較古為遠則是古為近矣古近赤亦未始能遠于黃意者近字寫為遠字之誤近赤則近黃所以能遇日也今姑存其說見木春第勿深考祇以現測為至于赤道春分興黃道春分三萬六千年相合一次之説其所謂黃道春分者盖就恒星之春分度言耳恒星有歲差七十二年差一度零一十二秒照此推算亦不必滿三萬六千年而始相合意者歲差有不同耳然西法之歲差實多于今今亦姑存其說見占變第勿深考所應深考省宮分之性情興恒星之性情耳以言宮度之性情不本恒星而生則何以天文實用言謂天有性情皆兼星而言如宗
