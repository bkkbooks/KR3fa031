body:
  text: 上行午到子下行午時圈冬至到夏至為上夏至到冬至為下黃道月自行起扵最高左旋次輪心循自輪左旋而月在次輪之上右旋月距日一周次輪行二周凡対望必在本輪之內最近太陰在自行輪高昇力分強弱附孛行考月有自行輪次輪玆但論自行輪月平行一十三度一十分零三十五秒自行一十三度零三分五十三秒兩行相較差六分四十一秒即月孛行故平行歴二十七日三十刻一十三分零五秒而復扵原度自行必歷二十七日五十二刻一十一分五十四秒而始復扵最高月與日會在最高與日冲在最早上下弦在中距日月有中會寶會之分其詳見日指會通云月在最高力强最昇力弱高弦㽚弱與朔望光小光大卻相反五星在不同心圈高昇變性會通云土星木星火星在不同心最高為濕為冷在不同心最昇為乾為熱以三星本輪在太陽上金星水星在不同心最高為熱為乾在不同心最昇為冷為濕以二星本輪在太陽下土木火在歲輪金水在伏見輪分高昇考土木亦有自行輪并小均輪及歲輪玆但諭歲輪火星同金水亦有自行輪及伏見輪兹但求伏見輪土木平行一日土二分太四分五十几秒火三十一分金水平行與日同金伏見
