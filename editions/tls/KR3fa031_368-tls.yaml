body:
  text: 賤水上生涯離金逐木加光時亦有大權大福打抵來自婦人失光時亦有福少年得他人財物離金逐火加光時為婦人有大苦夜生有權心狠領兵火與月在一宮或五宮力大別宮作兵卒失光家事失苦且病離金逐水加光時作婦人事失光有病離金逐日少年有福離金無逐缺月離水星逐土星加光時日生啞聾夜生平常生理受苦失光時日生窮乞獄死或大病苦死離水逐木加光時為大人顯官福自讀書來失光時亦有福但官小耳離水逐火加光時夜生作大將必狠毒在角內力更大在降角不孝弟多強死失光日生作光棍與賊合死扵法夜生為兵大膽若月與火在一宮或五宮強死別宮病苦離水逐金加光時喜生利人爽快夜生尊貴為官月在第一宮更力大離水逐日風疾啞聾貧苦無定居年老稍減離水無逐加光時有學問能翳卜有福失光不喜學問多睡危與耳不使利月離如逐土星日生家事多失父母傷終有大福夜生貧病強死離日逐木日生福自父母來有大名富貴夜生福來遅喜遠逰離日逐火日生父母早死壞日身體有傷或少年死夜生心狠作兵卒在角內有力在降角早賤早孤火內作生計離日逐金日生無子或娶老婦財富子艱苦來夜生妻有福富貴為人好但貴無土星照離日逐水晝生心不善夜生作差役若有木星照為官吏
