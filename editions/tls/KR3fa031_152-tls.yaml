body:
  text: 知觀恒星而不及五星據其末而忘其本可乎西法扵恒星之性情又俱為此例于五星之性以為觀其理法似尤属有據觀象者欲操其本不可失其未其先觀日月次觀五星又次觀恒星比例雩五星之而再兼論其所主如中法紫歡垣三公主太尉司徒司空関道主葷路宫掖之類人次觀雲氣仍証之以四時憑之以人事庶幾無負其觀矣象宗西占所言三十星如人生椅于等象興中土所定恒星之形象名色不可通故不載入新西法有恒星受凌犯表取黃道左右每至八度囚四等之星列為此表新西法選要恒星經緯表并載性情凢在天經星一等二等三等皆載四等離黃道八度以內者載五六等小星在八度以內関係星座者另有成書又求各星在各地方天頂知北極出地度即知天頂距赤道以星緯與距天頂相加減即知某恒星距天頂經加九十度即知赤道東出減九十度即知赤道西入再恒星經緯表即知恒星同五星東出西入如欲求恒星之應入某宮用赤道在天頂變赤道不在天頂見求地平宮法輯恆星月北恆星酒算高㽚差崴星天文實用云開闁時適當吞分中西皆以是日時中星為徵
