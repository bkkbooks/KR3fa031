body:
  text: 象性象星象也性星之性情也星有本性有全性有合性有魚性有雜性有變性匕有增減有強弱有盛衰倘執一而諭無怪乎所占之不驗矣曰本性者如土有土之本性木有木之本性是也又如土值火而變熱完為土之熱不得謂火之熱火值土而變冷究為火之冷不得謂土之冷益其本性猶存也曰全性者土純乎其為土木此乎其為木無偏倚駁雜之謂也曰合性者如木與全合木力與全力又相等兩性合為一性也亦有數性合為一性者曰煎性者如土與木合力不相等而土與木或惟圥合或吉照或凶照或沖土星則羔有木星之性亦有一性而熏數性者若日月合璧五星連珠此謂七曜之大合吉何可言他若有吉星與吉星合或與吉星吉照而倍成其為吉者比匕有之又如凶星與凶星合或與凶星凶照如木與水合為風加之以土則雷雨且電其在人也水與大合而加以金剛為善于誰論而且多兇悪曰雜性者性不一也星不一星性不一性順逆不一善惡各珠謂之雜曰變性者同是此星同是此性或與太陽會雷沖而性遂異或遇黃道之宮不同而性
  hash: sha256:9c8335c607ec3b19c255df1bf0259d617d2283db4a288f4cde5ca3e521254a42
