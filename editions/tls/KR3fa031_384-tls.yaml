body:
  text: 命理命之為命世人每欲以小術推測不知本典天象相合或言人生天地間如太倉之一粟亦何関于天象夫道之所在不遺巨細即一物之細無不典天象相應何况于人第不思耳薛風祚之序天步真源人命部云談命者多家除煩雑不歸正道者不論近理者有子平五星二種子平專言干支其法傳于李虚中近世精于其道者談理徵中可以十得七八至于五星何茫然也五星舊法出自欽察而所傳之説甚畧如論日格不過有日出扶桑夘日朝北户巳日帝居陽午日過白羊戍日帝朝天亥五法論午宫格不過有日帝居陽日太隂升殿月南枝向暖木水名榮顯水孛騎獅子孛木蔽陽光木六法外願寥也他如天官文昌化曜諸説然騐與否皆居其半予于諸書多曾講求終不能自信于心也嘗讀洪武癸亥儒臣吳怕宗譯西法天文似稱稍備窃思其法傳之西域而十二宫分度有参差不等者乃獨秘制予乡求其説不得而不知其元奥正在于此壬辰于来自白下暨西儒穆先生詳悉恭求益以愚見其理為舊法所未及者有数種焉一為生時不真如子至丑
