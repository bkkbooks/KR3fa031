body:
  text: 無力取福德箭福德箭又無力取命宮度数主星夜生人取太陰太陰無力取太陽若太陽無力取福德箭福德箭又無力取命宮度数主星如箭畫生人取太陽夜生人取太陰若在十宮或命宮或十一宮或七宮或九宮可取在五度以下如上論若太陽是壽星又在廟旺宮度上夀主星即是太陽太陰是夀星又在廟旺宮度数上夀主星即是太陰若命宮與壽星皆有力又自吉照主其人一世身安聪明有機變又有夀橡此所謂夀主星者即壽星宮之主星取命照星法比取命主星法為詳真源云人命照星有五一太陽二太陰三命宮四十宮五福星見上人命不止一星为主必有星主人命单止一星命不悠攵取照星之宮有五一十宮二命宮三十一宮四七宮五九宮此宮比上四宮少弱五皆起五度前與五度上下之説合有星皆可取取照星之法書取太陽為命照星若太陽不可取不在取照星之宮即取太陰書亦取太陰若太陰亦不可取如上説即取福星或一宮或以上四位宮主星最强者舍升三角界位見象性五者之中有三為最强取為照星亦要在取照星之宮夜取太陰為命照星若太陰不可取即取太陽夜亦取太陽若太陽亦不可取即取福星或一宮及日月福星一宮之主星中最强者為照星
