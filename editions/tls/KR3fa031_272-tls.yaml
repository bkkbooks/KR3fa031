body:
  text: 痛吐血一切乾燥之症太陽與太陰恶照與火星性同太陰自不得地别無各星惡照則同金星之性兵戈盜賊火土冲照先看交年命宮并四季命宮主何宮分若火土二星相冲或二弦照則有災祸征之事火土冲照在四柱火土二星在四柱宮弦冲則其事尤大且急火星在太陽光下若安年命之時火星在太陽光下則其年有災祸征戰之事每季安命宮之時火星在太陽光下則其季有災祸征戰之事太陰與太陽相會或相沖時取一命宮此時火星在太陽光下則其月有災祸征戰之事相會應上半月相冲應下半月火星在太陽光下又在四柱或轉宮火星在太陽光下又在四柱或在轉宮則災祸征戰之事更急且大安年命在書火星與太陽冲弦又在轉宮若安年命在書火星與太陽相冲或二弦照又在轉宮則小人反叛
