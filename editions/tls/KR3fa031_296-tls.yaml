body:
  text: 每一運分四季每一季有一主星不問何運第一季是火二季是太陽三季是水四季是土並與運主星間伴其世運四季命宫第一季春并第二季夏每季談八十七年零二百七十日第三季秋并第四冬每季談九十二年零九十日安命宫凣世運并世運四季并當年各有安命宫若取世運命宫待太陽到雙魚宫二十度十四分見上看東方是何宫度出地平環上就将此宫為世運命宫其世運四季命宫第一季并第二季每季談八十七年零二百七十日第三季并第四季每季談九十二年零九十日已見上文取命宫之法與上同若休着上古取世運安命宫并四季并當年安命宫之法并看太陽至雙魚宫二十度十四分見上此時東方是何宫度出地平環上即此昰安命宫度数又世運每一年挑一度法凢世運每逢初起時雙魚宫二十度十四分起每一年挑一度三百六十年挑满三百六十度又係交運又從頭挑起凣挑至一宫數度處看其度是何分定是何星分定度数以其星為主断其吉凶又安世運命宫一年行一度法
