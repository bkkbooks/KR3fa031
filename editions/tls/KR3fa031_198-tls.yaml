body:
  text: 雷電冬至减冷火月火星太隂會冲方湿宫有雨濕勝故熱宫乾宫有火熱紅雲熱勝故夏至雷火必發大坻天氣有變火金火星金星會冲方亦爲大門開春分秋分水極大夏至雨冬至减冷定有兵起見開門有三條註火木火星水星會冲方春分風冬至雪夏至雷電秋分大風熱宫乾宫大熱大乾春多風之時火與水两性合爲風火行水亦行故也秋當氣之時故爲風且大夏當熱之時火舆水两情乘马爲雷電火性猛烈以水抑之不必橫撞所以或雷光必四射所以成電冬當凝固之時非火则水氣不上行何以乘火氣上行凝而成雪金日金星太陽會濕氣宫有雨四级皆有雨夏至雷同火金金月金星太陰會冲方小雨春分濕氣雲夏至小熱秋分雲冬至雪天氣亂金潤月濕故雨日小者較之土日之開水門爲小在春且岁濕氣并久雲陰在夏则可以减夏之暑熱秋分濕少而雲多冬至并凝雨爲雪皆因特以成之理也金水金星水星會湿宫風雲以潤而合濕宜乎雨矣惟主風雲者水性使之然也
