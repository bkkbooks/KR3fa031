body:
  text: 占歲五穀豊百物盛衰詩云民之質矣日用飲食大禹謨云德惟善政政在養民水火金木土穀惟修然則即日用飲食之中具水火金木土之用栽成輔相匪細故矣天官書候歲美悪謹候歲始决八風八風各與其衡對旦至食為參食至日胅為稷眣至餔為黍餔至下餔為菽下餔至日入為麻欲終日有雨有雲有風有日風起有雲其橡復起各以其時用雲色占種其所宜或從正月旦比数雨日直其月占水旱為其環城千里內占則其為天下候竞正月月所離列宿日風雲占其國又云冬至短極縣土炭要决景歲星所在五穀逢昌其對為祔乃有此天象之著于上者七若夫人事之當盡所貴于因時制宜周制司馬法六尺為步步百為畆一畆三甽百畆三百甽成甽平甽易甽俱各有法後世溝洫不講而甽畆之法亦廢所謂南東其畆者不知何為豈得委于生圅之繁田不足耕而民故衣食不給乎禹首辨土性周官有草人掌土化之法間當閲農政略知原野澤國山畆糞壞法各不同并知土性之有淡者則宜于鹹故糞田有用鹹滷者土性之有燥者則宜于潤故糞田有用麻
