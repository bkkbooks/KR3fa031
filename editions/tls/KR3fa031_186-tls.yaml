body:
  text: 命宫主星火與月金水照及金水又逆行象宗云當年安命宫主是火星遇太陰金星水星在灾未宫分與火星相照火又在十宮或在命宮或十宮又是灾未宮主無限大水若金水又係逆行復遇惡星相照則水災尤甚命宮主星火遇月金水在灾未與之照而灾未又作命宮或十宮主水者以熱能發水也水非熱勢不大太陰在安命宮離土遇日象宗云太陰在四安命宮年季朔法遇土星後離土星却遇太陰主夏季極熱冬季極寒冬季極寒太陰離太陽後又遇土太陰在安命宮離火遇金或離金遇火象宗云太陰在安年命宮或四季命宮或朔曾命宮或二法時遇火星後離火星又遇金星或先遇金後遇火主雨多月金火以熱故雨多太陰在安命宮與土木火各星照象宗云太陰在四安命宮與土星相照主冬季極寒多雪與木火二星相照則多風火炎上亦能生風太陰在四正柱上若安年命宮或四季命宮或朔望命宮太陰在四正柱上主大水安年命宮見之應在其年四季朔望則此太陰在六陰宮象宗云太陰在當年安命宮星監內第十宮九宮八宮四宮三
