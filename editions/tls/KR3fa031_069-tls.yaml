body:
  text: 圓之為物必有所包裹以成表程西法言天有几重昰也日月五星右行而恒星天左行右者右左者左左環右抱而形愈聖圓氣愈糾結千秋萬崴運行不息無有懈時斯天之所以大且乆也天之氣內運自于至午而仍後于子人之氣為天所付不能內運而有聚有散故形不能長乆道家益天地之道轆轤內轉亦可長生乆視但馬形有限為氣亦微終不如天之無極也論各日圈不同心及各緯偏倚之理各曜何以有輪又何以每偏于各方而不正居其中其必有所以然之故存馬夫太極居中一分陰陽便落形氣才落形氣便不能無偏矣故太陽亦有小輪其為偏也無幾太陰之偏漸多各星之偏偏之多莫過于火星其義理可想然此之偏以目輪言也夫次輪與崴輪亦自有偏則又何也不知是乃從日之偏也從日之義宣城梅文𪔂已為發明星以從日偏之外又復加偏要亦非無義理也不惟偏且有倚黃倚于赤白倚于黃各星之經又各倚于黃又倚之外復加倚前緯後緯之分因是以立知此象者已其人况能明此理乎西法但能發明此象而不能發明此理然實有至理存乎期間似不可不辨也論觀天者不可以不觀地與雲氣幷不可不知音律與分野善言天者不可以不知人益人道格天也尤不可以不知地益地道承天也地有南北之殊東西之異天象合雨而應乎某方
