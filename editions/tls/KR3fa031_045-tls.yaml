body:
  text: 本朝時憲定法於太初三統大衍及授時都所不取祗因崇禎歴法將周天定為三百六十度一度定為六十分一分定為六十秒一日定為九十六刻一刻定為十五分日平行定為五十九分八秒月平行定為十三度十分三十五秒朔䇿定為二十九日一十二時二刻一十四分通閏定為十日二十一特舉氣盈之名無所用之崇禎以戊長為歴元本朝復以康熙甲子年為歴元月既有緯度而五星亦有緯度種種立法密於前代我聖祖仁皇帝世宗憲皇帝御製數理精藴高出百王垂法萬世有司遵行敬授民時毫髮無今皇上德參化育學貫天人猶宵旴不遑惟天道是研復欲旁求俊又以大昌明是理為朝夕修省之資聖所照無微不燭無隱不彰纖芥小臣何足以仰承欽命惟一是生逄盛世不敢自棄不自揣擬為芹曝之獻伏思徃古之明天象者未有不明歴法者也乃有不明歴法而自以為明於天象者得其一端而失其全体其可乎推測陰陽漢之時以董子為宗董子所論故為儒者之格言而劉向之傅洪範五行班氏繼之歴
