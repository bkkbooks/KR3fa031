body:
  text: 各年吉凶若論祸福先從土木二星同宫同度分并同年安命宫分起第二年論第二宫第三年論第三宫至十二宫華第十三年又從丙命宫起從前挑去又看二命宫主星并逐年流年安命宫主星與吉星照或凶星照于此詳其各星強弱以強旺者為主断其各年吉凶旺星又看土木二星同宫同度并安年命宫主星何星有力廟旺又有吉星相照则尤有力如此主王者出世其性依旺星之性若旺星在四五柱上此下必少一句可以意會或四輔柱上則後代子孫中不當得位者出而奪之若在第三宫或第六宫或第九宫或第十二宫則應外人起而奪之若強旺之星是土星主出世之人年見識老成遠大亦主故家若是木星主其人有學有德若是火星主其人性剛好殺若是金星主其人性善修德若是水星主其人能言語善機謀若是太陰主其人家富且貴又有才能若是太陽主帝王與旺諸國来朝
