body:
  text: 火能發土之性而成為大水火熱宮風水與火俱成風冷宮冷乾水火俱成乾性春分風雨夏至同因春夏熱而成秋分風雲冬風雪因秋涼冬冷而成木日木星太陽會冲方天氣和天晴小風細雨細雨和氣所生几物皆冲和春分秋分風夏至小雷冬至小冷木月木星太陰會冲方有風天晴冲和湿熱冷乾所在宮之性俱不大不小木主風月性疾故相合為風湿熱冷乾指宮氣而言木火木星火星會冲方熱宮乾宮大熱有風湿宮大雨熱極所致雷電雷為木所電為火所發春分風春氣大也天氣不安夏至熱大雷秋分風火係散之時故為天氣不安冬至天氣冲和木金木星金星會冲方天晴和生物皆養人湿宮雨濕金以成而别宮天晴風熱宮則熱性助木而生風木水木星水星會冲方有風熱宮內天旱熱風亦為門開火日火星太陽會冲方熱宮大乾大熱湿宮有雹宮性濕或為火日遇出成雹外大雷雹冷宮風極大宮性冷則熱性外奔而生風春分秋分風乾夏至大熱
