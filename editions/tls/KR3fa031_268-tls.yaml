body:
  text: 占異旱澇疾疫兵伐蓝贱且夫陰陽之所係大矣無微不外乎陰陽陰陽貴于和而不貴於毗毗於陰毗於陽皆足以致災異人為天地百神之主和氣積于宥密則休徵充于宇宙洪範言五皇極皇建其有極歡時五福用數錫厥厥民惟時厥庶民於汝極錫汝保極而其道端在有猷有為守有守之念不临不之受而康西色攸好德之錫由是四海仰風共保太和休哉何其治之盛也然所謂保合太和者苟一物不得其所亦足以天地之和旱澇之召有所不免智者洞其機而豫為之足是或一道也輯占異旱澇詳見占嵗會通云土星為夲年主星風水詳見占嵗火星為夲年主星天氣炎熱火災多熱風雷電河乾井潤詳見占嵗水星為夲年主星看同何星相合相沖相方在地平上水多河在地平下水涸河乾詳見占嵗疾疫看二命宮二命主二太陰象宗云先定當年安命宮又定年前朔望命宮看此二命宮并
  hash: sha256:d9afeeb2188567702f14aa6316f08f800e0c43b88cee73df440bbf59ce2c0691
