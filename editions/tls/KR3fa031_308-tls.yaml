body:
  text: 命法中庸云天命之謂性朱子註云命猶令也天以隂陽五行化生萬物氣以成形而理亦賦馬猶命令也為天地立極為生民立命為萬世開太平者人君也一人有兆民頼之此人君所以不言命也至于相臣者亦必存若已推而内諸溝中之心而後可以輔太平而背委之于命乎其餘若而人要當以知命為先君子固自有立命之學然不知命亦無以為君子况乎後之人以行氣之軀遇外物之交欲念重而妄念生能知命者有幾不知惟天陰陽下民命之為命造化之巧出于無心而上下四亭無不聦合使閨房里巷之中有愚夫愚婦能轉相告曰富貴利這寔有命存將見一言之醒悟一念之轉移消却凭許雄心淡却凭許謟念不亦足以助化于下乎夫至于艳衾與祠者而亦知寔命不同周家國睢鵲聚之化如是如是是命之當知豈非為世人效法君于之基王者化民成俗之夲輯命法推人命十二宫法推算地平宫度見後象宗西占云凢看各星在何宫分一命宫者何言人出生时看東方是何宫分地出平環上即為命宫命宫係人性体壽数一
