body:
  text: 朔虗五日五百九十二分氣盈五日二百三十五分一歲通閏一萬零二百二十七分即十日八百二十七分三統朔虗氣盈通閏三統月法二千三百九十二以十二月乘之謂三百四十八日又五百一十六扣日六百通共三百五十四日三十分朔虗五日五十一分氣盈五日二十分零二五一歲通閏八百八十一分二九三即十日七十一分二九三零假如三統十二月朔策之零數三十分求太初得若干以一一六乘得三百四十八分合太初求三統置三百四十八分以一一六零除得三十分合三統通閏之零數七十一分二九三零求太初以一一六乘得八百二十七分合太初求三統置八百七十二分以一一六零除得七十一分二九零三合太初歲實三百六十五日四分日之一又二百三十五授時歲實三百六十五萬二千四百二十五分其零數通太初得二百二十七九五㨿授時法算四分之一欠七十五分小数太初月法二萬七千七百五十九分投特別實二十九萬五千三百零五分九十三秒授時求太初以九四來
