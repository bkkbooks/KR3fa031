body:
  text: 在分定度或三合或順或逆在廟旺在本宮主其人高貴在降宮主其人低微在升宮主其人發連遇吉則吉遇兇則兇若星順行諸事順遂逆行凢事顛倒一切星象皆照此俐推之入城登位安命若看人主之命不知其年月日時則看其域與登位之時是何宮地出地平環上安一命宮以斷其始終吉凶日月會沖二弦視星在太陽光下若太陽與太陽相會想沖或在二弦此亦呼為四柱有吉星在太陽光下逆行則減吉有兇星在本宮或在廟旺宮或在分定宮度則兇不為兇日月會沖二弦視太陽與星在地平何宮在四柱四正主成全立之事大立在四企望成立功刀減半在四弱則蹭蹬不成全無氣力以親星到命宮流年此是西法看君王登位時安一命宮又看宮度數并主星取一命主星及命宮主星并太陽太陰在何宮分占君王應者日月又看命宮出地平度對黃道的赤道度數與度此論安命赤道度又看命宮前有何吉兇雜星出地平幾度對黃道的赤道度數幾度此論命宮前雑星之赤道度以命宮赤道度數與雜星赤道度數相減餘剩以度一度準一年幾年至吉星之度則主其年大與旺也照恆星行推若此星係雜星內第一等
