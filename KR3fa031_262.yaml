body:
  text: 火星主一切辣物并兵器水星主金并一切花樣及淺色之物太陽與水星同太陰與金星同土木主物價分貴賤象宗云九木星主物價賤物盛之故土星主物價貴物衰之故宮分所主象宗云若宮分是土局主一切五毅之類若宮分是水局主一切水中所産生之物若宮分是火局主一切中所産生之物若宮分是風局則干係奴僕六畜之類各星力強弱在本輪上升下降及在地平上上升下降各星若力强又在本輪上升及出地平璟上升主所屬之物賤原係貴字各星若力若又在本輪下降及西落時主所屬之物貴原係賤字細看此篇論物之貴賤與盛衰不同物盛則價賤衰則價貴安有星力强在上升而反價貴為物衰之理亦安有星力弱在下降而反價賤為物盛之理故不揣目陋揆之以理將貴賤字互易庶與物理相符下同木在命宮與宮主相照及金照命再看四二兩宮主星若木星在當月朔望命宮內又有力又與朔望命宮主星相照
