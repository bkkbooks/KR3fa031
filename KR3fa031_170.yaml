body:
  text: 以土抑火而火之發必毒以陰抑陽而陽之性不和大扺木不抉水則風不長水不挾火則雨不大金火不挾土則雷不壞物木火不挾土則風不傷人情狀既繁難以枚舉效驗自別理可類推又星之冲會仍復辨其宮度雖不論干支而干支已寓於其中仍復占以四時雖不論月建而月建已存乎具內只此風雨雷雹霧露霜雪得其常則百工敘失其常則百事矣然風雨之來其大者為天象之徵其小者為地氣之召惟考天象而不考地氣但知陽而不知陰之學也如江南芒種後逢壬入梅為梅雨江北並無梅雨而惟長伏水蓋水至伏而每漲猶水得火而勢浩大也史記天官術云自華以南氣下黑上赤嵩高三河之氣正赤恆山之北氣下黑上青勃海岱之間氣皆黑江淮之間氣皆白地氣有南北東西之不同則其為風雨也其不關乎天象而小者但觀雲氣可以得之其有關乎天象而大者應之多寡要亦有南北東西之懸殊審幾者其靜體之可耳輯占時星宮性情七曜在舍占天時會通云土星在舍冬至天寒夏至天溫木星在舍天晴氣小
