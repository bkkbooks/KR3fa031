body:
  text: 若照星之前無星無星合亦無照亦無星可照看照星在何星界其界星即為許星如十宮在白羊六度無星無照白羊六度乃木星界即取為十宮許星有兩星兩照星兩照雨許星或一星一照星一照一許星同在一處即取近者倘同在一度可並取許星在前後遠近不同取用之法如一宮在金牛七度金牛十二度有月六十度照陰陽十二度有火星陰陽十一度有月九十度照其度亦太陽一百二十度照此說不甚明白不言誰為照星誰為許星使後人何後頻會細思必是太陽是其照星火星是其許星行到陰陽十一度月為主有月九十度照故其下即日為主乃大陽一百二十度照其下即火星為主火夲體在度所主日月與日亦有所至但比火分數少耳前說金牛十二度月六十度照并陰陽十一度月為主亦有不同從金牛十二度到二十四度是月界月光十二度若月在滿時月比星力大不在滿時則與星相去不遠若到陰陽十一度為九十度照力弱已不如星矣若許星在照星前算時要從照星起不從許星起如照星金牛六度十分為人命一宮一宮為照星木星在金牛三度二十六分入十二宮內在命宮前算時一年起金牛七度不起金牛三度九星在夲宮五度以下算為前宮五度以上方算為夲宮而取照星取行度却在寶度不用除去五度此雹論前後十二宮為一宮前
