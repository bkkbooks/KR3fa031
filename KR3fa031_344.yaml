body:
  text: 求地平宫法求地平宫命法中之大法也本應敘入考定真時安命法後因法大且繁故另列為一卷其義已見象度中所引宣城梅文鼎諭説而其理又見命理小序引薛鳳祚敘言慈不復贅卷中惟及用表而不及弧三角算取其捷也輯求地平宫法算地平十二宫法用弧三角算法另具弧三角美定十二宫不易用表美稍易故時載用表法有用天球量者又用于表但製器非極精細不準第一法赤黃二道距度有黃赤距緯表見新西法第二赤道在天頂黃道變為赤道度第三赤道在天頂赤道變為黃道度第四赤道在天頂變赤道不在天頂度以黃赤道差度加減前淂赤道在天頂度即赤道不在天頂度從白羊初度至雙女三十度減促天稱初度至雙魚三十度加假如假如北極出地三十二度壬辰四月初七日申時刻分日躔黃道金牛二十四度一十三分從白羊美起為五十四度一十三分申時過午四小時一小時十五度共六十度加前五十四度一十三分得一百一十四度一十三分為黃道在第十宫天頂上
