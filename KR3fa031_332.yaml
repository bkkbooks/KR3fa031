body:
  text: 回年必求日到原宮度而恆星退行則非夲生宿度能當以嵗差進除原宿度始可恰當原宮度本朝七政經緯度時愚書七政下有宮度有宿度嵗差已算係每日子正度數回年之名何為而立曰回年者生時日某宮度分後逐年日仍回至其度分故曰回年日仍回至其度分則非其日其時之所能必或前或後或早或晚日與時所不論止求其日回至生時之原度分而後已日回至原度分而餘耀又復參差不齊與生時之七政大異以之較對生時之七政不天象各異而安名亦復不同此即一年中吉凶之大象也人生各有原度則各有回年各不相同夲于自然非由造作以見消息于理為最勝若夫沅年月日此則未免近于何矣但西人言之津津且前人亦不之葉故并載後蓋不敢身賀也流年流年即象宗西占小限行法流年有流年之月日時流年一年一宮三十度行三百五十日一度十二日一日五分如今年生日日在天稱十六度明年是第二年即在天蝎十六度十三年又在天稱十六度各照星十二月行三十度一月行二度半同上流年行法日月福星一宮十宮及土木火金水取為照星者俱一年行一宮求照星流年幾時到某星如月在磨羯二十三度三十分為照星
