body:
  text: 朔望占天時法會通云看朔望主星是日月並看天及主星所在宫寒熱燥溫命宫主星及命宫主星所在宫寒熱燥濕及五星此五星即所主星所在黃之道宫之性去宫如宫為白羊即火星之性上者局此看宫又看十二宫之四角內先命宫次十宫次七宫次四宫及上來者十一八二六下去者之性以掠其往來消息十二九六三又看朔望及上下弦後月離五星六十九十一百二十一百八十度即然沖以占杅來再看主星同相近之經星相助何等之力令主星是濕各星性亦濕即兩多俱乾即旱多各性如不同為天氣多變各地方旱潦不同看各天頂經星同五星之性其地方不遠旱潦相反者以此凡在今地方覲晴雨日日覲東方出地平覲星之東出地平仄大頂上星不遏一年陰晴可以盡知占歲此九月內筽朔望亦要美上下弦問有來去消息月內占晴雨四法會通云朔時習與日月相會宫之主星或會或沖或弦照其日天氣必變要看主星及主星之宫之性乾則晴濕則雨月與朔望宫主星會沖弦此單看月日可並看二法月到朔月命宫如安命在白羊一度月到白羊一度天氣必變如上古三法月命宫到主星天氣必變取命宫幾時到主星以命宫赤
