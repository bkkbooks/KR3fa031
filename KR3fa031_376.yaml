body:
  text: 官末詳妻子俱遲三宮是日本宮或在升或在木金水本宮並其升內均管教誨事若有火或土照合為人心惡姦貪日在四宮有火土照凶照要殺父壞家害身日在五宮尊貴好友若有金會或六合照還有大貴之望大抵來自百姓前日言縱有凶星合不能壞事因宮分好之故不過害子女耳如止有一日在內福小子女多損日在六宮大艱苦有痛疾如火在一宮有歡有官終要早死不死壞家如十宮內有吉星則有福日在七宮若月在一宮或十宮有火權在本宮或木星宮權更大在七宮同月同福木又在別角正角主為福德帝王如大或土在二宮或八宮要失權失權時更有凶禍在七宮或別宮水月在一宮內有大學問並以土學問不善用夜生日與土同在七宮金水亦在日生或在十二宮夜生或六宮金水土亦在俱主不生子女如內監日在八宮父早亡若有火土在內或吉照人有風疾在八宮月在衝又有火土照多病從頭上來如木興火吉照或相合病可醫土同日在九宮多出外做佛區有凶星照出外苦惱日在十宮晝生在本宮或木星舍升為帝王或為大臣自父母來若火在別角正角從若惱得有火在七宮月光滿照火或在一宮或十宮主有大權但應死于獄有火在二宮或九宮與月凶照或同月火在一宮內謂日同同上在十宮如上説本宮興木會升無火照合木在別角正角月亦在角正角且
