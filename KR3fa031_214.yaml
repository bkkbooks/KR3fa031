body:
  text: 各星到有椎之時吉凶皆如其性如水到天枰則天下多出才人當論各宫之性及各星之性日月交食交食搃論交食歴指敘云日月薄蝕宜論其時論其地論時則正照者災深論地則食少者奘減然月食天下皆同宜尃記時日食九服各輿并記地迨于五緝恒星其與二曜各有順逆車達之性亢害承制之理方隅衝合之勢會通云太陽太陰光能利物其失光自有所害要見其害之所主要見其害之所在又當究其為害之時害之作不但在日月更當論五星與太陽太陰相會相冲相方弦照也大會掃孛不常有日月食常有極当留心中會天地大數論中會而其應驗仍論視會世蓮等均同此理會道云日月食吉凶事從中會算起不司寶會从中會作十二宮掾歴情則冚論實會與視會地平園午時園會通云日食所在宫地平園午時園用赤道宫界不用黃道宫界送宫會通云日食有送宫如日食在東送宫為命宫日食在西送宫
