body:
  text: 何時凡土木二星同宫同度所應之事已詳于上要知其人何時應出看當年安命度数至二星同度處或者當年安命宫度数至強旺星所在度數計幾宫幾度每一宫談一年每一度談十二日餘六分之一謂二大時却是其人出應之年將夲年命宫為主又將土木二星同宫度之年安年命宫小限恭看一切吉凶依此二宫推之謂夲年命宫及安年命宫凡土木二星二十年一次同度祸福應驗其最應驗處在二百四十年交局時見上世運推算取用公九法一世運主星法一世運小限文年交宫法一世運一宫管年法一世運小限逐年交星法一世運四季交星法一世運及四季及當年安命法一世運每一年挑一度法一世運命宫一年行一度法一世運命宮小限法論太陽起地心跟輪所行度數象宗云上古智人曾推究一切天下大事断决精詳名曰世運凡一運談三百六十年每年分四季春季数起處依歷法所定太陽在雙魚宫二十度一十四分太陽正行在魔蝎宫初度即太陽極增之数太陽中行在雙魚宫一十八度将極增数二度一十四分添入中行度数内合前歷法之数共二十度一十四分自此太陽上升此春季也夏季初起處太陽到陰陽宮一十八度太陽正行在白羊宫初秒此處無增以太陽中行既是歷法一十八度之数此為在最高處秋季初起處太
