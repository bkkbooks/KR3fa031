body:
  text: 升度二百七十一度零五分已初初刻初分在午時圈距午後三百度以此為根求明年日進原度加八十七度一十二分共三百八十七度一十二分除全周得二十七度一十二分對時為午後七刻零三分四十八秒即一小時三刻零三分四十八秒若求第二年日進原度則再加一個八十七度一十二分立表取用可也可也根照原用依嵗是求日進原度無差不遇高行高沖有行起加減處亦不一定未免加減有不同然高行一年亦自無幾即有差亦為數甚微也有黃赤升度表几推步書俱簡下同有日行午時圈表時四分對一度時一分對度十五分回年表再以當生距各節氣考正為如歌細推仍算日年一二三四五六七八九十十一十二十三十四十五十六十七十八十九二十三十四十五十八十一百八一七二六三四七一六二五三三六一五二三三二五一四二二三一四一二二一三九二四四一三八度七四一八六三七四二九六三八五二九六四六八六一二三四一二三四一二三四一二三四分二四六八二四六八二四六八二四六八求回年嵗差嵗差一年退行五十一秒算回年必求日原度分生時某宿加某度分到回年則有嵗差有嵗差非原宿度能當原度分矣如生時角三度當某度分算回年必角一度當角三度回月亦然
