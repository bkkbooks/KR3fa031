body:
  text: 左者比右者強五星上下升降會通云各矅自最早至最高皆為上升自最高至最早皆為下降土木火與日會定在其小輪最高與日冲定在其小輪最早金水與日合伏于上定在其小輪最高與日合伏于下定在其小輪最早最早至相會為升相會至最早為降月在自行輪高早見日指五星在太陽光下會通云五星在太陽光下不能主事凡事皆太陽代之星善則善星惡則惡如土星在日光下土不能傷人太陽因有土星之性反能傷人星在太陽光下離八度三十秒在太陽心離十七秒在太陽心不吉月五星在太陽東西椎分大小會通云月自朔至望屬太陽東自望至晦屬太陽西又上弦至望望至下弦屬東土星木星火星同太陽相會至相冲屬大陽東在小輪前半相冲至相會屬太陽西在小輪後半以輪言金星水星相會至相冲屬太陽東相冲至相會屬太陽西以伏見輪言
