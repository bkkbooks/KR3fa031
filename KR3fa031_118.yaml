body:
  text: 元枵星紀折木大火壽星鶉尾鶉火鶉首實洗大梁降妻娵譽寶瓶磨羯人馬天蝎天秤雙女獅子巨蟹陰陽金牛白羊雙魚立象安命十二宮天人公用卯寅丑子亥戌酉申未午巳辰一宮二宮三宮四宮五宮六宮七宮八宮九宮十宮十一宮十二宮直十二宮衡十二宮斜十二宮百游十二宮辦宣城梅文云渾圓之體析之則為周天經緯之度周天之度含之成一渾圓而十二分之則十二宮夾然有直十二宮為有衡十二宮馬有斜十二宮焉又有百游之十二宮為以天頂為極依地平經度而分者直十二宮也其位自子至卯左旋周十二辰辨方正位于是焉用之以子午之在地平者為極而以地平子午二規為界界各三宮者衡十二宮也其位自東地平為第一宮起右旋之地心又至西地平而歷午規以復于東立象安命于是乎取之赤道十二宮從赤極而分極出地有高下而成斜立是斜十二宮也加時之法于是乎取之則其定也西行之度于是乎紀之則其也黃道十二宮從黃道極而分黃道極繞赤道之極而左旋而黃道之在地上者從之轉側不惟日與而且時移晷刻之間周流遷轉正斜升降之度于是乎取之故曰百游十二宮也然亦有定有游定者分至之限游者恒星歲差之行也此數種十二宮然而俯仰之間縷如掌紋矣然猶
