body:
  text: 亦主有學問離日無逐其為人無福外走或役于人無離逐土加光時母寡且病家事常得常失失光時父母有傷人軟弱無離逐木加光時富且知未來事不宜火弦沖弦沖主大陰危失光時少年苦惱寄養于人遲火方有小福亦忌火凶照凶照更苦無離逐火加光時夜生多險危被脫弱喜爭戰日生壞日壞身體月在一宮或六宮十二宮與火合其人不婚娶父母早喪防跌死月在五宮十一宮二宮八宮逐大日生命短夜生有大權作官逐火火在本宮為將官在土宮心惡作皂儈無離逐金加光時父母責其人易富易貧失光年少亦有福大抵月逐金多好色取禍若日生月在四角火星在七富或十宮多為色死于非命婦人有此生淫無離逐水加光時聰明大才學有木三合照因學問淂大權失光多疑忌性惡多病無離逐日缺月空走無離無逐角亦無吉星人生窮苦倚他人度日身弱常有病生時若為第一有權者身體好心好睪竟喜走水路喜出外反此難為室家兒女旦難為眼睛子不孝外無好名五星在地平各宮吉凶土星在一宮不吉嫉妬為首生子七宮強死為人亦惡十宮福來遲四宮家事壞夜生尤甚二宮八宮多苦惱被人妬八宮同火或同木得別人財三宮壞兄弟照更凶九
