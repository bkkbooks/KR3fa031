body:
  text: 以此差數加于黃道一百七十一度零五分得一百七十二度五十分入準女二十二度五十分為十二宮斜秋升度用前法算安二十宮十宮巨二十度三十六分十一宮獅子二十三度五十五分十二宮處女二十二度四十九分一宮天稱十八度四十分二宮天蝎十五度零九分三宮人馬十五度三十四分四宮磨蝎二十度三十六分五宮寶瓶二十三度五十三分六宮雙魚二十三度四十九分七宮白羊十八度四十分八宮金牛十五度零九分九宮陰陽十五度三十四分用表安七政日金牛二十三度一式三份係黃道月獅子十五度五十八分緯南三度三十四分降土巨蟹二十三度四十八分緯南二十六分升木魔蝎十二度是一份聲北四十六分降
