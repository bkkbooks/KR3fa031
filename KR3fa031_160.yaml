body:
  text: 恒星倣他星變性天文實用云恒星雖同一天同一行而其著效于下物則時有異緣會合他星所倣情性不同故或與日與諸遊星會遊星指五星或受其照或出入地平及至天中皆與之偕則倣之其倣之也或倣一星或并倣二三星以其本性更合他性其力安得不增其效安得不倍如倣土其效冷時變雲雨為雹以損下物倣木雖主風而益下物卻又主雷亦順時而緩聲緣木性善故倣火主猛雷雨主酷熱若並倣土則益悶與毒矣緣二星皆悪故倣太陽主多風或加熱倣金主濕而冷倣水與定情所忌者并倣他星而合變性如併倣金必倣火煎倣金為最悪毒物甚併倣木或倣水煎倣木主暴風併倣火或土效各之所謂併倣者必已倣一星又煎倣一星文不明言必秘之敵其止言倣專應明言以某星倣下文有觀色以難之倣太陰土陰起霹海水楊後觀星色以辨星之倣天文實用云恒星所倣是何遊星以色別之最白著而大光者倣木最明而光大稍紅者倣日最壳而色類黃木者倣金色如月白而光鈍不尖也且微倣月甚紅者倣火青如鉛者倣土厌其色而大光者倣水雲氣濛濛者倣月并倣火皆甚約無光者倣月併倣土也又即光之多寡以測效之強弱先火明其效大類光多閃主荒亂光密力強至若星稀則力稍似明似黯如雲如霜其效必悪搃于其色辨之
