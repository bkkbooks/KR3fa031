body:
  text: 距黄緯及距赤緯并居四角等處天文實用云天團有定有移赤道居二極之中黃道出入赤道內外度分各等終古常然命為定圈地平與十二舍圈皆從地平分不論天極何居命為移圈今論恒星于定圈衹就黃道經而論凢星入此一宮或彼一宮即從而得其力若論強弱酒躔黃緯凢在黃道緯南北七八度內者必得其力然亦不等當躔道線上者俱得與諸遊星會合其力廣南北距綿二度與月與土火金水會合者次之距緯四度與月火金合五度與金火合又次之盖由七政凌犯以体相掩或以光相照因而得其性情足以補其地遠距地遠也行遲恒星行最遲之缺就赤道經而論前後俱無變力之端就緯論則力有損益盖星距赤道北者正照力增距南者針照力少也如論星于枵園地平宮星居四角則其效大願居各舍之頂頂是初度而又地平東地平或當天頂為力必倍若依七政八因天文實用云搃論恒星依七政而生占騐其因有八一因黃經距緯多少無論一因凌犯二體同度分者是一因光照以二弦四一百二十度六六合諸距為準以因同出沒依各地平而分一同至天中或上或下正午正子皆有本效一因距七政初沒或遊出恒美或恒出遊沒一因中與側之異處遊與恒一星居天上下
