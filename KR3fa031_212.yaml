body:
  text: 五土木星相會不拘何宮二十年一次不及二十年北猶是慧西法之約數下同六木星到白羊初度十二年一次七火星木星相會不諭宮二十七月一次八太陽火星相會不諭宮二十六月一次九土星火星相會不諭宮二十五月一次十火星到白羊初度二十三月一次十一太陽木星相會不諭宮十四月一次十二太陽土星相會不諭宮十三月一次十三太陽到白羊初度十二月一次十四金星太陽相會二百九十二日一次十五水星太陽相會五十八日一次十六太陽太陰相會二十九日十小時十七太陰滿自行圈二十七日八小時十八或經星或星緯星行至地平幷午時圈几星至白羊初度有大權若在次定平及午圈其權同各星相會若在地平上其權亦大十九火星水星相會五月三日一次二十五星自最高一宮移一宮有大權高指巨蟹獅子如火星自巨蟹入獅子即有大權既有大亂待木星到天秤秋分之權甚大必肖大人升
