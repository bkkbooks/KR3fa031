body:
  text: 實會沖於命宫將如之何是則天象之當明求而小術之非天道也貽七矣何况一切星辰青龍吉慶紅天喜之類無形之形無象之象有誰能指其顏色有誰能見其連行其足為典要手夫星官之術占驗之方自古至今其書充棟我皇上聖明天縱謂天文家言互有娕密誠為萬古發徵之言也附太初三統授時推算通法太初日法九百四十太初月法二十九日日之四百九十九即二萬七千七百五十九分三統日法八十一三統月法二十九日日之四十三即二十三百九十二三統求太初以一一六零乘太初求三統以一一六零除法以八十一除九百四十得一一六零假如以三統月法零數四十三求太初應若干置四十三以一一六乘乃的四百九十九太初朔虗氣通閏太初月法二萬七千七百五十九分以十二月乘之為三百四十八日又五千九百八十八分扣日六日通共三百五十四日三百四十八分
  hash: sha256:d02b00e27ddf0d4b0bfe221da845e675411866b474b48298dae844287fe0641a
