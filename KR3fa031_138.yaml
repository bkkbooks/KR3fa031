body:
  text: 在雙女二十八度與天秤二度同黃道十二宮每宮分為三分既分定度象宗云凣十二宮每宮分為三分每十度分與一星白羊起一度至十度分與火星火係本宮主星故為始其後依天輪次第排去圈而復始十一度至二十度分與太陽二十一度至三十度分與金星白羊前十度火中十度太陽後十度金金牛前十度水中十度太陰後十度土陰陽前十度木中十度火後十度太陽巨蟹前十度金中十度水後十度太陰獅子前十度土中十度木後十度火雙女前十度太陽中十度金後十度水天秤前十度太陰中十度土後十度木天蝎前十度火中十度太陽後十度金人馬前十度水中十度太陰後十度土摩羯前十度木中十度火後十度太陽寶瓶前十度金中十度水後十度太陰雙魚前十度土中十度木後十度火搃以火星太陽金水太陰土木為序黃道宮分性狠有毒會通云獅子人馬十五度後生人性狠本命宮言或論命主星天蝎有毒黃道宮分人獸性
