body:
  text: 明其理是負天地之生也世有水旱餓疫人苦不知知之則凡事可以豫備誠持世者之急務昔聖賢先務以前民用如授時戒農比其大者至于物理可推曆法皆能旁通及之誠使民之大者但言命亦有其要命之時與星有不真則吉凶大與必晰入細微方能有準變度之法或轉禍為福或移急就緩如山照変為言照萬有不一非息心入密不易淂真前人之於天道不患不知及知又虞洩漏沉人事動多関係若能省察以代著蔡固善不則甚不可也
  hash: sha256:e54518a97330d39abe9eaf62047a1c21278839157bd9e09b72cdf034fc45be94
