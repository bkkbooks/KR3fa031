body:
  text: 天象源委卷一浙江杭州府學生員臣張永祚輯象理天地人物古今之成天地人物古今變化無窮不可端倪要必有所以然之故所以然之故謂非七政運行不齊之所致敟七政運行不齊而世道由之有升有降人君因以致隆平之治人臣因以成奱理之功以天下至大而不能出於機緘之外以古今至遠而不能離乎運轉之中故孟子曰仁之於父子也義之於君臣也禮之於賓主也智之於賢者也聖人之於天道也命也夫是數者性所自具且有命存而況於外物乎古君子自有立命之學不肯委之於天然不知命則命何由立不知天人何由知命天者理而已矣天象以示人而理存乎其間象顯而理徵象可推測而得理非融會不能貫通自古以來觀象者但知觀其一端不能究其全體能究其全體者惟鄭禆竈之占陳將後對為近惜乎其術不傳聞晋之郭璞著有稱星經談理相合書在道藏無由得見而我朝薛鳳祚訂正西人諸書至為精黴不惟觀象者應觀其全體而天地人物均用是象以觀天人一理于此可徵宣城梅文鼎又發其義其論立象安命
