body:
  text: 水降雙魚升之對沖分及三角三角形每相去一百二度會通云白羊獅子人馬火分屬熱屬乾皆為陽其官太陽木星亦為陽墨太陽木星交木星太陽主天下地方從西至北寅午戌日木三角金牛雙女磨羯土分屬冷屬乾皆為陰其官太陰金星亦為陰夜太陰金星畫金星太陰主天下地方從東至南巳酉丑金月三角陰陽天稱寶瓶氣分屬熱屬濕皆為陽其官土星水星亦為陽此方土星上升申子辰土水三角巨蟹天蝎雙魚水分屬濕屬冷皆為陰其官火星金星太陰火星主苡月幫火金幫火星主天下地方從西至南寅卯未火三角各星至其宮各皆有權象宗云白羊人馬獅子宮屬火屬東北方與會通所言不同主星畫太陽木星苡木星太陽畫衣相助者土星太陽性燥熱木星性熱潤在土星性寒燥故以群太陽木星之性寒以解熱燥以解潤故平和土動日木金牛雙女磨羯宮屬土屬東南方主星畫金星太陰衣太陰金星畫衣相助者火星金星性熱潤潤多于熱太陰性潤在火星性極燥熱以解潤故平和火助金月陰陽天稱寶瓶宮屬風即氣屬西南方主星畫水星土星夜土星
