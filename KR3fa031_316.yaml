body:
  text: 陽是其廟旺宮主星日朝旺在戌廟旺遠當輪度太陽在戍宮十九度至二十五度為廟旺寅午戌安命者盡生人三合宮主一等是日二等是木星白羊七度至十二度屬金金星是分定度主星凡此諸星皆不在加倍氣力宮度上太陽雖在廟旺宮非其度則取太陽為主為何蓋太陽本是廟旺宮主星有三分氣力又是第一等三合宮主星有二分氣力共得五分氣力固此取為主星火星難是宮主只有四分氣力比太陽少一分故算與太陽為助餘側推取福德箭法此雖西法亦頗有理在餘箭不録象宗雲福德箭書生人從太陽數至太陰幾度夜生人從太陰數至太陽幾度看總計幾度從命宮起每宮分與三十度餘零幾度在何宮分即是據象宗西品尚安加安命度係此為去如人安命在白羊宮第十度太陽在獅子二十度太陰在天稱十五度夜生人從太陰數至太陽三百零五度從白羊十度起命宮及財帛等宮各分與三十度到寶十五度即為福德箭取壽星及壽主星法算人壽數短長見命理一門象宗云凡人壽數專看壽星并壽主星要算壽之短長有兩說一是正一是輔輔詳十四寒八門正亦有兩說一等說人性命一等說人身體性命壽星主之身體壽主星主之取用壽星之法書生人取太陽若太陽無力卻選太陽太陰又
