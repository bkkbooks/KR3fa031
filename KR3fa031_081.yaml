body:
  text: 遂遷至于增減強弱盛衰又各移步換形如此之類未易憐數其祕在此其妙亦在此前人未及詳言所貴得心會意觸類旁通則天下之名理正自無窮耳邰子皇極亦諭至此謂物有飛之飛之走飛之木飛之草等其理相符但皇極本卦體而言此本天道而言又有不同也輯象性其諭宮度等見三卷七曜本性象宗云太陽性熱且燥能熱所照之物太陰性濕潤所照之物京皆濕潤土星性寒微燥木星性溫和又熱而潤熱多潤少火星性極燥極熱金星性亦溫和又熱而潤多熱少水星性不定遇熱則熱遇寒則寒遇潤則潤遇燥則燥又説水星屬氣而生氣故木水合為風史記天官書云水星出入躁疾七曜性情所主會通云天下萬物之性有冷有熱有乾有濕天上星耀之性亦然天下萬物之性有善有不善天上星耀之亦然第一不善者土星性冷性乾其冷更甚于乾離太陽遠不能受太陽之熱離人遠熱不能到人行遲不能作熱光小又散亦不能熱故冷凡物熱則乾土不熱何以乾因太冷故中乾稱為大禍主草木性冷無蟲故主草木觀下文火亦主草木但為有毒者主人命六十八歲外主為人性冷性慢不奕快心貪多謀以土主思慮也難信土弱主難
