body:
  text: 宫多學問十宫十一宫壞子七宫六宫有不治之疾十二宫為人難交死于獄木星在一宫有大權夜生為首生子二宫富四宫淂大人愛有大權三宫常小出行有好兄弟朋友五宮十一宮亦有福在四角其性隨各宮之性如在獅子即有獅子性喜在十一宮六宮七宮亦有福老年方來七宮又在陰陽內生相大八宮與二宮但多為財爭訟木陰陽言夜生更甚九宮福自教學來若在十宮四宮更大火星在一宮日生火瞻風疾好浪費説謊四宮同且不生子而有為多在宇獄七宮好殺人在一宮有權強死早死十宫軍流死其宫屬隂其事差減若在天蝎更甚夜生人一宫或十宫火在木或金水有權宫內主有大槿在木槿自帝王來在金自百姓來水自才幹來在八宫大柢死于兵金星為一宫主星為人爽快易交貌美好色好歌唱肯憐人若有水吉照為卸命文臣同木日火皆主大權管兵亦多子女若有火凶照為兵刃傷手足或失血同土生㾑同水水泡疾金火土或金火水喜五官七宫金在西典土星相對為人極壞壞在貪憋在七宫老年有福十宫東邊有大名亦為候王有日照福自朝廷來火照自兵馬木照自功德四宫有財福八宫妻有缺陷或不生子十宫一宫與月水木同虔為功德教化有大福兼
