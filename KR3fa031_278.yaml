body:
  text: 二星同度為十九年三百十四日十四時零一刻半相遇一度為一次相會十二次或十三次始交他局至四十九次又從火局起第一次此術全憑推算而得城非私意之所能造作者他如四千六百二十三年之説與實年不相符不知著書者欲有所祕而出於此否姑存之以後恭考輯世運土木二星同度原書所言志同度歲月日時度分秒為猶是舊西法但其立法甚善取而通之無星不可指數也二星行中道交四局前後共四十九次象宗云土星行中道近三十年一周天木星行中道近十二年一周天似此二星行二十年一次同宫同度何則土星二十年行八宫木星二十年行一周天又八宫第九宫二星同度相又行二十年又同度相先從火局起次至土局次至風局次至水局每一局十二次或十三次同度然後交別局土星行中道二十九年一百一五日十五個時辰零三十四分行一周天木星行中道十一年三百一十三日六個時辰零十八分行一周天土木二星同宫同度時十九年三百十四日十四個時辰零一刻半相遇一度為一次相會十二次計二百三十八年一百十四日零十四分若十三次計二百五十八年六十四日零三個時辰假如二星初與同度時是火局從白羊宫
