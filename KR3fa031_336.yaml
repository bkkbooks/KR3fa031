body:
  text: 流日一日行十三度五十二分第一流日接流月度分起如流年在金牛六度流月亦起金牛六度流日本流亦起金牛六度倘日多即扣起月數月數用真太陽年表二十八日零二小時一十七分三十七秒為一月而一月天周止扣一宮餘日接算始用一日行十三度五十二分法後有立表如九月初二日時生日在天稱十六度十分二十年後十一月初三日子時三十分求流日二十年除十二宮餘八從天稱命宮加八宮到金牛十六度十分為流年與上流年法同完二十年起九月初二日時至十一月初三日子時三十分得六十日一十八時三十分值月大也對真太陽年表二月除去五十六日四小時三十五分一十四秒一月扣一宮二月扣兩宮到巨蟹十六度十分尚餘四日一十三時五十四分四十六秒用三率算法照二流月之取日時法用流月表用流月法中日行一度零四分零四秒表得四度五十分零為到巨蟹二十一度零是為流月之月日時與行度用夲表即一日行十三度五十二分表得六十二度二十八分二十五秒零為到雙女十八度二十八分零是為本流日之月日時與行度真太陽年表此表以嵗三百六十五日二十三刾三分四十八秒作三百六十五日零五時四十九分一秒分為十三月造成此表與推步之表俱不合
