body:
  text: 因摘其述七政性情者特為之訂正臣亦病此二書難讀尤盧後世不知此原為我中土舊學書夜研窮寢食俱忘十有餘年似略得其概重為融貫斟酌謹更編次其篇章疏通其句語曉暢其義理存其理而不必皆舊文存其文而亦可附新義其有閾者又摘他書以補之其有略者又引他書以之其有祕者又援他書以證之其有晦者互為之彰明較著或時書于前或時書于後其有雜者更為之分門別類門之中又別為門類之中又自相類一覽之下可以淂其綱領而不至遺其條目即其一端而不至忘其金體庶幾中土之祕或發于此而天道之微亦即此可以類推俾先事有僃有僃無患君臣士庶隨分所在可以各盡人道之實在天道微妙其象如彼其理以此驗之果驗亦其理當然耳臣輯是書非好異也蓋因理在天地間無分乎中西矧西學之源又未始不本于中土也諭西人之學原本在春秋左傳昭公九年夏四月陳火時楚王减陳鄭裨龜曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年歲五及鶉火而後陳卒亡楚克有之天之道也說者曰顓頊以水王陳其族也今茲歲在星紀後五年在大梁昂也金為水宗淂其宗而昌故曰陳將復封楚之先為大正故曰楚所相也水
