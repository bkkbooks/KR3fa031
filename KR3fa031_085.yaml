body:
  text: 以其行最疾也曰水手者人以與水同体言主人目睛日亦主目主腦主髓主白㾌主婦人月事地中主銀淮南子云月虗而魚腦減月死而贏蚌照又云蛤蟹珠龜與月盛衰泰西水法云月為陰精與水同物既為同物勢當相就月既下濟水亦上行欲就于月故月輪所至水為之長而成潮汐也當潮長時長則氣入水為之輕潮降氣出水復故重以缾盛水每日槿之輕重不等則潮升時輕潮降時重耳草木百昌苟資濕潤無不應月虧盈月滿氣滋月虛氣燥故上弦以後下弦以前不宜代竹與木以為材用易生氣在中也緯此言則知月主腦之説非誣而并可以通于潮汐物類竹木與月相應之理太陽性熱性乾光大體大故熱故乾主人命二十二歲外一十九年主君王主人長命有福主賢良聰明性寬宏主得君龍主人心主人脉比中主金與寶石以上二書所言七政之性并七政之所主其大略也在一星之性與所主亦宜觸類旁通如易以乾為天此統論也為圚以形言為君本國言為文本人言為玉本物言為金本货言為寒本時言為水本行言為大赤本色言為良馬為老馬為痞馬為駁馬以馬言為木果本木言七政之所主亦如是八卦以八七政以七八卦之德方七政之德七與八名雖黑
