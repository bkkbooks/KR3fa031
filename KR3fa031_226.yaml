body:
  text: 在金牛之方有經星同水星之性相關何如以知其事又看白羊是何地方便知其所在之方禍應多寡日食時看日月相會是何宮分月食時看日月相望是何宮分相會與相望時是何命宮又看食主星在何宮分若食主星吉又與上所言宮分吉照者已上所言尖禍稍輕若食主星凶又與上所言宮分照者已上所言禍應凶重又一説若食主星與上文所言宮分相照先太陽東出或留者尖禍增重若食主星與上文所言宮分相照先太陽西入或逆行或與太陽相冲尖禍輕減逆行及與太陽冲未必輕減應在各處城池象宗云几各處城池創立之時定一命宮以安命為主看日月食在何宮分是何局其局属何方其禍應在坡處上古人多體騐來如一城池命宮属白羊宫是年日月食在白羊宫分則尖禍應在白羊所属城池其餘可以例推害所在地方此原應敘入分野今先載此岑以聰體騐會通云以天下分四分從西至北属西地方大西洋回回為主者火星木星宮分白羊獅子人馬從西至南属南地方黑人國為主者火星金星宮分巨蟹天蝎雙魚從東至北属東地方日夲中華為主者土星木星宮分天秤寶瓶陰陽從
