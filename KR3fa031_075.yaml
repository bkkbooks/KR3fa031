body:
  text: 象宗西占云凡書中緊要之理備言之有二等第一等要知天輪行度之法必用渾天儀并測星之器以算法推詳其理已撰二書在前益係推步之書若人能于此二書精通則知此為至高至寶之丈矣第二等論天輪七曜有吉有凶則應世上之吉凶其吉凶云何必用上文所云渾天儀及算法體驗而後知之無非一定之理當然深明其源不可因或效而止也如太陽性熱且燥太陰性濕且潤又如四時不等寒暑不同或多雨或少雨因各星與太陽相遇或太陽與各星相遇在何宮分或各星自相遇以此故也此是顯然之理自古相傳至今人能參透各星性情哀旺及各星相遇之性情與夫相遇宮度之變性則欲知四時寒暑旱潦疾疫並人事吉凶禍福不難矣既能先知凡事可以豫備盡人道以事天可也凡諭天文形象陰陽吉凶之理備載于此至矣盡矣所應禍福依此書逐一推斷可也一切決斷人事吉凶看星象強弱旺衰但遇一吉星不可便作吉斷遇一凶星不可便作凶斷再看有吉星助然後可以斷其為吉為凶天步頁源云歷數所以統天而人之命與運亦天也故言天而不及人則理不備言人而不本于天則術不真凡人不可知此學者有三日月星歷遲速常變皆非不可知者惟人稟賦天地之全能不
