body:
  text: 水在天稱在日光內有大風在西養人在東濕退行百姓亂水在天蝎在日光內在西情在東雨退行兵馬作亂水在人馬在日光內雨多在西甚濕在東養人退行山內多險已多有誤險待己者水在摩羯大抵雨多退行為人好漂海水在寶瓶在日光內下雪在西熱天黑在東雨退行人有病水在雙魚天黑有雨在西天氣好在東天晴養人退行大臣有險厄文中一低一占東西又言北必拈地平宮南北東西物價貴賤占法宗云凡物價貴賤各月朔望安命宮最要者是當年安命之前朔望命宮當年者春分也並四季安命之前朔望成宮又命宮主星又會太險七曜所主象宗云凡七曜土星主鳥香瀝青但藥材墨色者木星主五榖並一切味甜之物金星與木星同又主銀並婦人首飾香貨及奴僕
