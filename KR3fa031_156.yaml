body:
  text: 角貫索主暴風昂華同日月出地平主雨軒轅南河狼星主熱是也更詳十二宫次各像就今躔度而諭白羊宫起降娄二十八度解見前止大梁十八度其初星娄宿主風雨然古多而今少緣距赤道北較古為遠已詳遇日加熱能敬風雨故中星左更性約和平稍偏乾熱末星天陰等較古稍熱照上文羘而為害少其向北星胃宿天河等多属土大水諸星甚熱多害其向南星性冷易生水緣有天困属土故金牛宫起大梁十九度止實沈二十五度內有昴宿主風雨交霧皆較古為少次有天街月等星古濕而熱今較和平末為卑宿主交雷與與霹靂其北礪石和平其南天天節並属火土金月諸曜無定情雙兄宫起實沈二十六度止鶉首二十四度內有井宿積薪天蹲五諸侯北河等星前者在西稍濕而熱次者微過于乾後者在東情雜亦稍偏乾在北者主風行地動在南者土夭暑地燥巨蟹宫鶉起首二十四度止鶁止火十二度首得鬼宿及位之東星主霧多地動中有無名数星古和今熱末為酒旂甚熱又稍主風南之無名星並毒熱子宫起鶉火十三度止鶉尾十六度沒有軒轅御女少微長垣以及五帝座其前星悶毒居中者稍温而温平後呈吉今約和平迤北属火而無恒效迤南者恒濕室女宫起鶉尾十六度止大火六度其星日內屏而又以及亢宿多星前者稍熱為害次者和平後者主多雨北者主風南者和平天秤
