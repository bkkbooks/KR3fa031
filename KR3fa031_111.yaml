body:
  text: 分又以伏見實行去查後緯限次實引在初一二九十十一宮伏見實行如在初一二三四五緯北六七八九十十一緯南次實引在三四五六七八宮伏見實行如在初一二三四五緯南六七八九十十一緯北水南北反是後中分與後緯限相乘淂秒為後緯更以前緯後緯之所向同類相加異類減淂視緯不拘前與後總以大為決便是定緯南北術有圈別見黃赤緯二十三度三十分月朔望四度五十八分三十秒兩弦五度一十七分三十秒半弦五度零八分土星小二度一十六分大二度四十九分木小一度零六分大一度四十分火小一度零四分大六度四十七分金水緯見各曜順逆遲疾力分大小節宣城李光地本要土星南緯三度四分北緯三度二分歲輪一周輪心平行十二度奇木星南北緯俱二度四分歲輪一周輪心平行三十三度奇火星南緯六度四十七分北緯四度一十一分歲輪一周輪心平行四百餘度金星南緯九度弱北緯八度丰強歲輪一周輪心平行五百七十餘度此言歲輪即伏見輪水星南北緯俱四度歲輪一周輪心平行一百一十五度奇
