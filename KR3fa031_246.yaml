body:
  text: 會通云金星水星在太陽下管日用尋常事土星木星火星在太陽上管軍國朝代等事月主百姓會通云月主百姓春分前或朔或望與木星會冲方則一年百姓平安魚飢餓疾疫若與會冲反此衡木取看太陰定作事會通云太陰在不定宫宜為速用事轉宫降下宫事在定宫宜為久遠事一云要開布宜于太陰在轉宫安命度諭日算到雜星法亦西法凡當年安命在何宫度者命前宫分有何吉凶雜星從安命度上數起依太陽每日行行中道每日五十九分八秒算幾日到項雜星上星吉則諸事皆吉凶則諸事皆凶應在其時假如安命在獅子宫第十度有一吉雜星在雙女宫第十二度相離安命三十二度從命度起三十二日有零至其當有吉應此係雜星在命宫後者餘同此例又看當年七曜在命前後何宫何度七曜右行恆星左行前後應亦準此亦從安命數起諒幾日到其星即應其星之吉凶如木星則應賢人君子土星應農人加老人之類諭年諭日各不相同小限見命法後亦西法若安命宫數至小限在何宫分看此宫分有何星假如此宫分
