body:
  text: 斯歷元所以成虗名而截元所以為定法也七曜有如此之谷伍錯綜而其為風雨為雷電為寒暑為旱潦也又何能齊世運之升降悉由乎此而一人之身榮枯有定一物之細盛衰有時亦皆如此不時人物為然即一屋宇一舟車一器皿無不本此以為成毀此天地之所以為大造化之所以為造化也天地人物盈虗消息吉凶禍福俱因七政之不齊而然所謂天命是也朱子云天以陰陽五行化生萬物氣以成形而理亦賦馬非此之謂歟故本天而言謂之天道本人而言謂之天命命之理微於是乎在後世術士不知天人一理妄為窺測乃占天而不用推步之術占人而不知用天象以推占物亦不知仍應推步將天人一貫之道零星割截不知以何為宗以何為憑是尚可以為推測之道乎孟子言性善乃本其大體而言在孔子有上知下愚之分箕子亦有強弗友友沉潛高明之諭周子亦有剛桑善惡中而已矣之説陰陽五行之性原自不齊而况于人乎况于物乎此朱子所以又分為氮質之性也究之人無兩性特天性不可以言惡耳然則是書窺測天地人物皆歸一理信乎其為天地人物第一理不誣也諭占不占人占物及選擇吉日立象安命之同占天之術以是年交春分與春分前朔望時之天象安一命宫占人之術也是年月日人生真時刻與四年之真時刻各安一
