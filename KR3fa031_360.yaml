body:
  text: 火金牛二十九度五十分緯北一分升金巨蟹一度四是一分緯北二度十分升水陰陽十一度十八分緯北一度四十分升天首白羊八度六分天尾天稱八度六分算福星所在五星排法五星如無緯或緯小止論經如緯大羔論緯度太陽金牛二十四度一十三分入八宮椄前算斜球升度太陽入金牛九度三十一分又算十二宮金牛十五度零九分入八宮此美人八宮斜球係黃變又麥赤不在天頂度此皆言黃實度之所在日入枼宮枼宮者者木不在天頂之宮分也土星小不論巨蟹二十三度四十八分入十宮木星得小不論魔蝎十二度十一分至魔蝎二十度三十六分方到四宮當入三宮火星緯小不論金牛二十九度五十分入八宮天首白羊八度六分白羊十九度方七宮當安六宮天尾天稱八度六分天稱十九度方到地平當安十二宮月緯大舟算月入何宮用表笑月在獅子十五度五十六分黃赤距緯度為十六四分月緯南三度三十四分減之得十二度三十分以緯言
