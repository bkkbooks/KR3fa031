body:
  text: 以土為功德教化受勞苦九宮信邪教與火土同豦為邪教女色惡死同木土水合或吉照知未來事有福在六宫內人賤且貌惡十二宮妻不吉几日月相合在地平下無櫂在四宫有櫂水在一宫或七宫代日月管事是大聰明人若典昂星近忒聰明有風氣喜在一宫得在東日東大吉二宫不喜學問八宫瘋癡六宫為醫有名外遊吉日在一宫宫分屬陽在本宫或升內或有吉星照大富貴若有凶星相近壞目在一宫同土星光相及晝生有大櫂位尊有地星照為阻官小在一宫有火星照或光相及有大櫂從艱難來在一宫晝生宫分如上說指茅一假木星在四正角有火星在十宮屬陽月光滿亦在角內非帝王即有天下大權或月興火同在十宮內或同在八宮亦有大權但終至強死或土在十宮火在二宮或八宮月滿時有大權終死獄中在一宮別角正角有木金水為大人福自父母末若有土吉照福更長火在一宮木火水在別角正角有土吉照或火吉照亦主大權但謄大奸謀害人貪財終壞已身在一宮夜生亦責日未出地平做人亦好若有土火吉照或同在一宮內主兄長俱死家事俱失在別宮亦然日在二宮人爽快財帛艱難多爭競皇日興二富不和耶有金星或木星吉照或相合有福亦從艱難耒總之几日在二宮難求大事日在三宮父不吉主人軟弱良善作錢糧
