body:
  text: 獅子第一分熱乾二分三分溫北方熱乾南方濕處女第一分熱壞物二分溫有雨三分溫北方生風南方生氣沖和天稱第一分乾二分溫三分溫有雨北方生風南方壞人命天蝎第一分雪二分溫三分天氣亂有風雨北方熱南方濕如象性溫五星之性亦溫相遇又有椎即雨餘皆同此訣也人馬第一分冷濕二分冷三分熱乾北方生風南方不定亦濕磨羯第一分少熱壞物二分溫三分有雨北方溫壞物南方濕壞人寶瓶第一分濕二分溫三分生風北方熱南方溫飛雪雙魚第一分冷二分溫三分熱北方生風南方生水立象安命法二分二至及相近朔望占天時會通云論天氣看春分及春分相近朔望秋分冬夏至皆然見春分即知春分三月見春分朔望即定春分三月四季皆同亦有定宫宫二體宫一年半年四季占之法第一要看命宫分至朔望之安命宫次即日月宫日月宫諭其強者次送朔望之宫日月二曜中取強者諭如日強諭日月強諭月如日在午己為送宫其宫要取五星有框者為主星諭其燥濕及順行逆行望時日月有雨宫主星亦照此取強者諭
