body:
  text: 世運主星是五星內何星分外姓夲枝若運主有力之星是土木火三星內一星主外姓與起其事業制度一切所為並與前代不同若世運主星是金水太隂三星內一星則更改只在夲枝不屬外姓却有刀兵爭競世運主星是何星在何宫并在太陽光下或遇凶星若世運主星是土木火三星內一星在夲宫或在廟旺宫主國祚綿遂一運之內壽長一切事物皆堅毅世運主星是金水太隂三星內一星又弱無力并在陷宫或在太陽光下或遇凶星則國祚年促凡事不久人夀短所作事不皓世運主星是何星夲宫廟旺有二星兼在宫分內若世運主星是土木火三星內一星或在夲宫或在廟旺有二星蕪在世運主星宫分內或與世運主星吉照主國家強盛四海一統假如世運主星是火星宫分是磨羯宫火升火星又在磨羯內世運年命是白羊宫木星土星又在天蝎宫與火星吉照火星順受土木二星吉應則如上所云世運主星強旺又為季主星若世運主星強旺又為季主星主世運一季內國家大興旺世運及四季主星同是土星若世運主星是土星主國家興旺之福後勝于前為弟四季主
