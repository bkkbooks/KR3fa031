body:
  text: 凡水星每交一宫則天色更改晴則陰陽則晴凡星交宮則改性而水更甚若水星行遲不問在何宫分亦致天色更改并陰霧遲則力重水行遲月金在交卯未水當行遲之時與金星太陰同在交卯未相照象宗云水星行遲或太陰或金星在交卯末宫主雨連陰金冬至順行金冬至順行在東冬至雨少冬至將盡雨大金星退行月在丑子交金性退行更甚在東刀大而月又占丑子交喜雨之宫若日在戍宫日旺雨少若日在未宫日不旺雨多矣金星退行又在東月在磨羯寶瓶雙魚春分雨少夏至雨多黃道十二象每象三分主天時分南北未驗通與黃道宫每宫分為三分不同會過云白羊第一分作風作雨二分不熱不冷亦有熱乾三分熱北方有火星之性屬熱南方有土星之性屬冷金牛第一分有昴星不吉查昴星今在第三分而此指為一分必目崴差之故有風雨亂天氣其二分溫濕多三分屬熱大雷電北方濕南方多不同性之星其性不冷陰陽第一分濕其二分溫其三分乾性不定北方主風南方生燥巨蟹第一分大乾大燥二分三分大熱大乾北方乾熱南方壞人物
