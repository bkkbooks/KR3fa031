body:
  text: 失家出外月若失光當更增脾胃冷弱之病月離木星逐土星加光時得外人喜悅管外人事作水上生理多出外失光貧若事人離木逐木加光時有權有官有福失光時管兵為人心險當生四年合有方有此象離木逐火加光時夜生有大權大官多險苦終能忍耐火在角更甚若在降角其人作火內生涯日生貧苦乞丐多病強死失光時夜生火在角有名有宫在降角為兵日生父母家事失早孤貧苦役于人離木逐金缺離木逐水加光時人爽快有名聲管錢糧開塞來詳其福長義失光讀書為客管開事淂親人財離木逐日父母家事皆失為徒流或逃亡大抵月與日在土星或火星宮內離木加光時父母苒貴自己亦然福自婦來豈以土為人文雅豈以火言亦少年喪父母火土之故離木無逐失光時外逰月離火星逐土星加光時親人盜騙無所不為多死于法離火逐木缺離火逐金加光時夜生活其人有福福多自婦人來失光時日生性惡強死夜生監獄事離火逐水加光時夜生作兵卒心狠日生以罪死離火逐日身弱命不永苦惱外死離火無逐加光時少年妨父母命多險危或死于獸或死于罪失光家事壞生涯苦惱或燒鐵月離全逐土加光時夜生娶不正婦人或老年者日生好色多遠逰勞苦在女命均為性不正失光時夜生無子日生軟弱
