body:
  text: 火星在雙魚七度十六分相距四十三度四十六分以三十度除一年外尚有十三度四十六分每一度十二日今十三度得一百五十六日每五分得一日今四十五分得九日一分得日之二百八十八分一日九十六刻為一十四百四十分五分得此數為刻十五分為一刻得十九刾零三分共應得一年又一百六十五日十九刾零三分為月底到火星不立表是為流年之月日時流月係西法流月有流月之月日時流月起流年宮一月一宮一日一度零四分零四秒如第一年流年在白羊六度其年流月亦起白羊六度第二年流年金牛六度其年流月亦起金牛六度第二月陰陽六度第三月巨蟹六度作何日故和月法見真太陽年表其表以義寶强分為十三月作來見後立表流月一日一度零四分零四秒三百六十五日行一同過三十度寶一日二十九度四十四分零後立表表止二十九日無三百六十五日表如日在金牛二度十六分木在獅子十六度二十七分相距一百零四度一十一分用三率算法一率一度零四分零四秒化秒二率一日化秒三率一百零四度一十一分化秒四率得秒若干婦為日用表夲差土載二十九日表得九十七日一十四小時零二十九日表後又載六十時表時無六十表每開六十時者是為流月之月日時以便于對分也流日亦西法流日有流日之日時
