body:
  text: 害且仍有吉事若善星無榷為主星而無榷及善星不主本地方為惡星有榷亦有害但輕减日食主星或送食角內主星是惡星又為本地方主星為善星有大椎對惡星地方害亦輕若各星俱不善又主夲地方又無善星為之對即為大害應在何人物上看所取主星在何宫分又看宫分是何體象其禍應在其象上在陰陽雙女天稱人馬寶瓶五宫應在人事上在白羊金牛磨羯三宫應在六畜上在巨蟹雙魚應在水中之物在天蝎應在蛇焻蜈蚣等物若在獅子應在猛獸上若其宫分中有一雜星此星是何等象即應在其象上其象在黃道南則有大風雨水火在黃道北則主地震地裂地若虧時主星在土局內應在土中所産之物在風局應在人馬并六畜在水局應在水中之物在火局應在金銀銅錢等合寶貝等物若虧食主星在白羊應在春季所産之物有損傷在巨蟹應在夏季所産之物有損傷在天枰應在秋季在磨羯應在冬季苦虧食主星在白羊或天枰其災禍應在寺院庵觀在巨蟹或摩羯則人之性情多改移不定在定宫應在人間房屋多損壞在二體宫應在人事上在轉宫應在廣民并小人輩
  hash: sha256:396e8df377d0bdd2e3cbe8eda79de7c470c02894e39757b1977397c6739a5af6
