body:
  text: 朔望命主星與七宮主星照朔望安命宮主星與第七宮主星相照或移光相沾或聚光似此亦主當時有雨不當雨時則天暗風熱時則極熱冷時則極冷七宮者相對命宮之會觀配偶視此宮觀仇亦此宮觀雨亦視此宮北宮主星如與命宮主相和有雨相觀亦有雨故云云開門之理太陽舍巨蟹舍土舍磨羯會通云如太陽舍在巨蟹土星在磨羯不論何時相會冲方或太陽在未而土亦在未或相照即為開門門開即有入門者其冷熱晴雨皆倐忽有變未係太陰本宮開門有三會通云一土星太陽是開水門若在冷乾宮溫熱宮定有大冷大雲大昏沉若在濕冷宮定大雪大雨夏至則冷雨若土星榷大于太陽其冷更甚土性冷乾力大會日則冷融化而為水不乾矣故加以宮性之冷乾為昏沉加以宮性之濕熱必大雨加以宮雪之濕冷冬則雨雪夏成冷雨云二木星水星是開風門壞樹木房室三火星金星是開水門有雹雷霆壞樹木金性潤火性熱潤遇熱而更潤故為開水門火性燥金性冷以冷却燥而燥愈甚雷之發所自來矣會冲方無他星及有月有金水并有退行之星在內開門一為相會相冲方中無他星無他星論前行星之性在後
