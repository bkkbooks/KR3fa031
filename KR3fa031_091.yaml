body:
  text: 陽之後㞘夜土火二星比他星異常土性寒卻屬盡火性熱却屬夜故日異常七曜中陽星屬書陰星屬夜而火乃陽星卻屬夜天文寶用云時分晝夜為效谷異諸曜適值其時與其性合施力必強欣匕如有喜馬有喜書者其性隨日木與土是也木熱勝濕二情和平書合其性回之施力甚強厥功懋馬土則性冷籍書熱補之雖無善勢惡效亦解有喜夜者其性隨月金與火是也金濕勝熱夜屬陰正合其性因之施力亦強火效為要甚強于書俾出夜中補其偏乾足以殺之水無專向受變于晝夜大約東出做書之熟自增其乾西入做夜之冷且更為濕也太陽合盈給考日平行五十九分零八秒日高沖一點盈之始高行一點縮之初春分至秋分半同歷時多秋分至春分半周歷時少太陽分有光無光及上升下降考月有光即各事大第一望前到上弦其次十五到下弦又次初一到上弦又次下弦到初一月升山朔日所離宮度定于十五至酉十五為正升酉十五至來初度為斜升來初度主寅十五為橫升寅十五至子十五為斜升見七政經緯度時寭書洮豹見第三卷月上升有五不止言四一小輪最高一不同心園最高印行子到五
  hash: sha256:8d5d57bba2ae9684500cb90c547e8fdf7681a5eeb50b049bcb5f1bf2c455779b
