body:
  text: 三一星疾前行離二星光四一星疾前行近二星光五前後二星行疾中一星行遲隔前後二星之光使不能及六有三星同在一節或一氣内遲行者在前疾行者在後中一星能加光力于前之遲行者七二星相近将合有在前一星退行來二星之中令不得合八二星相近将合有在後一星行疾來二星之中令不得合外八權會通云一星在本舍二星在他星之舍三星在喜樂宫四星在他宫喜樂宫俱览三卷五本星性軟别星性强六两星性皆强七一星軟第二星强此必合一處言八二星皆軟又九權會通云一二星圍一星無他星來救二星得他星之權如在他星之舍或在他星之升或離他星一百二十度一百八十度九十度六十度能分他星之權三星所在之方舆他星不相會照爲贱者軟者野者四星疾行者舆遲行者将會末會而将舆他星相會爲虚废其行五星舆他星将相冲或将相會雷不能冲會亦爲虚废其行六星離此星前去並無他星會照稱爲空虚此项第一大用在
  hash: sha256:28990c08e9fe197a8f9a96c4eebd621dfef30f0726339c5d1fc17206be6c2e09
