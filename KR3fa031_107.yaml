body:
  text: 三一星疾前行離二星光四一星疾前行近二星光五前後二星行疾中一星行遲隔前後二星之光使不能及六有三星同在一節或一氣內遲行者在前疾行者在後中一星能加光力于前之遲行者七二星相近將合有在前一星退行來二星之中令不得合八二星相近將合有在後一星行疾來二星之中令不得合外八權會通云一星在本舍二星在他星之舍三星在喜樂宫四星在他宫喜樂宫俱覽三卷五本星性軟别星性强六兩星性皆强七一星軟第二星强此必合一處言八二星皆軟又九權會通云一二星圍一星無他星來救二星得他星之權如在他星之舍或在他星之升或離他星一百二十度一百八十度九十度六十度能分他星之權三星所在之方輿他星不相會照為賤者軟者野者四星疾行者輿遲行者將會末會而將輿他星相會為虛廢其行五星輿他星將相冲或將相會雷不能冲會亦為虛廢其行六星離此星前去並無他星會照稱為空虛此項第一大用在
  hash: sha256:286a1b8aa38662d4a158d0582ea6e974c5dd35df3e676abe8ff76a1f0746dcc5
