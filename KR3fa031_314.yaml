body:
  text: 水于天枰為三角故用土星因其有升有角有照三件最強金止有二水止一俱不用更有取近之一説金在人馬六度六度比一宮十四度遠土在十五度為近四宮是磨羯十八度今改安磨羯十五度土三合照四以地平宮言假如十宮磨羯十九度一宮金牛七度近朔日月相會宮主星第一強星水水在天稱十三度第二強星日與金第三強星火火在巨五度今一宮用火星五度度數改為金牛五度其十宮却不用水星度數水雖比火強然火星度數比一宮度數為道而水星度數比十宮度數稍遠雖強不取取近取遠不又如水星天稱四度火星陰陽五度人命一宮金牛七度水星強而用時却作金牛五度不作金牛四度為火近于水也又火在陰陽離金牛順不為酒即當用力強水星度數取頁取命主星法象宗云凡各宮度主星取氣力多者為上本宮主星有四分氣力廟旺宮主星有三分氣力三合宮主星有二等如一等日二等木第一等有二分氣力第二等有一分氣力分定度數有一分氣力若此等主星遇在本宮或廟旺宮度或三合宮或分定度數上加一倍如火星在白羊即算為入分氣力本宮主星為四分氣力令在本宮加一倍為八分其餘一切主星取氣力多者為之其一星比此主星氣力微少者為主星取如二星氣力相敵則取宮主星為先第二星為助如書生人安命在白羊宮第十度火星是其宮主星太
