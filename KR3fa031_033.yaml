body:
  text: 也明如拈掌洵能發古所為發矣儒者之學以格物窮理為先務天下之大萬物之泉有一物未格一理未窮即於性體之明有缺如之何天象之大天理之徵而可付之于杳冥乎理者理也物各有理何况天象理之為理必有其源必有其委誠能溯其源不遺其委而理可明矣理明而象可推矣于以知天以知命奉天以惟謹事天以不二君臣有君臣之修省士民亦有士民之修省各書其職盖亦何莫非人道之當然也固知象無不知為占無不驗極早常之事也倘不期修省但求燭照于未然即無所不知無一不驗亦何補于人心世道謹取薛梅兩家之書重為析之先之以窮理也輯象理論天地人物古今第一理夫天地人物古今執為第一理執為第一事人君敬天勤民人臣無負天祿士人事天以修身庶民順時以耕鑒斯為第一事矣而第一理何在聖人因人立教民可使由不可使知故出入起居祇言人道之常而天道之微即聰颖如子貢亦至年父而始聞詩書執禮聖人之立教錐㫖趣不同而皆本乎人倫日用為之訓迪惟易道陰陽天地人物古今第一理咯備於易然易猶云書不盡言言不盡意易非此一晝為易也乃陰陽也陰陽之分流為五行在天之五行垂而為象則有土木火金水五緯
