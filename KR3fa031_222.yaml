body:
  text: 不遇星照比別星起多事論人事性急有機變能知未來之事又強竊盜發諜起意人身乾燥病症時常發熱咳嗽怯弱吐血論天色因夲星性燥輕動必有狂風雷震霹靂地動一應孳畜有損日食所主會通雲日食在白羊獅子人馬主大乾大燥火災凶年設土星火星又在凶惡之方為災更甚燒山林在巨蟹天蝎雙魚洪水江河溢如火星在金牛或他凶地更甚以三宫水地火星性又害人在陰陽金牛雙女大亂大兵在天稱磨羯寶瓶大瘟疫以三宫以壞人命天上四宫獅子大乾天蝎大狠雙魚大濕金牛溫月食問日食其害减小食時五星之榷食時五星之榷行速者最高者五星緝在北者或星在日月宫如日在地平上在日宫指星言月在地平上在月宫指星言大扺日與土星主寒熱木星水星主風火星主雷電雨金星主雨月全主全主無眻有五星在日光內及留者事大經星
