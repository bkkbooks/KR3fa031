body:
  text: 星相弦照也又火星在白羊宫木星在雙女宫土星在隂陽宮土星與火星六合照與木星相弦照土星將木火二星光聚於一處似此亦為相遇若一星在本宫或旺宫或在分定度數上都有一星來與相會或三合照則主星受客星之喜吉主客之分在是若一星在本宫又在分定度數上與一星或三合或六合或對沖二弦相照主星喜受相照星之力比上交所言之星其力稍軖可推若金水在白羊宫或在獅子宫與太雖無相照太陽亦喜二星在其宮也白羊乃日三角言喜受之理者不問大小一切事皆成就順快若一星與一星逆行或在太陽光下主星無力則阻容星亦有容星無力容主星在四正宮及分定度數上雖阻不甚阻者凡事不能成就有損傷敗壞之理不吉會通云太陽光十七度太陽光十二度三十秒土星光十度木星光十二度火星光七度三十秒金星光八度水星光七度不正相會有二一為來者一為去者若二星來者性速去者性遲速者過遲者前行亦有二一為逐一為離月逐離另見又一等二星俱順行一等二星俱退行一等順行者追退行者一等順行者離退行者七嚁照分左右論強弱附十二象會通云五星在前者名右如白羊從金牛順推在後者名左如白羊從雙魚推論日月五星在右者比左者強論十二象在
  hash: sha256:f4be8bec7e0cdb94a10cc439815508661cef96d1b9ab67967ddd9ff322c9af2c
