body:
  text: 二宫日生好色多死兵福來易壞有婦人致險危水與日在一宫貴為候王大聰明二宫有財有權三宫善醫卜四宫不甚貴有學問在土星宫多險危五宫事易成富貴不久六宫怠惰不能成大事若十宫有吉星猶可七宫日生大權大官但不善終夜生貧賤八宫軟弱無才有癡瘋疾九宫作邪法十宫日生有天下大權木照更大十十宫福遲來十二宫貧窮服役出外
