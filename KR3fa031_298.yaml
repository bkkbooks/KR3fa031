body:
  text: 又看安世運命宮是何宮度出地平懷上將封黃道的赤道度數為則數去每一度談一年只數赤道度數看行至何宮度上遇著何星以其星之吉凶斷其吉凶世運命宮小限與上世運小限不同若輪小限從命宮起一年交一宮象宗云西域紀年六百十五年間說世運初起時至此年談四千六百二十三年御纂歷代三元甲子編年第一甲子起黃帝六十一年至明天啓四年為七十二甲子得四千二百六十年本年再加一年新西法交食永年表起三十一甲子至明天啓四年為六十六甲子得三千九百年本年再加一年校編少六甲子共三百六十年第一甲子起舜攝九載月離歷指崇楨戊辰為總期之六千三百四十一年天地儀書開閣治洪水云一千六百五十餘年洪水至漢哀帝元壽二年庚申天主降生天地儀書云二千三百四十餘年聖經直解云二千九百五十四年遺詮云二千九百四十六年考堯十八年至漢哀帝二年庚申寶二千三百四十年與天地儀書合庚申至天啓四年甲子又一千六百二十三年加甲子本年為一千六百二十四年並共三千九百六十四年天啓四年至本年乾隆二年丁已又一百一十四年通共四
