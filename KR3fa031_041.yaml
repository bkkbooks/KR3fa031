body:
  text: 分注言漢與至此百二歲前歷上元太初四年千六百一十七歲至元狩七年復淂間逢攝提格之歲爾雅云歲在甲曰馬逢寅曰攝提格則是甲寅不疑也是甲寅年丙子月甲子日甲子時交冬至距上元太初算年不合考二十一史諸家歷元總無一同者其立法也既取上元之各殊而又後測之不應法安所用哉然太初日法猶是古法而復以建寅為正月史記載太初日法有紀數可考漢書律例志乃謂太初歷法起於鐘律宋儒亦信之益未之深考也考三統歷實起于鐘律將九百四十分之日法改為八十一名異而實同復又引古穿頭上裝頭屋下架屋多其牽合既不如古法之簡而且算終不協於歷何補唐大衍歷又將日法改為三千四十又故匿其名而號為通法其通法之所以定為三千四十者一六為文位之統五十為大衍之母成數六乘生數一為天中之襀生數一乘成數六為地中之積合千有二百天地中積揲之以四為文率三百以十位乘之而二章之積三千以五材乘八象為二微之積四十章微之積為通法三千四十通法即日法也踵三統之故智牽強附會如設數與易所敷陳之數有不合都以乘除就之非出于天道之本然至于今凡律曆志俱成啞鐘不可句讀徒紛人心目詎知七政運行之數與河洛書揲箸之數及六律六呂三分損益隔八相生之數原各不同苞義氏觀象于天觀法于地
