body:
  text: 近取諸身遠取諸物始作八卦以通神明之德以類萬物之情可見天象者又係作卦之張本考蓍䇿包天人萬物之數五音六律為人聲自相生之數而七政止為天行之數實不同奈之何欲強而同之今三絖與大衍必欲強之使通而日法仍不離於九百四十分之舊不過意在誇耀新奇以自附於作者之林卒致天下後世雖驚其竒而究不符於天亦何益之有哉如三統法果與天符則萬世遵行可也我朝亦取為張本可也胡為不多日而卒改為大衍大衍又不能與天符復經後世疊改而變為授時其術可知也有元授特歷出盡其弊將日法作萬分竟以實測為憑而截元於辛己斯授時之卓見也在授特法比太初為加詳授時歲實三百六十五萬二千四百二十五分其零數通太初得二百二十七九五以較四分之一為不足實欠七十五分一係大數一係小數太初日法九百四十分為數小授時作萬分為數大大小本可相通亦可相較算法附後其朔實為二十九萬五千三百零五分九十三秋通太初為二萬七千七百五十八分七五七四算法附後故朔虗為五萬六千三百二十八分八十四秒其零數通太初五百九十二分為多於太初朔虗多而氣盈欠見上較四分之一不足是以通閏定為十萬八千七百五十三分八十四秒數既不同法亦難合非十九年七閏之所能盡餘分而章蔀紀元皆成虗言矣此授時之不同於太初遂不同於古法之大概也若夫
