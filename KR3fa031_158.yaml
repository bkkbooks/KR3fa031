body:
  text: 宫起大火六度止大火二十六度內星為氏為陣車為西咸為日為天輻前者多和平而稍乾次者和平後者主雨北者主風南者乾毒天蝎宮起大火二十七度止析木二十六度內為房心尾東咸從宮等星前者主雪次者約濕而多和平又次者主天變北者熱南者濕人馬宮起析木二十六度止星二十八度內為箕斗建星天淵諸星又狗國天雞等前者濕且冷次者溫和而稍冷後者屬火北者主風南者無恒效而多濕磨羯宮起星紀二十八度止元枵二十二度內為牛女二宿壘壁陣西通字恐字等星前者性熱為害次者和平後者主雨南北并濕而忠寶瓶宮起元枵二十三度止娵訾十五度內包壘壁陣虞危及羽林軍前濕次和後來風北熱南主雪雙魚宮起娵訾十五度止降婁二十七度內為雪為雨為霹靂為外屏為奎前者稍偏冷次者濕後者熱北者主風南者主水其合宮度大小不齊必因黃赤相較恒星有五星性所主天時人事會通云各星有土星之性皆屬冷屬乾下雪雹壞人命有木星之性生風有福能救人有火星之性大熱雷電風暴瘟疫有金星之性屬濕屬冷有雨有水星之性無定性同土即冷同木生風火亂天氣有太陽之性亦熟亦生風有月性海中亂且浪湧
