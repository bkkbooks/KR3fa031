body:
  text: 月七有星居其方其方全魚本星之大小能力為至弱之星八星屬陽又屬畫又在地平上其宮分又為楊或星屬陰在地平下其宮分又為陰亦為一權九二星相會之方于二星皆有大能有彼此相借之權十或上等星得下等星之權或下等星得上等星之權為彼此相接上下等有四一小輪在最高者為上㽚者為下二線在北為上在南為下或同在北則以離黃道遠者為上同在南以離黃道近者為上三以在西行遲者為上此尚西四以近天頂者為上月五星南北緯考月在正交之六宫緯北中交之六宫緯南土木距正交如在初宫至五宫緯北六宫至十一宫緯南火星同金水以次實引既得距交敷來查本星緯前表得前中分又以伏見實行去查前緯限中分緯限雨相乘得秒進分為前緯次實引在初一二三四五宫伏見實行如在三四五六七八緯南初一二九十十一緯北次實引在六七八九十十一宫伏見實行如在三四五六七八緯北初一二九十十一緯南水星但有實引無次實引南北反是更以次實引來查後緯表即得後中
