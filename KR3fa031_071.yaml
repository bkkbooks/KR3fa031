body:
  text: 則多雨之處雨增少雨之處雖有雨而雨少又如雲氣有致雨者江南見之騐江北不騐豈不以地有不同之故也乃至廣邊海之地大抵海風一起便天涼而雨非海風起即有應雨之風不雨也不惟風雲亦然如野豬渡河為雨象而江海川峡之處雲氣常騰又非可以概論也中土觀天象大抵止觀其一端而不論其全體止觀其大略而不察其細微止觀其大略觀其一端則月之犯五星一月之內必周星之自想相犯也一歲之中不免如擄占書而言則人事有不勝其繁矣能論其全體論其細微者若裨竈之占陳大庶峩為近之而後之得裨竈之傳者又秘而不宣此所以其書充棟莫之騐也至望氣之術與風角之占其為一端也魚疑即一端而忘其全體按大畧而忽其細微如之何則可茍能權衡乎期其間揆度于此際得其本而不遺其末取其精而不亲其粗一端與全體同條細微與大畧共貫如是有不万志騐乎此望氣風角于摧步之後又不可縱也推步之占如風鑑家之相骨格望氣風角之占則挐如風鑑家之辨聲音氣色氣色者一時之占也象之小者也骨格佳而氣色又明斯為福澤即至矣云風雲之竟可不察乎若止惟風雲是占而天星不問是猶止辨氣色之小而遺乎骨格之大奚故西占于慧字之起仍必推步為安一命宮與占歲占人無異益有白也既能推步以占其大還宜審察以占其小况地氣有不同
