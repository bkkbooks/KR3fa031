body:
  text: 占時風雨雷雹霧露霜雪易曰天地定位山澤通氣雷風相薄水火不相射八卦相錯又曰雷以動之風以散之雨以潤之日以暄之艮以止之兑以説之乾以君之坤以藏之在書之洪範曰八庶徵曰雨曰暘曰煥曰寒曰風曰時五者來備各以其敘庶草蕃庶一極備凶以極無凶莊子曰木與木相摩則然金與火相守則流陰陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐故陰陽之精為日月五行之布為五星而五行之情不止於相生相剋兩端又有相濟之情如水火之相濟人所共知者而金木之相濟人所未察如木為生氣主生長百物而無金氣以為則生而不能成有如果實然陽舒為華陰為實陽以發生陰以凝結畫氣屬陽夜氣屬陰陽循環物乃成形又有相薄之情或火與金薄金與火薄火走則奮而為雷金走則結而為雹或水與火薄火與水薄火走則流而為電水走則散而為霖又有相迫之情以水迫火而火反見于上以陰迫陽而陽反著于外或迫之甚如日食以陰掩陽而反成旱乾或迫之未甚陽雖暫露而陰終密布火雖上見而雨即下施又有相抑之情
