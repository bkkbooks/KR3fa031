body:
  text: 福祿善事土星為主則歲煞事務不成人多㬊愁上言土木行中道實亦論中會然日食論九眼魚論視會可知當年安命宫內何星最強看當年安命宫內何星最強是木星主年歲豐稔人皆安寧事務順快是土星則年歉災傷人多愁悶事務不順是火星則年盜賊生發刀兵征戰及國政枉民有火災是金星則年陰人事盛人間多喜樂婚姻音樂等事是水星則年吏人經商技藝等吉是太陽則國家興亡一切事務皆吉及大小貴人皆利于仕是太陰則人民安樂凡事皆吉各處有好音至已上所言一星強旺有力者如此若二星強旺有力者將二星合斷之如太陽與土星皆有力則與火星有力同斷太陽與木星皆有力主有美政四海安寧太陽與火星皆有力則國家失政民多受害太陽與金星皆有力則國家荒淫酒色音樂極樂之事太陽強未必然又陰人所事吉太陽與水星皆有力則君王明聖識見遠大文學進用太陽與太陰皆有力則各國來朝萬民感戴
