body:
  text: 月離逐月離逐者離後星逐前星不獨本體各照俱然月有魄主體故西人最重之要不惟月有離逐也而各曜在地平十二宮之為吉為凶地平宮之消息于此可驗至于水星會各星之在各宮亦不獨一水星為然乃西占特書水星其義可想故輯月離逐并及各曜在地平宮與水星會各星之在各宮月離逐各星真源云離一宮內三十度離不在一宮十度為離不但星照亦然亦離逐為有虗離有虗逐皆虗五星皆然惟月為要令諭月月離土星逐木星月加光時為福作大官得親人財土內得銀失光但多管間事耳離土逐火加光時心惡不止于惡失光母有大病且窮苦或父母不和或破家強死離土逐金加光時大富貴有能恐好色有傷失光極好色離土逐水加光能知深微之理或知醫道失光啞聲聲身體壞性不爽快離土逐日大苦離風疾蠱病離土無逐有痔病贍小不爽快貧頰姦詐老尤甚以上諸項有經星性吉者相遇及月在升光時其害略輕應
