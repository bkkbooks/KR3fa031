body:
  text: 世運孔子言雖百世可知是言其理孟子言五百年必有王者與是言其數億一切識緯術數之書要皆本于私溢造作其偶驗者逐博于史册起不驗者魚算後世乾䥣度及太乙等書都欲強與歷合而究不能合且前之歷法尚未能如本朝之精密即合亦不能魚弊况不合乎故識緯之學儒者所不欲道而可道者邵子皇極經世一書皇極一書以後臨泰大壯夬乾姤遁否觀剝坤配十二支一卦管一百八十甲子上中下三元六十通一交管三十甲子上中下三元十通子坤卦第曰交始從卦第三交中討一萬八百年乾五之一上元甲子顓頊五十八年是乾五一交管一千八百年在乾之五交卦文之吉魚有遇于此者而且桀並生其間其何以占世道之升降象數論謂其為書亦不能實與歷合夫皇極已自如此他術可知若夫天象之實可憑者莫如歲差一端歲差之法本朝定七十二年而差一度有零則二萬五千九百二十餘年算為天運一大周數既有憑理亦相近至於土木
  hash: sha256:6db843246dfd9f38b67d5c8f78a74aa4040cbff7f8854026b6cda1ecc613e6cb
