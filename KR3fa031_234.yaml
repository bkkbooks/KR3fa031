body:
  text: 應亦如此但愈遲耳若此星升高到午位前後其應驗則黃大會通雲論普天下地方在本處東地平西地平或正午或正子君夏應亦在上來宮大臣死下去宮發病傷人芒指東大瘟病人多死甚凶指西減凶指南南方大水指北北方大乾芒在四方論其色與所在之宮掃星性皆屬水火亦有五星之性觀其色知其所主稍黑者有土星之性爭開瘟疫地震下雪光大者木星之性學術亂有道之人夏紅者火星之性強盜相殺火災乾燥大熱光明似日者太陽之性大人夏芒長色白金星之性疫病國法變九色不定者水星之性雷電暴風邪教出掃星見最少如出定有變此等星出有十二三年大變其息也有三或其力到十分散或別有掃星來後當遲或有九日食在五星沖位後當退流火會通雲流火或東西遇或南北遇或自上而下或不是火是星或星有尾長大亦與掃星各同但其災差小不甚遠流火主天氣長乾無雨魚多死大饑多風風促流星古來日月食時有流星其災更的火旱大饑日月食外少緩書見且多占同日月食慧起之由及天暗地震火災發生象宗雲若火星在安年命第十宮或四季命宮並朔望命第十
