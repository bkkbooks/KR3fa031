body:
  text: 矢之象蓋日躔九宫矣躔十宫名磨羯仍自南而北其行緩緩山羊之上木近之躔十一宮名寶瓶十二宮名雙魚時多雨澤瓶汲水魚遊水皆濕勝之象也凡此十二宫各像各效皆緑黃道斜倚天體乃致時變不等如此設令黃赤以正相和即七政之距各地平宮之天頂經度恆等又何與效之有黃道十二象主人性天步真源云十二象論人性白羊主人狠戇大膽暗謀害人火之故金牛主人快樂好色奢華金之故陰陽主人聰明水之故有主意應無主意喜天文不淳良二體之故巨蟹作客月之故有家業性浮婦生此宮此宮作命宮善待家皆月之故獅子為善人老成穩當喜天文日之故雙女生人大聰明善讀書在地平東地平生人無不讀書者大義人能明深微之理雙女係水宮水主文章故云天稱主快樂能生利好色不甚朴實金之故天蝎大膽爭開不怕死火之故失信火主反覆喜作亂火猛土之故難交土弱無心喜利土主貪寶瓶心野性固執土性不喜同人土冷性不喜笑語主不奏快雙魚為人小心明白性有主意善作客木亦主客多才技黃道十二宮分陰陽畫夜象宗云白羊陰陽獅子天稱人馬寶瓶屬陽屬畫金牛巨蟹雙女天蝎磨羯屬陰屬夜
  hash: sha256:2d1acc1cbf628600e1427451434729ee33900b3f811a90e28757a9485e3fb1bb
