body:
  text: 日在白羊金牛金退行會通云日在白羊或金牛其時金星退行其年春分三月雨多金星必同在白羊金牛日在火界會通云日在火星界上夏至熱多冬至春分乾多太陰金水交灾外邓未宫象宗云太陰金星水星初交灾邓未三宫主及時雨若不當雨時則天昏暗風起揚塵太陰必同金水交灾邓未三宫也土在中子辰灾邓未及火木金水在土星在申子辰或灾邓未宫分主天寒雨雪雾暗若火星在内主天熱并熱風又主天早井泉水少若木星在內則有和風若金星在內則和風不急若水星在內則清風頻輔方位四特申子泉分灾邓未水分水亦生風次于氣土在內不為爲两霧火木金水在內睪竟单指氣分言為月金水在灾宫或灭三合象宗云太陰金星水星皆在灾宫或灾宫之三合则两多有水災甚廣灾三合灾邓未也火在本宫及火星宫二至二分火星在本宫内三月之中雨甚多以熱能生水恐太熱則乾火星在土星本宫三月之中雨少在他星本宫亦雨少活着火在土宫一熱一冷雨惰相競火則精土則雨天氣噪悶有之何為無雨在他星宫亦不的為雨少
