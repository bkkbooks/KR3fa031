body:
  text: 考土木火會日日超星金水會日星超日東權大西權小真源云五星在日東西有七一星在東日未出星在西日已出二日未出星在十宫或日在地平星在十宫亦是但少弱四日入星在四宮五日出星在四宮六日在十宮星或出地平或入地平七日將出星落地平或少在日前後亦少弱兩星行之不同論行會通云日月自相進或自相皆有能力一一星輿一星相近皆順行少者在前少疾者在後如土星在六度木星在十二度木前土後以当行言則十二度為前六度為後疾前連後二一星輿一星相近皆順行少疾者在前連者在後三有二星相近一星在前順行一星相近雷四有二星相離一星在前順行一星在後笛日相近者必後星原行遠日相離者必前星原行遠五兩星相近一星疾行在前雷待後遠行者行到為和六兩星相離疾行者在後乃退離而去為戇七兩星相近疾行者在前雷遲行者在後順行而來不能及八兩星相離疾行者在前遲行者順行在後留三星行之不同論光會通云三星相近中有一星疾行能使後星之光移于前星二後兩星光俱移于前星
