body:
  text: 動天之黃道設無下星隨行其情莫騐其效難成矣乃到宿天之黃道既有恒星布到其下又有遊星力增效著所必然也味此言則恒星之性情既宮度之性情矣以言宮度之性情必本恒星而顕則何以象宗西占又言令將雜星內選出光顯有力者三十星各星属何宫係何等第是何性情属何方緯度味此言則既知宮分尚滇辨其星之性情宫度自有宫度之性情而恒星亦自有恒星之性情又明矣平情以論與其強為合觀不如順以分觀之為得也儿如白羊為火緯本宮而毅星不皆大性也白羊一度至六度為木星界而難星亦不皆本性也白羊前十度為火分而雜星亦不皆火性也象緯真機云用清黑油照天輪行度之色與光油春詳可識度數逐時之五行又云觀雲氣之初生可以騐天度之五行雲氣初生天氣下降之初也夫天輪逐時且有五行天度亦随事有其五行矧天之本度無有一定之性情乎但從來觀象者惟知觀五星中之一星而不能兼觀四星且惟知觀五星中之一星而不能兼觀恒星即能兼觀五星與恒星亦不能為之立象安命更觀其在天頂在命宮與東出西入之星此西法之所以為密也惟知觀五星而不及恒星是得其本而遺其末矣惟
