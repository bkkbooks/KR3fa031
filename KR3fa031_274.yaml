body:
  text: 火星與當年主星會又逆行火星若遇當年主星又逆行到不得力地至弱宮度又無吉星相照則必有姦人詭計亂國政因此兵起火土離四柱星到柱柱到星推法此西法火土弦沖若不在四柱上者離四柱內一柱上幾度或二星內一星行到四柱內一柱上或四柱內一柱度數挑到二星內一星上則其禍應驗每排度數一日談五十九分八秒即太陽平行數三合在何度若火星與太陽相沖或二弦照或與太陽所到宫分主星相沖二弦照者看其三合在何處則其度地方有聲息從小限數至第十宫又一説音人君宫或人城與登位時安命宫看小限到何宫從小限數至第十宫若火星在四柱惡照者則有刀兵征戰
