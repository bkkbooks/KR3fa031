body:
  text: 之別在地之五行凝而為質則有土木火金水五性之分人稟天地之靈氣而生居然並列為三才而五事之列為貌言視職思天象著於上人事應於下人事成於下天象見於上天人一理呼吸相通乃為心而不心天之心猶為子而不心親之心天與人本自相通祗因一私相隔而遂明旦無見子與親本自相通亦祗因一私相參而遂聲形無覺若是則有為善事親者即可為善承天者其理要無不相同矣故古大聖人必欽崇天道以永保天命及股肱之臣以變理陰陽為事者要無不洞察天道共修天也職此我皇上所以與天合德純一不已猶志在修省而况在下之臣庶乎天之道於何見日月天地之精也五綽五行之布也惟日月五星連行於中參伍錯綜萬古不薺悉本之自然而天地之性情以見天地之變化以呈在易之後有洪範一書已略陳其端而後之演洪範者猶可為垂戒之言其有諭天象者不失于浮泛則近于一偏有非天道之本然矣微乎微乎非寶從事于身心性命之學而精窮其蘊者其孰能窺於此乎論觀象非徒誇耀靈異象數之學雖本乎推算而非算術可並雖徽於陰陽而非陰陽家可比上古聖人誠能書人道者無有不明天道誠能知人者無不由於知天伏羲氏仰觀俯查於是始畫八卦即竟之命舜
