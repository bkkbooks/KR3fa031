body:
  text: 度一十四分添入中行度數內共二十度一十四分是天元黃通加二度一十四分共二十度一十四分為太陽實在雙魚一十八度也考今春分在白羊初秒今表加平眨日亦在白羊八度二十二分所謂雙魚一十八度者豐古法最高沖在冬至前故即即最高沖在冬至前而推算應以春分為憑雙魚十八度之説究不可解又云自春起度數至夏起度數計八十七度四十五分自夏起度數至秋起度數亦八十七度四十五分此必指天元黃道而言世運初起之首初起是土星象宗云上古智人見於洪水滔天時二百七十六年前將土木二星同宫同度之年作世運初起之首其世運主星是土星吉分時巨蟹宫此一時土木二星正在巨蟹宫洪水滔天正在此一運中亦土木同度罰從白羊初度起此起巨蟹行限從巨蟹宫起其行限每年交一宫從巨蟹宫起次年到獅子又到雙女宫後以次挑之是年行限亦至巨蟹宫推世運以宫度分分管年法每一宫三十度均作三百六十年每一年談度數五分世運遂運交一星土星運滿前云世運初起之首其主星是土星宫分是巨蟹交木星主運宫分是獅子宫
