body:
  text: 代遂各有五行志天官之志起于史遷而觀象玩占與乙己占又為占驗家之蓍蔡在五行志祇空談物理無庸推步猶可仿佛前人至天文之占必待推步而後知有難泛論矣考太史一職字漢已後大都皆是文人主之文章足觀而天象間有未悉自漢唐己後不惟歷法都出於造作而占驗推測之術造作者更紛不一俱名上古以沽名釣譽夫造作附會蓋本于人心而非天心雖竭其心思不遺餘里人巧有限如一切䜟緯太乙奇門六壬之類即能造至億萬數而終有盡時安能如天象之千變萬化無窮本於自然非造作私意所能窺見也在卜筮之學灼法略見於洪範周易一經出自四聖人由太極分為陰陽加一倍以至六十四卦原本于天道之自然而無庸私意參雜于其問因焦氏之學傅己憑干支六神為卜而象有所不必觀矣若夫占驗之術星官之學而又不本于推步則七政運行之不忒且未知又何以識天意之所在夫干支之始于黃帝之命大撓所以紀歲月日時天道之大不盡限此而近世所用為選擇之術者猶本授時之舊法如正月丙午宜上官而凡為正月之丙午皆然天道不如是之執一近世所謂星官之學者元屬欽察之傅不出於五法六法而仍依附于文昌化曜渺茫影響之談如丙午既為吉日矣倘天象中火之與金實凌犯于天頂將如之何化曜既為貴格矣倘天象中土之與火
