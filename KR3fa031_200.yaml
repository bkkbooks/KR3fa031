body:
  text: 水日水星太陽會濕宫濕氣有雨以風熱秉濕之故乾宫熱乾有熱風傷人以風熱秉熱之故大抵有風風秉熱所致水月水星太陰會冲方乾溫冷熱隨十二宫之性水行疾月行亦疾故善于隨物之性以為性雜會冲月在子輿日弦冲會通雲月離日一百八十度或九十度月在寶瓶雨寶瓶多雨之宫以月秉之性相近而且又輿日弦冲當弦望之時為得不雨日月合時土相冲照二至二分前朔望日月相會冲處土星若在一百八十或九十及一百二十及六十度必有雪雷冬至前土必合冲火方雷電否則日月輿火合而土又冲之始雷若止輿土冲主雪冷月離日或金冲在辰戌卯灾月離日或金星冲是月初離日金冲月并冲日故在白羊天稱天蝎雙魚內有雷電雨金在白羊天蝎雷電天稱雙魚雨月輿土冲照水金離水春分前朔望月離土星六十九十一百二十一百八十度土月皆在溫宫黑雲常有小雨或水星金星離木星六十九十一百
