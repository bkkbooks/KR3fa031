body:
  text: 者不論如太陽追土星相會冲方則論土之性土退追日會冲方論太陽之性前者為首一為會冲方之中有月在內離一星近一星视月之離與近一為會冲方之中有金星水星在內中間相近一星論其性如近太陽定善定熱近土星定惡定冷若中間有退行之星定開大雨之門亦當视其星之性五星在日光下并退行春分時四正宮內五星在日光下必雲多有雨夏至熱當秋分冷雨冬至雲多南風若五星俱在日光下則論星之强弱與主客再論星之逮近逮日者稍為有權金水在日光下春秋時作冷作溫春分風多作冷作濕金水與時相成而在春更為多風夏至熱有雷熱亦與時相成而雷白金氣如日所發冬至雲有南風雲係金所生風象水再而南国日之湿土星火星木星亦畧同秋分時五星或一或二或三在日光下退行主一年大旱亦宜論星之性夏至五星順行天氣冲和五星有一二退行并權大者夏至熱亦宜論星之性五星退行熱順行寒順行應平和七曜會冲日月會通云太陽太陰會冲方湿宮雨熱宮乾晴土日
