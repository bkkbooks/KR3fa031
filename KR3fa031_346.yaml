body:
  text: 度黄變赤定十二宫用第二法黄道變為赤道度得一百一十一度五十分為十宫赤道度用表美法見下加三十度得一百四十一度五十分為十一宫加三十度得一百七十一度五十分為十二宫加三十度得二百零一度五十分為一宫加三十度得二百三十一度五十分為二宫加三十度得二百六十一度五十分為三宫加三十度得二百九十一度五十分為四宫加三十度得三百二十一度五十分為五宫加三十度得三百五十一度五十分為六宫加三十度距春分二十一度五十分为七宫加三十度得五十一度五十分为八宫加三十度得八十一度五十分为九宫以上俱赤道度黄變赤用表算如用表太陽在黄道金牛二十四度一十三分變赤道查黄赤道正球升度表凡推步書皆有金牛二十四度一十三分得五十一度五十分無緯從白羊算起表上止具黄道二十四度及二十五度對赤道数無分對数用三率比例算之可淂日在黄道無緯度
