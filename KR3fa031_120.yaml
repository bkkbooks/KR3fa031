body:
  text: 言經度未及其緯故曰經緯中之一法也經緯二法中之一法七曜本宮天人公用中西周法象宗云獅子宮屬太陽巨蟹宮屬太陰與二宮相對者實瓶宮磨羯宮屬土星因土星性情與太陽太陰相拗土星輪下木星因此人馬宮緊依磨羯宮雙魚宮緊依寶瓶宮此二宮屬木星白羊宮與天蝎宮屬火星天蝎宮緊依人馬宮白羊宮緊依雙魚宮金牛宮與天秤宮屬金星金牛宮緊依白羊宮天秤宮緊依天蝎宮陰陽宮與雙女宮屬水星陰陽宮緊依金牛宮雙女工緊依天秤宮木星二宮與太陽太陰宮分三合照金星二宮與太陽太陰宮分六合照土星二宮與太陽大陰宮分相沖照此到土太陽太陰之位不為火星二宮與太陽太陰宮分二弦照各星在本宮有力在對照無力惟水與太陽太陰本無照此七曜分宮中西同法無參差不齊至于命學財帛等宮其大叚亦同惟論照中土止有三方吊照而西占之照不惟三方且有六合二弦又將七曜光分別大小不等斯為入密矣至于二星相沖亦原屬中土所忌中西語言不同文字各異而于天象立體占騐之大處無不相同是刻見理之所在放乎四海無不準者黃道十二宮名之徳黃道十二宮性情所主書未詳載固摘此節并下節以之又有十二象每象三分主天時者見占時又有黃道性分四方主血等見命里
