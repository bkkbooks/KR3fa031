body:
  text: 一時而論人生則非刻漏之時而過午時之時一子時有三十度過午則子有三十時矣子時過午一也南北極出地又有無窮之異則子時且不可以數計矣財帛等十二宮赤道皆三十度然不當用赤道而變為黃道其宮分多寡有差五六十度者日月等七政臺歷皆本星黃道然不當用黃道而變為赤道其出其出入宮分有差至三四十度者至于吉凶之遲速全不關黃赤道而論升度而正球升度亦止午之一點外此斜升斜降隨極高下益不可齊以上數大法舊傅皆略得其似遂認為真而况各宮與七政性情相離相逐得力不得力如舊日格午官格者萬未及一安敢以為天地之情既在是也此書幽渺元奧非人思力可及他如回年行年流月流日條分縷晰皆指諸掌豈非為此道特開生者有不當言命者又不可不知也富貴貧賤之間有命存馬不可幸而致者當言命者也網常倫理之際乃吾性分之所當然不可諉之于命者此不當言命者也所以孟子云耳目口鼻四肢之欲謂命不謂性仁義禮智天道謂性不謂命可謂發前聖所未發大有功于天下萬世者吾故推孟子之意而正告天下後世曰深明乎
