body:
  text: 若太陰與土星皆有力則謠言驚恐人多夏嚁諸物湧貴太陰與木星皆有力剛人間安寧利出外四方有好音人多行善事太陰與火星皆有力爭閗詞訟妄言多生疾病太陰與太陽或金星水星皆有力各與上交同断土與火皆有力征戰到生一切惡事若木與土或火皆有力則善人改常為惡若金與土星皆有力則陰人淫亂小口有損金與土木皆有力主安樂豊足貴人吉又陰人吉人間行善事金與火皆有力則陰人淫亂金與水皆有力則多好音樂詩詞等事金與太陰皆有力則多子嗣有喜信若水與土皆有力則多生姦詐妄談是非水與木皆有力則多行善事好學問明理性又利經商水與火皆有力與水興土同水與火皆有力與金興水同水與太陽皆有力與太陽興水同已上將土木二星同宫度并當年命宫為主断其祸福若論人品己見占國随各星所關係之人應騐但此應驗比前所論年歲遠大
