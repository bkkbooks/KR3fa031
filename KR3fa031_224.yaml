body:
  text: 在天經星在日月食有大能力食在西從午至西經星在西者力大食在東從午至東經星在東者力大皆與主星忝看土性多饑餓疾疫不甚主兵火性多有兵華又經星所居之宫亦當論其性經星離赤道南水災赤道北地震如主星是土在北同金星主地震五星相合及經星與五星相合會通云五星相合有六十九十一百二十一百八十經星與五星相合有三一同在一小圈內去極遠近等或俱在南或俱在北若陰陽巨蟹同一小圈金牛獅子同一小圈稱為相見者或一在南一在北如白羊天稱陰陽人馬相對在北為有榷者在南為聼使役者二經星在午時圈或一在天頂一在地下相對或二俱在天頂俱在地下相對三或同出地平或同入地平或一出地平或一入地平此四者看五星中何星同經星之性假如日月食白羊命宫在陰陽一主火星一主水星如水星在金牛火星在雙女即算為第一日食宫主火星第二雙女第三命主水星第四金牛火星主爭鬪反亂事并雙女方可有經星同火星之性相關何如以知其事次看水星水星同凶星則凶
