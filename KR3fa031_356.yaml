body:
  text: 升度之以赤求黃數得一百四十三度五十五分四十八秒入獅子二十三度五十五分為十一宮斜球升度差度前第四法黃道麥赤通用减此赤道變黃道故加此反用第四法得斜球黃道之入十一宮表算十二宮用表算十二宮十二宮赤道一百七十一度五十分赤一百七十一度四十五分得黃道雙女二十一度尚餘五分赤一百七十二度四十分得黃道雙女二十二度其差五十五分以小餘五分比例得四分三十五秒并之為黃道雙女二十一度五分即一百七十一度零五分為正球升度赤道一百七十一度五十分查距度三度一十五分北極出地二十八度二十五分說見上文二十八度對距度三度得一度三十六分二十八度對距度四度得二度寒八分其差三十二分與距度小餘一十五分比例得八分加之為一度四十三分北極出地二十九度對距度三度得一度四十分二十九獨對距度四度得二度一十三分其差三十三分與距度小餘一十五分比例得八分一十五秒加之為一度四十八分一十五秒先一度四十四分較後一度四十八分差四分與北極小餘二十五分比例得一分四十秒以加先數得一度四十五分四十秒為赤黃差度
