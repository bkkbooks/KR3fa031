body:
  text: 宮二宮六陰宮分主多大水若在此宮相對宮分五六七十一十二一係陽宮主雨水少年命星監分四行視火土之在大抵占天時用分處居多象宗云若年命星監是火宮寅午戌土星在內則减熱火星在內則發熱年命星監是土宮已酉丑土星在內則添寒火星在內則减寒年命星監是風宮申子辰土星在內則减熱火星在內則添熱若太陽木星水星或二星在風宮則多風年命星監是水宮灾未土星在內則添寒火星在內則减寒命宫前有土火二星在寅午戌灾未象宗云若近安年命宮之前或近四季安命之前或近朔望安命宮之前有土星在寅午戌宮分內則减熱在灾未宮分內則天氣極寒有火星在寅午戌宮分內則天色極熱在灾未宮分內則天色减寒命宫前有星在申子辰或與申子辰相照觀風象宗云若近安年命宮之前或近四季安命宮之前或近朔望安命宮之前七曜內一星在申子辰宮或與申子辰相照則多風有星何性其風隨其性也觀風自何方來看本星二三度屬何方若火星在其宫申子辰則有恶風天紅雲色若土星在內則不風不急而寒若木星在內則有和風比土星之風微急若金星在內則和風帶潤若水星在內則有清風
