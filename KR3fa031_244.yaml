body:
  text: 軍官軍人若論軍官軍人及軍器並一切軍務看火星陰人樂人若論陰人及樂人看金星行人使臣若論快行人並使臣看太陰已上看各星辰衰旺斷其吉凶論人身體論人身體安寧看本星得本體之力官貴興旺論官貴興旺看本星得相助之力經商財利論經商財利看第二宮主星巳上各星與命宮可命宮主星相照者各得順之力人多出外若年命在第九遷移宮有一二星係廟旺或三合或在分定度主其人多出外太陽入白羊臣蟹天秤磨羯星過廟旺若太陽入白羊宮或臣蟹宮或天秤宮或磨羯宮初度此時各星除相沖外得遇廟旺度數此李必默高貴興旺五星分管事
