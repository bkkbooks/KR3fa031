body:
  text: 風雨之小者無關于星象之故又不可不知也西人望氣自有成書而中土于此術淂其訣故不讓于西占在兩軍相當之時勝敗在于呼吸則望氣焉持重隋天之去已言之詳而朱子所選之天元玉歷及青霞散人之歌訣亦頗可參者若天聲音之道孔子吹律而知己焉殷之苗裔師矌吹律知南風不競而决楚之必敗其道亦甚微矣哉後之人所句察也登非失傅之故乎固于巷末更附以望氣審音及分野之概諭親象亦古踩令密推步之法在古為踩在令焉密而天文之學亦何獨不然故推步之法主至我朝垂有定法而無以復加而天文之學亦至我朝薛鳳祚訂其書梅文鼎詳其義而其法誠為至精至密觀其書自見論學貴有體有用歷法西傳中言西癢之學其大者有五科一道科二治科三理科四醫科五文科而理科中傍出一支為度數之學其言似涉于太誇然我中土胡安定原有經學治事之分以經學而兼治事志道據德依仁游藝非判然為兩截事矣出而報效國家有體有用豈而癢之所能望見也推算天時人事總論
