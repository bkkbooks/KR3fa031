body:
  text: 為好風而月之從離月性且有晦朔弦望之不同月緯亦有南北大小之不等談云月在陰歷為雨若之何竟弗問也非弗問也必失其傅故也又如古占太白經天主共熒惑入南斗亦主共夫太白雖環日行其星體要無不經天之理意者星行已入限當伏而光猶璨然為經天耳若夫熒惑二十三月零行一周天亦猶之月二十三月中斷無不離斗之理如之何惟謂之主共也此間自必有道矣中土失其傳致流入于西西人有天文象宗西占一書在元世百餘年晦而勿顯至明洪武年高皇帝命大將入元都因取以歸特召翰林李翀吳伯宗諭之曰天道幽微垂象以示人人君體天行道乃成治功來西域陰陽家推測天象至為精密有驗其經緯度數之法又中國之所未僃其有間于天文甚大宜譯其書以時技閲無幾觀象可以省躬修德思患豫防順天心立民命馬遂敕翰林編修馬少亦理為哈麻次第譯之其事載續文獻通考其訣相傳又為劉基掐去逮至我朝有北海薛鳳祚泰西穆尼閣其人相與恭訂復敷衍之其理與象宗西占不異而其書原名為天步真源已刻于歷學會通中會通之書芟削太苛且刻成未經較對而鳳祚已逝至若象宗西占及天步真源等書中土未能貫通西人又不習中土文法一篇之中支離重復有難尋譯且其書一語又止有數分實理難免歲頭露尾之病宣城梅文鼎亦極重薛氏學而病其難讀
