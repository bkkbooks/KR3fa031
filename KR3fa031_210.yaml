body:
  text: 小者見于二分二至應于地下不過人事之常其大者應于地下為洪水為地震為瘟疫為大兵事非尋常則天象之見亦非尋常如大會日月食掃流等是在天大小會會通云一赤道春分興黃道春分相會三萬六千年一次二土星木星相會白羊初度七百九十五年象宗云土木二星同宮同度時十九年三百十四日十四時零一刻半相遇一處為一次相會是不及二十年會一次此言七百九十五約可會四十次然象宗又云前後共相會四十九次之後方交火局似此則相會四十次之時尚在水局不知何以此土木相會白羊卻定為七百九十五年也其詳見世運中三土星木星相會一百九十九年會金牛方為大權如會白羊再會獅子再會人馬不為大權維過一百九十年會金牛在別三合宮內方為大權一百九十九年會陰陽又一百九十九年會巨蟹又一百九十九年再會白羊其椎更大四項七百九十五年象宗云會一次過八宮又二度二十五分則一百九十九年之後尚未能交別局詳見世運四土星到白羊初度三十年行周十二宮又到白羊初度不拘何時總為大權
