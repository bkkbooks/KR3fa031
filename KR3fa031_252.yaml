body:
  text: 餅者土性之有冷者則宜于熱故糞田有用石者土性之有瘠者則宜于肥故糞田有用雞毛及牛羊骨者曾見有土隴數百畝之長堅不能耕乃依彊用之法教以先種麻俟麻熱焚枲及以為糞壞化剛為柔而遂成良田此舉其一方之大略而言要亦人事之所當盡也一土也而性有如是之不等則夫天象之變化無窮非一端之所能盡故可知矣輯占歲五星為本年主星分吉凶取本年主星法見下會通云土星為本年主星天氣寒雲冬至尢甚有非常之雪多脢風水湧水中盜起不利舟行人多冷病老年之人如畜物損傷多生毒蟲五穀寒傷木星為本年主星年中平吉諸事易成人心平善諸事與土星相反火星為本年主星天氣炎熱火災多熱風雷電舟楫傷損何乾井涸人多熱痛傷寒血症百姓變亂異國不和人多強死訟獄繁盜賊起用物五穀五果損傷金星為本年主星大槩同木星之性所主人物皆善以金星性冲和風氣善水路易行五穀皆吉水星為本年主星看同何星相合相冲相方方必為弦同善則善同惡則惡水作主星世上法度風俗多變天氣變在倏忽多地震
