body:
  text: 回年據薛氏法以日黃道度查赤道升度每年加入八十八度四十九分餘即次年夲日午時同升度如生日日在天秤十六度十分赤升度一百九十四度四十三分减去八十八度四十九分得一百零五度五十四分為次年日到天秤度如十六年求日進天秤十六度十分以是一百零五度五十四分為根加上十六年每年應加八十八度四十九分之数除全周得八十六度五十九分為本日午時圈于根数及十六年加数两数内除去原赤升度数得二百五十二度十六分對時為午後十六小時四十八分五十六秒日進天秤原纏度照此法求頗多不合因竞用寶推時嵗寶三百六十五日二十三則三分四十八秒扣足三百六十五日加上二十三刻三分四十八秒為二文時七刻零三分四十八秒但年遠者亦未易推今融會其数立一簡便之法將戚寶之小数二十三刻三分四十八秒依午時困變度得八十七度一十二分假如申初初刻初分日黃道降娄初度赤道升度得五十五分申初初刻初分在時圈距午後三十度以此距午三十度為根若求明年日進原度則加一個八十七度一十二分共一百一十七度一十二分對時為午後三大時七刻零三分四十八秒即七小時三刻零三分四十八秒又如已初刻初分日黃道星紀初度得赤道
