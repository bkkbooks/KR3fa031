body:
  text: 色會通云日月食色不同天首離日一度色宻黑二度色稍鎄三度黑紫四度紫黃五度紫光亮六度紫紅七度紫黃八度黃九度黃少綠十度紅黃少綠十一度金黃色十二度黃白日食緝十分緝離最高一百八十度其色宻黑三百十度一百五十度其色黑如常緝二十分離最高二百四十度黑色少綠緝三十分離最高三百七十度或九十度黑色少紅緝四十分離最高三百度或六十度綠色有白緝六十分離最高三百三十度綠白有光緝九十分色黃本地方有不吉應其地之色多見即地方之害大色青黑如死人色者土星色白者木星紅者火星各色變者水星其為災如五星之性交食在各人命宫四柱內乂見命理搃論交食在各人命宮四柱內則听眙之有災假如在人命宫則夲身有災在十宫則宫祿事不偕在七宫妻妾有祸在四宫則田宅耕種有傷損交食在各人安命星盤太陽所在宫分及冲又見命理搃論象宗云各人安命星盤看太陽在何宫分若此宫分内日食或太阳所在宫分相冲日食則其人必有災傷太隂同掃流掃孛亦作十二宫占見占歳
